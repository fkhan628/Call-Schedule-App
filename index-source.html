<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DSG Call">
  <meta name="theme-color" content="#1a6fa8">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>DSG Call Schedule</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f2f5; overflow-x: hidden; }
    #root { min-height: 100vh; }
    /* Hide Babel warning */
    .babel-warning { display: none !important; }
    /* Print-friendly styles */
    @media print {
      body { background: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      #root > div > div:first-child { display: none !important; } /* hide header */
      button, select, input { display: none !important; }
      [style*="position: absolute"] { display: none !important; } /* hide notification panel */
      div[style*="maxWidth"] { max-width: 100% !important; padding: 0 !important; }
      div[style*="grid-template-columns: repeat(7"] { gap: 0 !important; }
      div[style*="grid-template-columns: repeat(7"] > div { border: 1px solid #ccc !important; min-height: 60px !important; font-size: 9px !important; }
      @page { margin: 0.5cm; size: landscape; }
    }
    /* Mobile improvements */
    @media (max-width: 600px) {
      select, input[type="date"], input[type="text"], input[type="password"], input[type="email"] { font-size: 16px !important; min-height: 38px; }
      button { min-height: 36px; }
    }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    // ─── Auto-update: bump this version string each deploy ───
    var APP_VERSION = "2026.04.19b";
    (function() {
      var stored = localStorage.getItem("dsg_app_version");
      var mismatch = stored && stored !== APP_VERSION;

      function nukeAndReload() {
        var promises = [];
        if (window.caches) {
          promises.push(caches.keys().then(function(names) {
            return Promise.all(names.map(function(n) { return caches.delete(n); }));
          }));
        }
        if (navigator.serviceWorker) {
          promises.push(navigator.serviceWorker.getRegistrations().then(function(regs) {
            return Promise.all(regs.map(function(r) { return r.unregister(); }));
          }));
        }
        Promise.all(promises).then(function() {
          var url = new URL(window.location.href);
          url.searchParams.set("_v", APP_VERSION);
          window.location.replace(url.toString());
        }).catch(function() { window.location.reload(true); });
      }

      if (mismatch) {
        localStorage.setItem("dsg_app_version", APP_VERSION);
        nukeAndReload();
      } else {
        localStorage.setItem("dsg_app_version", APP_VERSION);
        window.__dsgHardReset = nukeAndReload;
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script>
    // Cache-bust with version — update this string when deploying changes
    var _v = "2026.04.19b";
    ['config.js','helpers.js','generator.js','app-styles.js'].forEach(function(f) {
      document.write('<script src="'+f+'?v='+_v+'"><\/script>');
    });
  </script>
  <script type="text/babel">
    const { useState, useMemo, useCallback, useRef, useEffect } = React;

function CallSchedule() {
  const [view, setView] = useState("calendar");

  const [surgeons, setSurgeons] = useState(INIT_SURGEONS);
  const [apps, setApps] = useState(INIT_APPS);
  const [vacations, setVacations] = useState({});
  const [backupMondaySet, setBackupMondaySet] = useState(new Set());
  const [fierceBackupSet, setFierceBackupSet] = useState(new Set()); // Fierce backs up our group, regular schedule unchanged
  const [schedule, setSchedule] = useState({});
  const [appShifts, setAppShifts] = useState({}); // { "2026-05-06": "a1", ... }
  const [priorCounts, setPriorCounts] = useState(COUNTS_2YR); // Multi-year totals (used by generator)
  const [year1Counts, setYear1Counts] = useState(COUNTS_1YR); // Current year totals
  const [year2Counts, setYear2Counts] = useState(COUNTS_2YR); // 2-year totals
  const [startMonth, setStartMonth] = useState(4);
  const [startYear, setStartYear] = useState(2026);
  const [numWeeks, setNumWeeks] = useState(14);
  const [calMonth, setCalMonth] = useState(4);
  const [calYear, setCalYear] = useState(2026);

  // ─── Calendar Filters ───
  const [calFilters, setCalFilters] = useState({ svc: true, night: true, wknd: true, app: true, fierce: true, vac: true });
  const [showBackupStats, setShowBackupStats] = useState(false); // Toggle 2nd call columns in Stats
  const [calSurgeonFilter, setCalSurgeonFilter] = useState(""); // "" = all, or surgeon ID
  const toggleFilter = (key) => setCalFilters(p => ({ ...p, [key]: !p[key] }));

  // ─── Holiday Assignments ───
  const [holidayAssignments, setHolidayAssignments] = useState({}); // { "2026": [ { name, date, type, surgeonA, surgeonB, coverage } ] }
  const [holidayYear, setHolidayYear] = useState(2026);
  const [editingWeek, setEditingWeek] = useState(null);
  const [editShift, setEditShift] = useState(null);

  // ─── Dark Mode ───
  const [darkMode, setDarkMode] = useState(() => {
    try { return localStorage.getItem("dsg-dark-mode") === "true"; } catch(e) { return false; }
  });
  useEffect(() => {
    try { localStorage.setItem("dsg-dark-mode", darkMode); } catch(e) {}
  }, [darkMode]);

  // ─── Undo History ───
  const [scheduleHistory, setScheduleHistory] = useState([]);
  const pushUndo = useCallback((sched) => {
    setScheduleHistory(prev => [...prev.slice(-9), JSON.parse(JSON.stringify(sched))]);
  }, []);
  const undoLastChange = useCallback(() => {
    if (scheduleHistory.length === 0) return;
    const prev = scheduleHistory[scheduleHistory.length - 1];
    setSchedule(prev);
    setScheduleHistory(h => h.slice(0, -1));
  }, [scheduleHistory]);

  // ─── What-If Preview ───
  const [previewSchedule, setPreviewSchedule] = useState(null);
  const [showPreview, setShowPreview] = useState(false);
  const [previewCalMonth, setPreviewCalMonth] = useState(0); // index into preview months

  // Form states
  const [vacSurgeon, setVacSurgeon] = useState("");
  const [vacStart, setVacStart] = useState("");
  const [vacEnd, setVacEnd] = useState("");
  const [editVac, setEditVac] = useState(null); // {sid, idx, start, end}
  const [bkMonday, setBkMonday] = useState("");
  const [appDate, setAppDate] = useState("");
  const [appPerson, setAppPerson] = useState("");
  const [scanning, setScanning] = useState(false);
  const [scanMsg, setScanMsg] = useState("");
  const [loaded, setLoaded] = useState(false);
  const [saveStatus, setSaveStatus] = useState("");
  const fileRef = useRef(null);
  const lastSyncRef = useRef(null);
  const loadedAtRef = useRef(null); // timestamp when initial load completed — prevents auto-save race
  const scheduleRef = useRef({});
  useEffect(() => { scheduleRef.current = schedule; }, [schedule]);

  const [showApiKey, setShowApiKey] = useState(false);

  // ─── Vacation Requests ───
  const [vacRequests, setVacRequests] = useState([]);
  const [vacReqSurgeon, setVacReqSurgeon] = useState("");
  const [vacReqStart, setVacReqStart] = useState("");
  const [vacReqEnd, setVacReqEnd] = useState("");
  const [vacReqReason, setVacReqReason] = useState("");
  const [expandedVacGroups, setExpandedVacGroups] = useState({}); // { personId: true/false }
  const toggleVacGroup = (id) => setExpandedVacGroups(prev => ({ ...prev, [id]: !prev[id] }));

  // ─── Shift Trade Requests ───
  const [tradeRequests, setTradeRequests] = useState([]);
  const [tradeFrom, setTradeFrom] = useState("");
  const [tradeTo, setTradeTo] = useState("");
  const [tradeWeek, setTradeWeek] = useState("");
  const [tradeShift, setTradeShift] = useState("");
  const [tradeReturnWeek, setTradeReturnWeek] = useState("");
  const [tradeReturnShift, setTradeReturnShift] = useState("");

  // ─── Authentication ───
  const [authUser, setAuthUser] = useState(null);       // { id, email, ... }
  const [authLoading, setAuthLoading] = useState(true);  // checking session on mount
  const [authEmail, setAuthEmail] = useState("");
  const [authPassword, setAuthPassword] = useState("");
  const [authMode, setAuthMode] = useState("login");     // "login" | "signup" | "reset" | "newpassword"
  const [resetEmail, setResetEmail] = useState("");
  const [resetSent, setResetSent] = useState(false);
  const [newPassword, setNewPassword] = useState("");
  const [newPasswordConfirm, setNewPasswordConfirm] = useState("");
  const [authError, setAuthError] = useState("");
  const [authBusy, setAuthBusy] = useState(false);
  const [signupPersonId, setSignupPersonId] = useState(""); // person_id during signup
  const [userProfile, setUserProfile] = useState(null);  // { person_id, display_name, role }
  const [needsProfile, setNeedsProfile] = useState(false); // true if logged in but no profile yet
  const [biometricAvail, setBiometricAvail] = useState(false);
  const [biometricEnrolled, setBiometricEnrolled] = useState(false);
  const [biometricPending, setBiometricPending] = useState(false); // waiting for biometric prompt
  const [allProfiles, setAllProfiles] = useState([]); // for scheduler to manage per-user flags
  const allPeople = useMemo(() => [
    ...surgeons,
    ...apps,
    { id: "admin", name: "ADMIN (Clinic Manager)" }
  ], [surgeons, apps]);

  // ─── Scheduler Mode (PIN protected) ───
  const [isScheduler, setIsScheduler] = useState(false);
  const [schedulerPin, setSchedulerPin] = useState("");
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState("");

  // If non-scheduler ends up on a restricted tab, redirect them
  useEffect(() => {
    const isAdmin = userProfile?.person_id === "admin";
    const canAssignApps = userProfile?.can_assign_apps === true;
    // Setup is accessible to: scheduler, admin, or APP-assign-permitted users (for the APP card only).
    // Totals remains scheduler-only.
    if (!isScheduler && !isAdmin && !canAssignApps && view === "setup") {
      setView("calendar");
    }
    if (!isScheduler && view === "totals") {
      setView("calendar");
    }
    if (isAdmin && view === "myschedule") {
      setView("calendar");
    }
  }, [isScheduler, view, userProfile]);

  // ─── Notifications ───
  const [notifications, setNotifications] = useState([]);
  const [showNotifs, setShowNotifs] = useState(false);
  const [notifLastSeen, setNotifLastSeen] = useState(() => {
    try { return localStorage.getItem("dsg-notif-seen") || "2000-01-01T00:00:00Z"; } catch(e) { return "2000-01-01T00:00:00Z"; }
  });

  // ─── Browser Push & Email Notification Preferences ───
  const [pushPermission, setPushPermission] = useState(() => {
    try { return Notification?.permission || "default"; } catch(e) { return "unsupported"; }
  });
  const [notifPrefs, setNotifPrefs] = useState({}); // { surgeonId: { email, browser_push, email_notifs, schedule_changes, vacation_updates, shift_reminders } }
  const notifPrefsRef = useRef(notifPrefs);
  useEffect(() => { notifPrefsRef.current = notifPrefs; }, [notifPrefs]);
  const [notifPrefsLoaded, setNotifPrefsLoaded] = useState(false);
  const [notifPrefsSaving, setNotifPrefsSaving] = useState(false);
  const [notifTestSent, setNotifTestSent] = useState("");
  const lastNotifCountRef = useRef(null); // track notification count for browser push on new ones
  const [edgeFunctionUrl, setEdgeFunctionUrl] = useState(""); // Supabase Edge Function URL for email

  // ─── My Schedule ───
  const [mySurgeon, setMySurgeon] = useState(() => {
    try { return localStorage.getItem("dsg-my-surgeon") || ""; } catch(e) { return ""; }
  });

  // Save My Surgeon choice to localStorage
  useEffect(() => {
    try { if(mySurgeon) localStorage.setItem("dsg-my-surgeon", mySurgeon); } catch(e) {}
  }, [mySurgeon]);

  // Auto-set vacation requester and trade initiator to logged-in user
  useEffect(() => {
    if (mySurgeon && mySurgeon !== "admin" && !isScheduler) {
      setVacReqSurgeon(mySurgeon);
      setTradeFrom(mySurgeon);
    }
  }, [mySurgeon, isScheduler]);

  // ─── Person-specific filtering (non-schedulers see only their own data) ───
  const myNotifications = useMemo(() => {
    if (isScheduler) return notifications;
    if (!mySurgeon || mySurgeon === "admin") return notifications;
    return notifications.filter(n => {
      if (n.type === "schedule_published" || n.type === "schedule_changed") return true;
      if (n.data?.surgeon_id === mySurgeon) return true;
      if (n.data?.from_surgeon_id === mySurgeon || n.data?.to_surgeon_id === mySurgeon) return true;
      const myName = allPeople.find(p => p.id === mySurgeon)?.name;
      if (myName && n.message?.includes(myName)) return true;
      return false;
    });
  }, [notifications, isScheduler, mySurgeon, allPeople]);

  const myUnreadCount = useMemo(() => myNotifications.filter(n => n.created_at > notifLastSeen).length, [myNotifications, notifLastSeen]);

  const myVacRequests = useMemo(() => {
    if (isScheduler) return vacRequests;
    if (!mySurgeon || mySurgeon === "admin") return vacRequests;
    return vacRequests.filter(r => r.surgeon_id === mySurgeon);
  }, [vacRequests, isScheduler, mySurgeon]);

  const myTradeRequests = useMemo(() => {
    if (isScheduler) return tradeRequests;
    if (!mySurgeon || mySurgeon === "admin") return tradeRequests;
    return tradeRequests.filter(r => r.from_surgeon_id === mySurgeon || r.to_surgeon_id === mySurgeon);
  }, [tradeRequests, isScheduler, mySurgeon]);

  // ─── Auth: Check session on mount ───
  useEffect(() => {
    (async () => {
      try {
        // Check for password recovery token in URL hash (Supabase sends #access_token=...&type=recovery)
        const hash = window.location.hash;
        if (hash && hash.includes("type=recovery")) {
          const params = new URLSearchParams(hash.substring(1));
          const accessToken = params.get("access_token");
          const refreshToken = params.get("refresh_token");
          if (accessToken) {
            auth._saveSession({ access_token: accessToken, refresh_token: refreshToken });
            // Clear the hash from URL
            window.history.replaceState(null, "", window.location.pathname + window.location.search);
            setAuthMode("newpassword");
            setAuthLoading(false);
            return;
          }
        }

        const bioAvail = await biometric.isAvailable();
        setBiometricAvail(bioAvail);
        const bioEnrolled = biometric.isEnrolled();
        setBiometricEnrolled(bioEnrolled);
        const session = auth.getSession();

        if (bioEnrolled && session) {
          // Has biometric + stored session — require biometric to unlock
          setBiometricPending(true);
          setAuthLoading(false);
          return; // Don't auto-login; wait for biometric prompt
        }

        if (session && !bioEnrolled) {
          // Has session but no biometric — auto-login (legacy behavior)
          const { user } = await auth.getUser();
          if (user) {
            setAuthUser(user);
            const profile = await dbAuth.getProfile(user.id);
            if (profile) { setUserProfile(profile); setMySurgeon(profile.person_id); }
            else { setNeedsProfile(true); }
          }
        }
      } catch(e) { console.error("Auth check error:", e); }
      setAuthLoading(false);
    })();
  }, []);

  // Biometric unlock handler
  const handleBiometricUnlock = async () => {
    setAuthError(""); setAuthBusy(true);
    const result = await biometric.authenticate();
    if (result.success) {
      // Biometric passed — use stored session
      const { user } = await auth.getUser();
      if (user) {
        setAuthUser(user);
        const profile = await dbAuth.getProfile(user.id);
        if (profile) { setUserProfile(profile); setMySurgeon(profile.person_id); }
        else { setNeedsProfile(true); }
        setBiometricPending(false);
      } else {
        // Session expired — fall back to email/password
        setBiometricPending(false);
        biometric.unenroll(); setBiometricEnrolled(false);
        setAuthError("Session expired. Please sign in again.");
      }
    } else {
      setAuthError(result.error || "Biometric failed");
    }
    setAuthBusy(false);
  };

  // Biometric enrollment handler (call from Settings)
  const handleBiometricEnroll = async () => {
    if (!authUser) return;
    const result = await biometric.enroll(authUser.id, authUser.email);
    if (result.success) {
      setBiometricEnrolled(true);
    } else {
      alert(result.error || "Could not enable biometric login");
    }
  };

  const handleBiometricUnenroll = () => {
    biometric.unenroll();
    setBiometricEnrolled(false);
  };

  // Auth handlers
  const handleAuthSubmit = async () => {
    setAuthError(""); setAuthBusy(true);
    try {
      if (authMode === "signup") {
        if (!signupPersonId) { setAuthError("Please select your name"); setAuthBusy(false); return; }
        // Check if person_id already claimed
        const profiles = await dbAuth.getAllProfiles();
        if (profiles.some(p => p.person_id === signupPersonId)) {
          setAuthError("This name is already registered to another account");
          setAuthBusy(false); return;
        }
        const { user, session, error } = await auth.signUp(authEmail, authPassword);
        if (error) { setAuthError(error); setAuthBusy(false); return; }
        const userId = user?.id || session?.user?.id;
        if (userId) {
          // Create profile
          const personName = allPeople.find(p=>p.id===signupPersonId)?.name || signupPersonId;
          const role = signupPersonId === "admin" ? "admin" : "member";
          await dbAuth.upsertProfile({ id: userId, person_id: signupPersonId, display_name: personName, role });
          const profile = { person_id: signupPersonId, display_name: personName, role };
          setAuthUser(user || session?.user);
          setUserProfile(profile);
          setMySurgeon(signupPersonId);
          setNeedsProfile(false);
          // Auto-elevate admin accounts to scheduler
          if (signupPersonId === "admin") setIsScheduler(true);
          // Auto-populate "All Surgeon Email Addresses" only if slot is empty in DB —
          // don't clobber an email the scheduler already entered manually.
          if (signupPersonId !== "admin" && authEmail) {
            try {
              const { data: existingRow } = await supabase
                .from("notification_preferences")
                .select("email")
                .eq("surgeon_id", signupPersonId)
                .maybeSingle();
              const existingEmail = (existingRow?.email || "").trim();
              if (!existingEmail) {
                saveNotifPref(signupPersonId, { email: authEmail, email_notifs: true });
              }
            } catch(e) {
              // If the check fails for any reason, fall back to populating —
              // better to risk clobbering (rare) than to fail silently.
              saveNotifPref(signupPersonId, { email: authEmail, email_notifs: true });
            }
          }
        }
      } else {
        const { user, error } = await auth.signIn(authEmail, authPassword);
        if (error) { setAuthError(error); setAuthBusy(false); return; }
        setAuthUser(user);
        // Load profile
        const profile = await dbAuth.getProfile(user.id);
        if (profile) {
          setUserProfile(profile);
          setMySurgeon(profile.person_id);
          setNeedsProfile(false);
          // Auto-elevate admin accounts to scheduler
          if (profile.person_id === "admin") setIsScheduler(true);
        } else {
          setNeedsProfile(true);
        }
      }
      setAuthEmail(""); setAuthPassword("");
    } catch(e) { setAuthError(e.message || "Auth error"); }
    setAuthBusy(false);
  };

  const handleSetProfile = async () => {
    if (!signupPersonId || !authUser) return;
    setAuthBusy(true); setAuthError("");
    try {
      const profiles = await dbAuth.getAllProfiles();
      if (profiles.some(p => p.person_id === signupPersonId && p.id !== authUser.id)) {
        setAuthError("This name is already registered to another account");
        setAuthBusy(false); return;
      }
      const personName = allPeople.find(p=>p.id===signupPersonId)?.name || signupPersonId;
      const role = signupPersonId === "admin" ? "admin" : "member";
      await dbAuth.upsertProfile({ id: authUser.id, person_id: signupPersonId, display_name: personName, role });
      setUserProfile({ person_id: signupPersonId, display_name: personName, role });
      setMySurgeon(signupPersonId);
      setNeedsProfile(false);
      if (signupPersonId === "admin") setIsScheduler(true);
    } catch(e) { setAuthError(e.message); }
    setAuthBusy(false);
  };

  const handleSignOut = async () => {
    await auth.signOut();
    biometric.unenroll();
    setAuthUser(null); setUserProfile(null); setNeedsProfile(false); setMySurgeon("");
    setBiometricEnrolled(false); setBiometricPending(false);
  };

  // ─── Supabase: Load on mount + real-time sync ───
  useEffect(() => {
    (async () => {
      try {
        const { data: row } = await supabase
          .from("call_schedule_data")
          .select("data,updated_at")
          .eq("id", "main")
          .single();
        if (row?.data) {
          const d = typeof row.data === "string" ? JSON.parse(row.data) : row.data;
          if (row.updated_at) lastSyncRef.current = row.updated_at; // prevent auto-save from re-saving unchanged data
          if (d.surgeons) setSurgeons(d.surgeons);
          if (d.apps) setApps(d.apps);
          if (d.vacations) setVacations(d.vacations);
          if (d.backupMondays) setBackupMondaySet(new Set(d.backupMondays));
          if (d.fierceBackup) setFierceBackupSet(new Set(d.fierceBackup));
          if (d.schedule) setSchedule(d.schedule);
          if (d.appShifts) setAppShifts(d.appShifts);
          if (d.priorCounts && Object.values(d.priorCounts).some(c => Object.values(c).some(v => v > 0))) setPriorCounts(d.priorCounts);
          if (d.year1Counts && Object.values(d.year1Counts).some(c => Object.values(c).some(v => v > 0))) setYear1Counts(d.year1Counts);
          if (d.year2Counts && Object.values(d.year2Counts).some(c => Object.values(c).some(v => v > 0))) setYear2Counts(d.year2Counts);
          if (d.startMonth !== undefined) setStartMonth(d.startMonth);
          if (d.startYear !== undefined) setStartYear(d.startYear);
          if (d.numWeeks) setNumWeeks(d.numWeeks);
          if (d.holidayAssignments) setHolidayAssignments(d.holidayAssignments);
        }
        const { data: cfgRow } = await supabase
          .from("call_schedule_config")
          .select("scheduler_pin,edge_function_url")
          .eq("id", "config")
          .single();
        if (cfgRow?.scheduler_pin) setSchedulerPin(cfgRow.scheduler_pin);
        if (cfgRow?.edge_function_url) setEdgeFunctionUrl(cfgRow.edge_function_url);
        // Load OneSignal API key from localStorage (not in DB for security)
        try { const osKey = localStorage.getItem("dsg-onesignal-key"); if (osKey) setOneSignalApiKey(osKey); } catch(e) {}

        // Load vacation requests
        try {

      }
      setLoaded(true);
      loadedAtRef.current = Date.now();

      // Merge 2026-2027 vacations & Fierce weeks (content-aware: re-runs if any expected entries are missing)
      try {
        if (typeof MAY_AUG_VACATIONS !== "undefined") {
          setVacations(prev => {
            // Check if all expected vacation ranges are present
            let allPresent = true;
            for (const [id, ranges] of Object.entries(MAY_AUG_VACATIONS)) {
              const existingList = prev[id] || [];
              for (const [s, e] of ranges) {
                const found = existingList.some(([es, ee]) => es === s && ee === e);
                if (!found) { allPresent = false; break; }
              }
              if (!allPresent) break;
            }
            if (allPresent) return prev; // Everything is already in place

            const n = { ...prev };
            // Clear existing May 2026 - Jan 2027 entries (to avoid duplicates)
            Object.keys(n).forEach(id => {
              if (Array.isArray(n[id])) {
                n[id] = n[id].filter(([s]) => {
                  const d = s.substring(0, 7);
                  return !((d >= "2026-05" && d <= "2026-12") || d === "2027-01");
                });
              }
            });
            // Add full vacation set
            Object.entries(MAY_AUG_VACATIONS).forEach(([id, ranges]) => {
              if (!n[id]) n[id] = [];
              ranges.forEach(([s, e]) => n[id].push([s, e]));
            });
            console.log("Merged/refreshed 2026-2027 vacations");

            // Force save vacations to Supabase after merge
            setTimeout(async () => {
              try {
                const { data: row } = await supabase.from("call_schedule_data").select("data").eq("id", "main").single();
                const d = typeof row.data === "string" ? JSON.parse(row.data) : row.data;
                // Rebuild vacations in the saved data
                Object.keys(d.vacations || {}).forEach(id => {
                  if (Array.isArray(d.vacations[id])) {
                    d.vacations[id] = d.vacations[id].filter(([s]) => {
                      const m = s.substring(0, 7);
                      return !((m >= "2026-05" && m <= "2026-12") || m === "2027-01");
                    });
                  }
                });
                Object.entries(MAY_AUG_VACATIONS).forEach(([id, ranges]) => {
                  if (!d.vacations[id]) d.vacations[id] = [];
                  ranges.forEach(([s, e]) => d.vacations[id].push([s, e]));
                });
                const ts = new Date().toISOString();
                await supabase.from("call_schedule_data").upsert({ id: "main", data: d, updated_at: ts });
                lastSyncRef.current = ts;
                console.log("Force-saved vacations to Supabase");
              } catch(e) { console.error("Vacation force save error:", e); }
            }, 2500);

            return n;
          });
        }
        // Fierce merges: only add missing entries (additive, safe to re-run)
        if (typeof MAY_AUG_FIERCE_PRIMARY !== "undefined") {
          setBackupMondaySet(prev => {
            const n = new Set(prev);
            let added = false;
            MAY_AUG_FIERCE_PRIMARY.forEach(m => { if (!n.has(m)) { n.add(m); added = true; } });
            return added ? n : prev;
          });
        }
        if (typeof MAY_AUG_FIERCE_BACKUP !== "undefined") {
          setFierceBackupSet(prev => {
            const n = new Set(prev);
            let added = false;
            MAY_AUG_FIERCE_BACKUP.forEach(m => { if (!n.has(m)) { n.add(m); added = true; } });
            return added ? n : prev;
          });
        }
      } catch(e) { console.error("Vacation merge error:", e); }

      // Import of the May-Aug 2026 hand-built schedule (content-aware: re-merges if missing/mismatched)
      try {
        if (typeof HAND_SCHEDULE_MAY_AUG !== "undefined") {
          const expectedEntries = Object.entries(HAND_SCHEDULE_MAY_AUG);
          setSchedule(prev => {
            // Check if hand-schedule is actually present in current state
            let needsMerge = false;
            for (const [mStr, wk] of expectedEntries) {
              const existing = prev[mStr];
              if (!existing || existing.dayCall !== wk.dayCall) { needsMerge = true; break; }
              if (existing.nights?.wknd !== wk.nights?.wknd) { needsMerge = true; break; }
            }
            if (!needsMerge) return prev; // Already in place — no change

            const next = { ...prev };
            expectedEntries.forEach(([mStr, wk]) => { next[mStr] = { ...wk }; });
            console.log("Imported/refreshed May-Aug 2026 hand-built schedule");

            // Force save to Supabase after merge (delayed to let React state flush)
            setTimeout(async () => {
              try {
                const { data: row } = await supabase.from("call_schedule_data").select("data").eq("id", "main").single();
                const d = typeof row.data === "string" ? JSON.parse(row.data) : row.data;
                Object.entries(HAND_SCHEDULE_MAY_AUG).forEach(([m, w]) => { d.schedule[m] = { ...w }; });
                const ts = new Date().toISOString();
                await supabase.from("call_schedule_data").upsert({ id: "main", data: d, updated_at: ts });
                lastSyncRef.current = ts;
                console.log("Force-saved hand-built schedule to Supabase");
              } catch(e) { console.error("Force save error:", e); }

            return next;

        if (cfgRow2?.edge_function_url !== undefined) setEdgeFunctionUrl(prev => cfgRow2.edge_function_url !== prev ? cfgRow2.edge_function_url : prev);

        try {

  // ─── Shift Trade: Cascade Detection ───
  // When a DC or Weekend swap happens, detect downstream conflicts and propose fixes
  const detectCascadeChanges = useCallback((sched, req) => {
    const changes = []; // { week, shiftKey, from, to, reason }
    const ids = surgeons.map(s => s.id);
    const nameOf = (id) => surgeons.find(s => s.id === id)?.name || id;
    const nightKeys = ["mon","tue","wed","thu"];

    const applySwap = (s, r) => {
      const n = JSON.parse(JSON.stringify(s));
      const wk1 = n[r.week_monday];
      if (!wk1) return n;
      if (r.shift_key === "dayCall") wk1.dayCall = r.to_surgeon_id;
      else if (r.shift_key === "wknd") wk1.nights = { ...wk1.nights, wknd: r.to_surgeon_id };
      else wk1.nights = { ...wk1.nights, [r.shift_key]: r.to_surgeon_id };
      if (r.return_week && r.return_shift) {
        const wk2 = n[r.return_week];
        if (wk2) {
          if (r.return_shift === "dayCall") wk2.dayCall = r.from_surgeon_id;
          else if (r.return_shift === "wknd") wk2.nights = { ...wk2.nights, wknd: r.from_surgeon_id };
          else wk2.nights = { ...wk2.nights, [r.return_shift]: r.from_surgeon_id };
        }
      }
      return n;
    };

    const afterSwap = applySwap(sched, req);

    // Check both weeks involved
    const weeksToCheck = [req.week_monday];
    if (req.return_week && req.return_week !== req.week_monday) weeksToCheck.push(req.return_week);

    for (const mStr of weeksToCheck) {
      const wk = afterSwap[mStr];
      if (!wk) continue;
      const dc = wk.dayCall;
      const nights = wk.nights || {};

      // RULE 1: DC surgeon cannot have a night in the same week
      if (dc) {
        for (const nk of nightKeys) {
          if (nights[nk] === dc) {
            // DC has a night conflict — try to give it to the OTHER surgeon in the trade
            const otherSurgeon = (dc === req.to_surgeon_id) ? req.from_surgeon_id : req.to_surgeon_id;
            // Check the other surgeon isn't already DC or has that night
            const otherHasConflict = otherSurgeon === wk.dayCall || nightKeys.some(k => k !== nk && nights[k] === otherSurgeon);
            // Also check consecutive night rule
            const nkIdx = nightKeys.indexOf(nk);
            const prevNight = nkIdx > 0 ? nights[nightKeys[nkIdx-1]] : null;
            const nextNight = nkIdx < 3 ? nights[nightKeys[nkIdx+1]] : null;
            const wouldBeConsecutive = prevNight === otherSurgeon || nextNight === otherSurgeon;

            if (!otherHasConflict && !wouldBeConsecutive) {
              changes.push({
                week: mStr, shiftKey: nk, from: dc, to: otherSurgeon,
                reason: `${nameOf(dc)} is now Service Week — ${SHIFT_LABELS[nk]} moves to ${nameOf(otherSurgeon)}`
              });
            } else {
              // Try the off surgeon
              const assigned = new Set([dc, ...Object.values(nights)].filter(Boolean));
              const offSurgeon = ids.find(id => !assigned.has(id));
              if (offSurgeon) {
                changes.push({
                  week: mStr, shiftKey: nk, from: dc, to: offSurgeon,
                  reason: `${nameOf(dc)} is now Service Week — ${SHIFT_LABELS[nk]} moves to ${nameOf(offSurgeon)} (off surgeon)`,
                  requiresApproval: true, approverId: offSurgeon
                });
              }
            }
          }
        }
        // DC surgeon cannot have weekend
        if (nights.wknd === dc) {
          const otherSurgeon = (dc === req.to_surgeon_id) ? req.from_surgeon_id : req.to_surgeon_id;
          const otherIsDC = otherSurgeon === wk.dayCall;
          if (!otherIsDC) {
            changes.push({
              week: mStr, shiftKey: "wknd", from: dc, to: otherSurgeon,
              reason: `${nameOf(dc)} is now Service Week — Weekend moves to ${nameOf(otherSurgeon)}`
            });
          } else {
            const assigned = new Set([dc, ...Object.values(nights)].filter(Boolean));
            const offSurgeon = ids.find(id => !assigned.has(id));
            if (offSurgeon) {
              changes.push({
                week: mStr, shiftKey: "wknd", from: dc, to: offSurgeon,
                reason: `${nameOf(dc)} is now Service Week — Weekend moves to ${nameOf(offSurgeon)} (off surgeon)`,
                requiresApproval: true, approverId: offSurgeon
              });
            }
          }
        }
      }
    }

    // RULE 2: Weekend swap → check Monday night of NEXT week
    const checkWeekendMonday = (weekMon, newWkndSurgeon) => {
      const mondayStrs = Object.keys(afterSwap).sort();
      const idx = mondayStrs.indexOf(weekMon);
      if (idx < 0 || idx >= mondayStrs.length - 1) return;
      const nextMon = mondayStrs[idx + 1];
      const nextWk = afterSwap[nextMon];
      if (!nextWk?.nights?.mon) return;
      if (nextWk.nights.mon === newWkndSurgeon) {
        // Weekend surgeon has Monday night next week — conflict
        const otherSurgeon = (newWkndSurgeon === req.to_surgeon_id) ? req.from_surgeon_id : req.to_surgeon_id;
        // Check other surgeon isn't DC next week
        const otherIsDC = otherSurgeon === nextWk.dayCall;
        // Check consecutive night
        const tueNight = nextWk.nights?.tue;
        const wouldBeConsecutive = tueNight === otherSurgeon;
        if (!otherIsDC && !wouldBeConsecutive) {
          changes.push({
            week: nextMon, shiftKey: "mon", from: newWkndSurgeon, to: otherSurgeon,
            reason: `${nameOf(newWkndSurgeon)} now has Weekend — Mon Night (next week) moves to ${nameOf(otherSurgeon)}`
          });
        } else {
          const assigned = new Set([nextWk.dayCall, ...Object.values(nextWk.nights)].filter(Boolean));
          const offSurgeon = ids.find(id => !assigned.has(id));
          if (offSurgeon) {
            changes.push({
              week: nextMon, shiftKey: "mon", from: newWkndSurgeon, to: offSurgeon,
              reason: `${nameOf(newWkndSurgeon)} now has Weekend — Mon Night (next week) moves to ${nameOf(offSurgeon)} (off surgeon)`,
              requiresApproval: true, approverId: offSurgeon
            });
          }
        }
      }
    };

    // Check weekend cascades
    if (req.shift_key === "wknd") checkWeekendMonday(req.week_monday, req.to_surgeon_id);
    if (req.return_shift === "wknd") checkWeekendMonday(req.return_week, req.from_surgeon_id);
    // Also check if a DC swap moved someone to weekend indirectly (from cascade)
    for (const ch of [...changes]) {
      if (ch.shiftKey === "wknd") checkWeekendMonday(ch.week, ch.to);
    }

    return changes;
  }, [surgeons]);

  // ─── Shift Trade Request: Accept (with cascade) ───
  const acceptTradeRequest = useCallback(async (req) => {
    try {
      // Detect cascade changes
      const cascades = detectCascadeChanges(schedule, req);
      const nameOf = (id) => surgeons.find(s => s.id === id)?.name || id;

      // If cascades exist, show confirmation with details
      if (cascades.length > 0) {
        const cascadeDesc = cascades.map(c => `  • ${c.reason}`).join("\n");
        const needsApproval = cascades.filter(c => c.requiresApproval);
        let msg = `Accepting this trade will also change:\n\n${cascadeDesc}`;
        if (needsApproval.length > 0) {
          msg += `\n\n⚠️ ${needsApproval.map(c => nameOf(c.approverId)).join(", ")} will be notified and must be available for the new assignment.`;
        }
        msg += "\n\nProceed with all changes?";
        if (!confirm(msg)) return;
      }

      await db.update("shift_trade_requests", req.id, { status: "accepted", reviewed_at: new Date().toISOString() });
      setTradeRequests(prev => prev.map(r => r.id === req.id ? { ...r, status: "accepted" } : r));
      pushUndo(schedule);
      setSchedule(p => {
        const n = { ...p };

        // Apply the primary swap
        const wk1 = { ...n[req.week_monday] };
        if (req.shift_key === "dayCall") wk1.dayCall = req.to_surgeon_id;
        else wk1.nights = { ...wk1.nights, [req.shift_key]: req.to_surgeon_id };
        n[req.week_monday] = wk1;

        // Apply the return swap
        if (req.return_week && req.return_shift) {
          const wk2 = { ...n[req.return_week] };
          if (req.return_shift === "dayCall") wk2.dayCall = req.from_surgeon_id;
          else wk2.nights = { ...wk2.nights, [req.return_shift]: req.from_surgeon_id };
          n[req.return_week] = wk2;
        }

        // Apply all cascade changes
        for (const ch of cascades) {
          const wkC = { ...n[ch.week] };
          wkC.nights = { ...wkC.nights, [ch.shiftKey]: ch.to };
          // Recalculate off surgeon
          const assigned = new Set([wkC.dayCall, ...Object.values(wkC.nights)].filter(Boolean));
          wkC.off = surgeons.map(s => s.id).find(id => !assigned.has(id)) || null;
          n[ch.week] = wkC;
        }

        // Recalculate off for primary swap weeks
        [req.week_monday, req.return_week].filter(Boolean).forEach(mStr => {
          const wk = { ...n[mStr] };
          const assigned = new Set([wk.dayCall, ...Object.values(wk.nights)].filter(Boolean));
          wk.off = surgeons.map(s => s.id).find(id => !assigned.has(id)) || null;
          n[mStr] = wk;
        });

        return n;
      });

      // Notify about the primary trade
      await addNotification("trade_accepted", "Shift Trade Accepted",
        `${req.to_surgeon_name} accepted: ${req.shift_label} (${req.week_monday}) with ${req.from_surgeon_name}`,
        { from_surgeon_id: req.from_surgeon_id, to_surgeon_id: req.to_surgeon_id });
      sendEmailNotif("trade_accepted", { from_name: req.from_surgeon_name, to_name: req.to_surgeon_name, shift: req.shift_label, week: req.week_monday });

      // Notify about each cascade change
      for (const ch of cascades) {
        const fromName = nameOf(ch.from);
        const toName = nameOf(ch.to);
        await addNotification("schedule_changed", "Shift Reassigned",
          `${SHIFT_LABELS[ch.shiftKey]} (${ch.week}) moved from ${fromName} to ${toName} due to trade`,
          { from_surgeon_id: ch.from, to_surgeon_id: ch.to, surgeon_id: ch.to });
      }
    } catch(e) { console.error("Accept trade error:", e); }
  }, [schedule, surgeons, pushUndo, addNotification, sendEmailNotif, detectCascadeChanges]);

    if (!file) return;
    setScanning(true);

    try {
      const ext = file.name.split(".").pop().toLowerCase();
      let rows = [];

      if (["xlsx","xls"].includes(ext)) {
        // Excel: parse with SheetJS
        const XLSX = await import("https://cdn.sheetjs.com/xlsx-0.20.0/package/xlsx.mjs");
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, {type:"array"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        rows = XLSX.utils.sheet_to_json(ws, {defval:0});
      } else {
        // CSV: parse manually
        const text = await file.text();
        const lines = text.trim().split("\n").map(l => l.split(",").map(c => c.trim()));
        if (lines.length > 1) {
          const headers = lines[0];
          for (let i = 1; i < lines.length; i++) {
            const row = {};
            headers.forEach((h, j) => row[h] = lines[i]?.[j] || "0");
            rows.push(row);
          }
        }
      }

      // Map rows to surgeon IDs

      surgeons.forEach(s => {
        nameToId[s.name.toUpperCase()] = s.id;
        nameToId[s.name] = s.id;
      });

      // Find the right columns (flexible header matching)
      const findCol = (row, patterns) => {
        for (const key of Object.keys(row)) {
          const k = key.toLowerCase().replace(/[^a-z]/g,"");
          for (const p of patterns) {
            if (k.includes(p)) return parseInt(row[key]) || 0;
          }
        }
        return 0;
      };

      const newCounts = {};
      let matched = 0;
      rows.forEach(row => {
        // Find surgeon name in first column or "Surgeon" column
        const nameVal = row["Surgeon"] || row["surgeon"] || row["Name"] || row["name"] || Object.values(row)[0] || "";
        const nameStr = String(nameVal).trim();
        const id = nameToId[nameStr] || nameToId[nameStr.toUpperCase()];
        if (!id) return;

        newCounts[id] = {
          dc: findCol(row, ["daycall","dayweek","dcweek","dc"]) || parseInt(Object.values(row)[1]) || 0,
          nights: findCol(row, ["night","ngt"]) || parseInt(Object.values(row)[2]) || 0,
          wknd: findCol(row, ["weekend","wknd","wkend"]) || parseInt(Object.values(row)[3]) || 0,
          dcB: findCol(row, ["backupday","bkpday","backupdaycall"]) || parseInt(Object.values(row)[4]) || 0,
          nightsB: findCol(row, ["backupnight","bkpnight"]) || parseInt(Object.values(row)[5]) || 0,
          wkndB: findCol(row, ["backupweekend","bkpwknd","backupwkend"]) || parseInt(Object.values(row)[6]) || 0,
        };
        matched++;
      });

      setPriorCounts(prev => ({ ...prev, ...newCounts }));
      setScanMsg(matched > 0
        ? `Imported counts for ${matched} surgeon${matched>1?"s":""}. Review and adjust if needed.`
        : "Could not match surgeon names. Make sure the first column has initials matching: " + surgeons.map(s=>s.name).join(", "));
    } catch (err) {
      console.error("Upload error:", err);
      setScanMsg("Could not parse the file. Use the CSV template or an Excel file with matching columns.");

    const buildCoverage = (hol, sA, sB) => {

        coverage.push({ date: hol.endDate, surgeon: sB, label: "New Year's Day 24h", day: DAYNAMES[parse(hol.endDate).getDay()] });

        let toggle = true;
        while (next.getDay() !== 0 && next.getDay() !== 1) {
          coverage.push({ date: fmt(next), surgeon: toggle ? sA : sB, label: DAYNAMES[next.getDay()] + " 24h", day: DAYNAMES[next.getDay()] });
          toggle = !toggle;
          next = addD(next, 1);
        }
      } else if (holDow === 1) {

        // Holiday Monday = Surgeon A 24h (already added above)

        const dayAfter = addD(holDate, 1);
        coverage.push({ date: fmt(dayAfter), surgeon: sB, label: DAYNAMES[dayAfter.getDay()] + " 24h", day: DAYNAMES[dayAfter.getDay()] });
      } else {

        let next = addD(holDate, 1);
        let toggle = false; // false=B, true=A
        while (next.getDay() !== 0 && next.getDay() !== 1) {
          coverage.push({ date: fmt(next), surgeon: toggle ? sA : sB, label: DAYNAMES[next.getDay()] + " 24h", day: DAYNAMES[next.getDay()] });
          toggle = !toggle;
          next = addD(next, 1);
        }
      }
      return coverage;
    };

    // Helper: pick best pair from a pool, considering vacation + fairness
    const pickPair = (hol, pool) => {
      const holDate = parse(hol.date);
      const dayAfterStr = fmt(addD(holDate, 1));
      const type = hol.type;

      // Filter by vacation availability; fall back to full pool if too few
      let avail = pool.filter(id => !onVac(id, hol.date, vacations) && !onVac(id, dayAfterStr, vacations));
      if (avail.length < 2) avail = [...pool];

      // Sort by fairness: lifetime holiday count → avoid repeat from prior year → random
      const prior = priorByName[hol.name] || {};
      avail.sort((a, b) => {
        // Prefer surgeons with fewer lifetime assignments of this type
        const la = (lifetimeCt[a]?.[type] || 0);
        const lb = (lifetimeCt[b]?.[type] || 0);
        if (la !== lb) return la - lb;
        // Avoid repeating the same holiday as last year
        const aRepeat = (a === prior.surgeonA || a === prior.surgeonB) ? 1 : 0;
        const bRepeat = (b === prior.surgeonA || b === prior.surgeonB) ? 1 : 0;
        if (aRepeat !== bRepeat) return aRepeat - bRepeat;
        return Math.random() - 0.5;
      });

      return { sA: avail[0], sB: avail[1] || avail[0] };
    };

    // ─── Process each group independently with distinct-pair constraint ───
    const majorHols = holidays.major.map(h => ({ ...h, type: "major" }));
    const minorHols = holidays.minor.map(h => ({ ...h, type: "minor" }));
    const assignments = [];

    [majorHols, minorHols].forEach(group => {
      const type = group[0]?.type;
      const usedInGroup = new Set(); // surgeons already assigned in this group

      // Sort: Christmas first (FAK locked), then by date
      group.sort((a, b) => {
        if (a.name === "Christmas Day") return -1;
        if (b.name === "Christmas Day") return 1;
        return a.date.localeCompare(b.date);
      });

      group.forEach(hol => {
        // Check for pre-set assignments (e.g., handwritten schedule for this year)
        const presets = (typeof HOLIDAY_PRESETS !== "undefined") ? HOLIDAY_PRESETS[String(year)] : null;
        if (presets && presets[hol.name]) {
          const [sA, sB] = presets[hol.name];
          usedInGroup.add(sA); usedInGroup.add(sB);
          assignments.push({
            name: hol.name, date: hol.date, type, emoji: hol.emoji || "📅",
            surgeonA: sA, surgeonB: sB, coverage: buildCoverage(hol, sA, sB),
          });
          return;
        }

        // Build available pool: all surgeons NOT yet used in this group
        let pool = ids.filter(id => !usedInGroup.has(id));

        // FAK locked to Christmas
        if (hol.name === "Christmas Day" && fakId) {
          const sA = fakId;
          const remaining = pool.filter(id => id !== fakId);
          // Pick best partner from remaining pool
          const holDate = parse(hol.date);
          const dayAfterStr = fmt(addD(holDate, 1));
          let partnerPool = remaining.filter(id => !onVac(id, hol.date, vacations) && !onVac(id, dayAfterStr, vacations));
          if (partnerPool.length === 0) partnerPool = remaining;
          const prior = priorByName["Christmas Day"] || {};
          partnerPool.sort((a, b) => {
            const la = (lifetimeCt[a]?.[type] || 0) - (lifetimeCt[b]?.[type] || 0);
            if (la) return la;
            const aR = (a === prior.surgeonB) ? 1 : 0;
            const bR = (b === prior.surgeonB) ? 1 : 0;
            if (aR !== bR) return aR - bR;
            return Math.random() - 0.5;
          });
          const sB = partnerPool[0] || remaining[0];
          usedInGroup.add(sA); usedInGroup.add(sB);
          assignments.push({
            name: hol.name, date: hol.date, type, emoji: hol.emoji || "📅",
            surgeonA: sA, surgeonB: sB, coverage: buildCoverage(hol, sA, sB),
          });
          return;
        }

        // If pool is too small (shouldn't happen with 7 surgeons & 3 holidays),
        // fall back to full list
        if (pool.length < 2) pool = [...ids];

        const { sA, sB } = pickPair(hol, pool);
        usedInGroup.add(sA); usedInGroup.add(sB);

        assignments.push({
          name: hol.name, date: hol.date, type, emoji: hol.emoji || "📅",
          surgeonA: sA, surgeonB: sB, coverage: buildCoverage(hol, sA, sB),
        });
      });
    });

    // Sort final assignments by date for display
    assignments.sort((a, b) => a.date.localeCompare(b.date));
    setHolidayAssignments(prev => ({ ...prev, [String(year)]: assignments }));
  }, [surgeons, vacations, holidayAssignments]);

  // ─── Swap a holiday surgeon ───
  const swapHolidaySurgeon = useCallback((year, holidayIdx, slot, newSurgeonId) => {
    // Check distinct-pair constraint: is this surgeon already assigned to another holiday in the same group?
    const arr = holidayAssignments[String(year)] || [];
    const targetHol = arr[holidayIdx];
    if (targetHol) {
      const sameGroup = arr.filter((h, i) => i !== holidayIdx && h.type === targetHol.type);
      const usedInGroup = new Set();
      sameGroup.forEach(h => { usedInGroup.add(h.surgeonA); usedInGroup.add(h.surgeonB); });
      if (usedInGroup.has(newSurgeonId)) {
        const conflictHol = sameGroup.find(h => h.surgeonA === newSurgeonId || h.surgeonB === newSurgeonId);
        const surgeonName = surgeons.find(s => s.id === newSurgeonId)?.name || newSurgeonId;
        if (!confirm(`⚠️ ${surgeonName} is already assigned to ${conflictHol?.name} (${targetHol.type} group).\n\nThis violates the distinct-pairs rule. Assign anyway?`)) return;
      }
    }
    setHolidayAssignments(prev => {
      const n = { ...prev };
      const arr = [...(n[String(year)] || [])];
      const hol = { ...arr[holidayIdx] };
      const sA = slot === "surgeonA" ? newSurgeonId : hol.surgeonA;
      const sB = slot === "surgeonB" ? newSurgeonId : hol.surgeonB;
      hol.surgeonA = sA;
      hol.surgeonB = sB;
      let nonEveIdx = 0;
      hol.coverage = hol.coverage.map((c) => {
        if (c.isEve) return { ...c, surgeon: sB };
        const surgeon = nonEveIdx % 2 === 0 ? sA : sB;
        nonEveIdx++;
        return { ...c, surgeon };
      });
      arr[holidayIdx] = hol;
      n[String(year)] = arr;
      return n;
    });
  }, [holidayAssignments, surgeons]);

  const swapShift = (mStr, shift, newId) => {
    const oldId = shift === "dayCall" ? schedule[mStr]?.dayCall : schedule[mStr]?.nights?.[shift];
    pushUndo(schedule);
    setSchedule(p => {
      const wk = {...p[mStr]};
      if(shift==="dayCall") wk.dayCall=newId;
      else wk.nights={...wk.nights,[shift]:newId};
      const assigned = new Set([wk.dayCall,...Object.values(wk.nights)].filter(Boolean));
      wk.off = surgeons.map(s=>s.id).find(id=>!assigned.has(id))||null;
      return {...p,[mStr]:wk};
    });
    setEditShift(null); setEditingWeek(null);
    setSwapSuggestions(null); setSwapTarget(null);
    // Notify about the change
    const oldName = sMap[oldId]?.name || "—";
    const newName = sMap[newId]?.name || "—";
    const shiftLabel = SHIFT_LABELS[shift] || shift;
    addNotification("schedule_changed", "Schedule Changed",
      `${shiftLabel} (wk of ${mStr}): ${oldName} → ${newName}`);
    sendEmailNotif("schedule_changed", { shift: shiftLabel, week: mStr, old_surgeon: oldName, new_surgeon: newName });
  };

  // ─── Smart Swap Suggestions ───
  const [swapTarget, setSwapTarget] = useState(null); // { mondayStr, shift, surgeonId }
  const [swapSuggestions, setSwapSuggestions] = useState(null); // [{ candidateId, score, reasons, returnSwaps }]
  const [editWeekModal, setEditWeekModal] = useState(null); // { mondayStr, draft: { dayCall, nights, apps, reason } } or null
  const [editWeekPick, setEditWeekPick] = useState(""); // dropdown selection on the Manual Adjustments card
  // Clear stale selection when the user navigates to a different month
  useEffect(() => { setEditWeekPick(""); }, [calMonth, calYear]);

  const findSwapSuggestions = useCallback((mondayStr, shift, currentSurgeonId) => {
    if (!schedule[mondayStr]) return;
    const currentName = sMap[currentSurgeonId]?.name || "?";
    const mon = parse(mondayStr);
    const ids = surgeons.map(s => s.id).filter(id => id !== currentSurgeonId);

    // Current shift counts from schedule
    const sCounts = {};
    surgeons.forEach(s => { sCounts[s.id] = { dc: 0, nights: 0, wknd: 0 }; });
    Object.values(schedule).forEach(wk => {
      if (wk.dayCall && sCounts[wk.dayCall]) sCounts[wk.dayCall].dc++;
      Object.entries(wk.nights || {}).forEach(([sk, sid]) => {
        if (!sid || !sCounts[sid]) return;
        if (sk === "wknd") sCounts[sid].wknd++;
        else sCounts[sid].nights++;
      });
    });

    // Determine shift type for counting
    const shiftType = shift === "dayCall" ? "dc" : shift === "wknd" ? "wknd" : "nights";

    // Check each candidate
    const candidates = [];
    ids.forEach(candId => {
      const candName = sMap[candId]?.name || "?";
      const reasons = [];
      let eligible = true;

      // 1. Check vacation conflict
      const dayOffset = { dayCall: 0, mon: 0, tue: 1, wed: 2, thu: 3, wknd: 4 }[shift] || 0;
      const shiftDate = fmt(addD(mon, dayOffset));
      if (shift === "dayCall") {
        for (let i = 0; i < 6; i++) {
          if (onVac(candId, fmt(addD(mon, i)), vacations)) { eligible = false; break; }
        }
      } else if (shift === "wknd") {
        const friDate = fmt(addD(mon, 4));
        const sunDate = fmt(addD(mon, 6));
        const nextMonDate = fmt(addD(mon, 7));
        if (onVac(candId, friDate, vacations) || onVac(candId, sunDate, vacations) || onVac(candId, nextMonDate, vacations)) eligible = false;
      } else {
        const nextDay = fmt(addD(mon, dayOffset + 1));
        if (onVac(candId, shiftDate, vacations) || onVac(candId, nextDay, vacations)) eligible = false;
      }
      if (!eligible) return;

      // 2. Check if candidate is already assigned DC that week (can't do night + DC)
      const wk = schedule[mondayStr];
      if (shift !== "dayCall" && wk.dayCall === candId) {
        reasons.push("Already on service week");
        return; // can't take a night/weekend if on DC
      }

      // 3. Check if candidate already has a shift that week they'd need to keep
      const candShiftsThisWeek = [];
      if (wk.dayCall === candId) candShiftsThisWeek.push("Service Week");
      Object.entries(wk.nights || {}).forEach(([sk, sid]) => {
        if (sid === candId) candShiftsThisWeek.push(SHIFT_LABELS[sk]);
      });

      // 4. Calculate fairness score — lower is better (candidate has fewer of this type)
      const currentCount = sCounts[currentSurgeonId]?.[shiftType] || 0;
      const candCount = sCounts[candId]?.[shiftType] || 0;
      const countDiff = currentCount - candCount; // positive = current has more → good swap

      // Include prior counts for total fairness
      const priorCurr = priorCounts[currentSurgeonId] || {};
      const priorCand = priorCounts[candId] || {};
      const totalCurrType = (priorCurr[shiftType === "dc" ? "dc" : shiftType === "wknd" ? "wknd" : "nights"] || 0) + (sCounts[currentSurgeonId]?.[shiftType] || 0);
      const totalCandType = (priorCand[shiftType === "dc" ? "dc" : shiftType === "wknd" ? "wknd" : "nights"] || 0) + (sCounts[candId]?.[shiftType] || 0);
      const totalDiff = totalCurrType - totalCandType;

      if (countDiff > 0) reasons.push(`${candName} has ${countDiff} fewer ${shiftType === "dc" ? "service weeks" : shiftType === "wknd" ? "weekends" : "nights"} this period`);
      else if (countDiff === 0) reasons.push(`Equal ${shiftType === "dc" ? "service weeks" : shiftType === "wknd" ? "weekends" : "nights"} this period`);
      else reasons.push(`${candName} has ${Math.abs(countDiff)} more ${shiftType === "dc" ? "service weeks" : shiftType === "wknd" ? "weekends" : "nights"} — less ideal`);

      if (totalDiff > 1) reasons.push(`${totalDiff} fewer overall (good for balance)`);

      if (candShiftsThisWeek.length > 0) reasons.push(`Already assigned: ${candShiftsThisWeek.join(", ")}`);

      // 5. Find possible return swaps — shifts the current surgeon could take from the candidate in another week
      const returnSwaps = [];
      Object.entries(schedule).forEach(([otherMon, otherWk]) => {
        if (otherMon === mondayStr) return;
        // Check if candidate has a shift of the same type in another week
        if (shiftType === "dc" && otherWk.dayCall === candId) {
          // Check current surgeon can do DC that week
          const otherMonDate = parse(otherMon);
          let canDo = true;
          for (let i = 0; i < 6; i++) { if (onVac(currentSurgeonId, fmt(addD(otherMonDate, i)), vacations)) { canDo = false; break; } }
          if (canDo) returnSwaps.push({ mondayStr: otherMon, shift: "dayCall", label: `Svc Wk (${otherMon})` });
        }
        if (shiftType === "nights") {
          NIGHT_KEYS.forEach((sk, i) => {
            if (otherWk.nights?.[sk] === candId && otherWk.dayCall !== currentSurgeonId) {
              const otherMonDate = parse(otherMon);
              const sd = fmt(addD(otherMonDate, i));
              const nd = fmt(addD(otherMonDate, i + 1));
              if (!onVac(currentSurgeonId, sd, vacations) && !onVac(currentSurgeonId, nd, vacations)) {
                returnSwaps.push({ mondayStr: otherMon, shift: sk, label: `${SHIFT_LABELS[sk]} (${otherMon})` });
              }
            }
          });
        }
        if (shiftType === "wknd" && otherWk.nights?.wknd === candId) {
          const otherMonDate = parse(otherMon);
          const f = fmt(addD(otherMonDate, 4)), su = fmt(addD(otherMonDate, 6)), nm = fmt(addD(otherMonDate, 7));
          if (!onVac(currentSurgeonId, f, vacations) && !onVac(currentSurgeonId, su, vacations) && !onVac(currentSurgeonId, nm, vacations) && otherWk.dayCall !== currentSurgeonId) {
            returnSwaps.push({ mondayStr: otherMon, shift: "wknd", label: `Weekend (${otherMon})` });
          }
        }
      });

      // Score: higher = better swap. Favor candidates with fewer shifts of this type.
      const score = (countDiff * 10) + (totalDiff * 5) + (returnSwaps.length > 0 ? 20 : 0) + (candShiftsThisWeek.length === 0 ? 10 : -5);

      candidates.push({ candidateId: candId, candidateName: candName, score, reasons, returnSwaps, countDiff, totalDiff, candShiftsThisWeek });
    });

    // Sort by score descending (best first)
    candidates.sort((a, b) => b.score - a.score);
    setSwapTarget({ mondayStr, shift, surgeonId: currentSurgeonId, surgeonName: currentName });
    setSwapSuggestions(candidates);
  }, [schedule, surgeons, sMap, vacations, priorCounts]);

  // ─── Execute a two-way swap ───
  const executeTwoWaySwap = useCallback((targetMon, targetShift, targetOldId, candId, returnMon, returnShift) => {
    pushUndo(schedule);
    setSchedule(p => {
      const n = { ...p };
      // Swap 1: candidate takes the target shift
      const wk1 = { ...n[targetMon] };
      if (targetShift === "dayCall") wk1.dayCall = candId;
      else wk1.nights = { ...wk1.nights, [targetShift]: candId };
      let assigned1 = new Set([wk1.dayCall, ...Object.values(wk1.nights)].filter(Boolean));
      wk1.off = surgeons.map(s => s.id).find(id => !assigned1.has(id)) || null;
      n[targetMon] = wk1;

      // Swap 2: original surgeon takes the candidate's return shift
      if (returnMon && returnShift) {
        const wk2 = { ...n[returnMon] };
        if (returnShift === "dayCall") wk2.dayCall = targetOldId;
        else wk2.nights = { ...wk2.nights, [returnShift]: targetOldId };
        let assigned2 = new Set([wk2.dayCall, ...Object.values(wk2.nights)].filter(Boolean));
        wk2.off = surgeons.map(s => s.id).find(id => !assigned2.has(id)) || null;
        n[returnMon] = wk2;
      }
      return n;
    });

    const oldName = sMap[targetOldId]?.name || "—";
    const newName = sMap[candId]?.name || "—";
    const shiftLabel = SHIFT_LABELS[targetShift] || targetShift;
    addNotification("schedule_changed", "Shift Swap",
      `${shiftLabel} (wk of ${targetMon}): ${oldName} ↔ ${newName}${returnMon ? ` (return: ${SHIFT_LABELS[returnShift]||returnShift} wk of ${returnMon})` : ""}`);
    sendEmailNotif("schedule_changed", { shift: shiftLabel, week: targetMon, old_surgeon: oldName, new_surgeon: newName });
    setSwapSuggestions(null); setSwapTarget(null);
  }, [surgeons, sMap, addNotification, sendEmailNotif]);

  // ─── Manual Weekly Edit (scheduler/admin) ───
  const openWeekEditor = useCallback((mondayStr) => {
    // wk may be undefined — that's OK. We're allowing the scheduler to create
    // a brand-new week entry (for ad-hoc coverage in periods the algorithm
    // doesn't cover, e.g. before the hand-written schedule starts).
    const wk = schedule[mondayStr] || {};
    const mon = parse(mondayStr);
    // Snapshot current APP assignments for each day of this week
    const appsDraft = {};
    for (let i = 0; i < 7; i++) {
      const d = addD(mon, i);
      const ds = fmt(d);
      appsDraft[ds] = appShifts[ds] || "";
    }
    setEditWeekModal({
      mondayStr,
      draft: {
        dayCall: wk.dayCall || "",
        nights: { ...(wk.nights || {}) },
        apps: appsDraft,
        reason: "",
      },
    });
  }, [schedule, appShifts]);

  const saveWeekEdits = useCallback(() => {
    if (!editWeekModal) return;
    const { mondayStr, draft } = editWeekModal;
    const oldWk = schedule[mondayStr] || {};
    const oldApps = {};
    Object.keys(draft.apps).forEach(ds => { oldApps[ds] = appShifts[ds] || ""; });

    // Build diff list of changes
    const changes = []; // { slotLabel, oldId, newId, isApp, date }
    if ((oldWk.dayCall || "") !== draft.dayCall) {
      changes.push({ slotLabel: `Service Week`, oldId: oldWk.dayCall || "", newId: draft.dayCall, isApp: false });
    }
    ["mon","tue","wed","thu","wknd"].forEach(nk => {
      const oldId = oldWk.nights?.[nk] || "";
      const newId = draft.nights?.[nk] || "";
      if (oldId !== newId) {
        changes.push({ slotLabel: SHIFT_LABELS[nk] || nk, oldId, newId, isApp: false });
      }
    });
    Object.entries(draft.apps).forEach(([ds, newAppId]) => {
      const oldAppId = oldApps[ds] || "";
      if ((oldAppId || "") !== (newAppId || "")) {
        changes.push({ slotLabel: `APP ${ds}`, oldId: oldAppId, newId: newAppId, isApp: true, date: ds });
      }
    });

    if (changes.length === 0) {
      setEditWeekModal(null);
      return;
    }
    // Safety confirmation if many changes at once
    if (changes.length >= 3) {
      if (!confirm(`You are changing ${changes.length} shifts in the week of ${mondayStr}. Continue?`)) return;
    }

    // Commit
    pushUndo(schedule);
    setSchedule(p => {
      const n = { ...p };
      const wk = { ...(n[mondayStr] || {}) };
      wk.dayCall = draft.dayCall || null;
      wk.nights = { ...(wk.nights || {}), ...draft.nights };
      // Recompute 'off' — any surgeon not assigned anywhere this week
      const assigned = new Set([wk.dayCall, ...Object.values(wk.nights)].filter(Boolean));
      wk.off = surgeons.map(s => s.id).find(id => !assigned.has(id)) || null;
      n[mondayStr] = wk;
      return n;
    });
    setAppShifts(p => {
      const n = { ...p };
      Object.entries(draft.apps).forEach(([ds, aid]) => {
        if (aid) n[ds] = aid;
        else delete n[ds];
      });
      return n;
    });

    // Notifications — to both old and new parties for each change (deduped)
    const notifiedIds = new Set();
    const reasonSuffix = draft.reason ? ` (${draft.reason})` : "";
    changes.forEach(c => {
      const oldName = c.isApp ? (aMap[c.oldId]?.name || (c.oldId ? c.oldId : "—")) : (sMap[c.oldId]?.name || "—");
      const newName = c.isApp ? (aMap[c.newId]?.name || (c.newId ? c.newId : "—")) : (sMap[c.newId]?.name || "—");
      const msg = `${c.slotLabel}: ${oldName} → ${newName}${reasonSuffix}`;
      addNotification("schedule_changed", "Manual Schedule Edit", msg);
      // Email each affected person once per save
      [c.oldId, c.newId].forEach(id => {
        if (id && !notifiedIds.has(id)) {
          notifiedIds.add(id);
          sendEmailNotif("schedule_changed", {
            shift: c.slotLabel,
            week: mondayStr,
            old_surgeon: oldName,
            new_surgeon: newName,
          });
        }
      });
    });

    setEditWeekModal(null);
  }, [editWeekModal, schedule, appShifts, surgeons, sMap, aMap, addNotification, sendEmailNotif, pushUndo]);

  // Generate shareable read-only HTML with calendar grid view
  const generateShareHTML = () => {
    const colors = surgeons.map((s,i) => ({name:s.name, tx:PAL[i%7].tx, bg:PAL[i%7].tg, bd:PAL[i%7].bd}));
    const colorMap = {}; surgeons.forEach((s,i) => colorMap[s.id] = colors[i]);
    const appColors = {}; apps.forEach((a,i) => appColors[a.id] = {name:a.name, tx:APP_PAL[i%4].tx, bg:APP_PAL[i%4].tg, bd:APP_PAL[i%4].bd});

    // Pre-generate ICS content per surgeon + full
    const icsMap = {};
    surgeons.forEach(s => {
      const ev = buildICSEvents(schedule, s.id, s.name, appShifts, aMap);
      icsMap[s.name] = generateICS(ev, "Call Schedule - " + s.name);
    });
    const allEv = [];
    surgeons.forEach(s => allEv.push(...buildICSEvents(schedule, s.id, s.name, appShifts, aMap)));
    Object.entries(appShifts).forEach(([ds, aid]) => {
      const d = parse(ds); const nx = addD(d, 1); const an = aMap?.[aid]?.name || aid;
      const dow = d.getDay(); const isWeekend = dow === 0 || dow === 6;
      const startHour = isWeekend ? 7 : 17;
      const timeLabel = isWeekend ? "7:00 AM - 7:00 AM" : "5:00 PM - 7:00 AM";
      allEv.push({ start: icsDate(d.getFullYear(),d.getMonth()+1,d.getDate(),startHour), end: icsDate(nx.getFullYear(),nx.getMonth()+1,nx.getDate(),7), summary: "APP Call - " + an, desc: "APP Call " + timeLabel });
    });
    icsMap["__full__"] = generateICS(allEv, "Full Call Schedule");

    let calBtns = surgeons.map(s => {
      const c = colorMap[s.id];
      return `<button onclick="dlCal('${s.name.replace(/'/g,"\\'")}')" class="cal-btn" style="background:${c.bg};color:${c.tx};border-color:${c.bd}">📅 ${c.name}</button>`;
    }).join("") + `<button onclick="dlCal('__full__')" class="cal-btn full-btn">📅 Full Schedule</button>`;

    // Build calendar grid data
    const buildCalData = () => {
      const d = {};
      Object.entries(schedule).forEach(([mStr,wk]) => {
        const mon = parse(mStr);
        const pfx = wk.isBackup ? "B-" : "";
        if(wk.dayCall){
          for(let i=0;i<5;i++){ const ds=fmt(addD(mon,i)); d[ds]=[...(d[ds]||[]),{type:pfx+"Svc",sid:wk.dayCall}]; }
          const sat=fmt(addD(mon,5)); d[sat]=[...(d[sat]||[]),{type:pfx+"Wknd",sid:wk.dayCall,note:"Sat 7a–7a"}];
        }
        NIGHT_KEYS.forEach((sk,i)=>{
          const sid=wk.nights?.[sk]; if(!sid) return;
          const ds=fmt(addD(mon,i)); d[ds]=[...(d[ds]||[]),{type:pfx+"Ngt",sid}];
        });
        const ws=wk.nights?.wknd;
        if(ws){
          d[fmt(addD(mon,4))]=[...(d[fmt(addD(mon,4))]||[]),{type:pfx+"Wknd",sid:ws}];
          d[fmt(addD(mon,6))]=[...(d[fmt(addD(mon,6))]||[]),{type:pfx+"Wknd",sid:ws}];
        }

      for (let i = 0; i < nightOrder.length - 1; i++) {

        if (a && a === b) {
