                        <th style={{...thS2,textAlign:"center",fontWeight:700,color:"#1a8040"}}>Total</th>
                      </tr>
                    </thead>
                    <tbody>
                      {surgeons.filter(s => isScheduler || !mySurgeon || mySurgeon === "admin" || s.id === mySurgeon).map(s=>{
                        const vals = sortedMonths.map(m => monthlyData[m]?.[s.id]?.total1st || 0);
                        const total = vals.reduce((a,b)=>a+b,0);
                        return (
                          <tr key={s.id} style={{borderBottom:"1px solid #e8ecf0"}}>
                            <td style={{padding:"4px 6px",position:"sticky",left:0,background:dk?"#16213e":"#fff",zIndex:1}}><Badge id={s.id} small/></td>
                            {vals.map((v,i)=><td key={i} style={{...tdS,textAlign:"center",fontSize:12,padding:"4px 3px",color:v===0?"#c0c8d0":undefined}}>{v||"–"}</td>)}
                            <td style={{...tdS,textAlign:"center",fontSize:13,fontWeight:700,color:"#1a8040"}}>{total}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                {/* 2nd Call (Backup) */}
                <div style={{fontSize:11,fontWeight:700,color:"#8a6a10",marginBottom:4}}>2nd Call (Backup)</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead>
                      <tr style={{borderBottom:"2px solid #d8c880"}}>
                        <th style={{...thS2,position:"sticky",left:0,background:dk?"#16213e":"#fff",zIndex:1}}>Surgeon</th>
                        {moLabels.map(m=><th key={m} style={{...thS2,textAlign:"center",minWidth:40}}>{m}</th>)}
                        <th style={{...thS2,textAlign:"center",fontWeight:700,color:"#8a6a10"}}>Total</th>
                      </tr>
                    </thead>
                    <tbody>
                      {surgeons.filter(s => isScheduler || !mySurgeon || mySurgeon === "admin" || s.id === mySurgeon).map(s=>{
                        const vals = sortedMonths.map(m => monthlyData[m]?.[s.id]?.total2nd || 0);
                        const total = vals.reduce((a,b)=>a+b,0);
                        return (
                          <tr key={s.id} style={{borderBottom:"1px solid #e8ecf0"}}>
                            <td style={{padding:"4px 6px",position:"sticky",left:0,background:dk?"#16213e":"#fff",zIndex:1}}><Badge id={s.id} small/></td>
                            {vals.map((v,i)=><td key={i} style={{...tdS,textAlign:"center",fontSize:12,padding:"4px 3px",color:v===0?"#c0c8d0":undefined}}>{v||"–"}</td>)}
                            <td style={{...tdS,textAlign:"center",fontSize:13,fontWeight:700,color:"#8a6a10"}}>{total}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <div style={{fontSize:11,color:"#7a8a98",lineHeight:1.5,marginTop:10}}>
                  <strong style={{color:"#2c5a80"}}>Formula:</strong> Service Week = 6 · Week Night = 1 · Weekend = 2. Multi-day shifts counted in the month they start.
                </div>
              </div>
            );
          })()}

          {/* Billing Summary — Scheduler/ADMIN only, month-by-month */}
          {(isScheduler || userProfile?.person_id === "admin") && Object.keys(schedule).length > 0 && (()=>{
            // Compute monthly billing breakdown. 1st-call only (backup weeks excluded).
            // Attribution:
            //   Service Week (dayCall) → month containing Monday (1 shift = 7 call days)
            //   Week Nights (Mon-Thu)  → each night's own month (1 shift = 1 call day)
            //   Weekend (Fri + Sun)    → month containing Friday (1 shift = 3 call days)
            const monthly = {}; // { "2026-05": { s1: { dc: n, nights: n, wknd: n }, ... } }
            const allMonths = new Set();
            Object.entries(schedule).forEach(([mStr, wk]) => {
              const mon = parse(mStr);
              for (let i = 0; i < 7; i++) {
                const d = addD(mon, i);
                const moKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
                allMonths.add(moKey);
                if (!monthly[moKey]) monthly[moKey] = {};
                surgeons.forEach(s => { if (!monthly[moKey][s.id]) monthly[moKey][s.id] = { dc:0, nights:0, wknd:0 }; });
              }
              // Skip backup weeks entirely — they're 2nd-call and not billed
              if (wk.isBackup) return;
              if (wk.dayCall) {
                const monMoKey = `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,"0")}`;
                if (monthly[monMoKey]?.[wk.dayCall]) monthly[monMoKey][wk.dayCall].dc += 1;
              }
              NIGHT_KEYS.forEach((sk, i) => {
                const sid = wk.nights?.[sk];
                if (!sid) return;
                const d = addD(mon, i);
                const moKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
                if (monthly[moKey]?.[sid]) monthly[moKey][sid].nights += 1;
              });
              const wkndSid = wk.nights?.wknd;
              if (wkndSid) {
                const fri = addD(mon, 4);
                const friMo = `${fri.getFullYear()}-${String(fri.getMonth()+1).padStart(2,"0")}`;
                if (monthly[friMo]?.[wkndSid]) monthly[friMo][wkndSid].wknd += 1;
              }
            });
            const sortedMonths = [...allMonths].sort();
            const moLabel = (mk) => { const [y,mo] = mk.split("-"); return `${MO[parseInt(mo)-1]} ${y}`; };
            const billingDays = (r) => (r.dc||0)*7 + (r.nights||0) + (r.wknd||0)*3;
            return (
            <div style={css.card}>
              <div style={css.cardT}>💰 Billing Summary <span style={{fontWeight:400,fontSize:11,color:"#7a8a98"}}>— Monthly, 1st Call Only</span></div>
              <p style={{fontSize:11,color:"#7a8a98",margin:"0 0 14px",lineHeight:1.5}}>
                Breakdown by calendar month. Backup weeks are excluded — only 1st-call shifts count toward billing. Shifts that span a month boundary are counted in the month they start (service week → Monday's month · weekend → Friday's month).
              </p>
              {sortedMonths.map(mk => {
                const monthData = monthly[mk] || {};
                const hasAny = surgeons.some(s => {
                  const r = monthData[s.id] || {};
                  return (r.dc||0) + (r.nights||0) + (r.wknd||0) > 0;
                });
                if (!hasAny) return null;
                return (
                  <div key={mk} style={{marginBottom:16}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#1a6fa8",marginBottom:4,textTransform:"uppercase",letterSpacing:0.8}}>{moLabel(mk)}</div>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                        <thead>
                          <tr style={{borderBottom:"1px solid #d0d8e0"}}>
                            <th style={thS2}>Surgeon</th>
                            <th style={{...thS2,color:"#1a8040"}}>Total Days</th>
                            <th style={thS2}>Svc Wk</th>
                            <th style={thS2}>Nights</th>
                            <th style={thS2}>Wknds</th>
                          </tr>
                        </thead>
                        <tbody>
                          {surgeons.map(s => {
                            const r = monthData[s.id] || {dc:0,nights:0,wknd:0};
                            const days = billingDays(r);
                            const empty = days === 0;
                            return (
                              <tr key={s.id} style={{borderBottom:"1px solid #e8ecf0",opacity:empty?0.45:1}}>
                                <td style={{padding:"5px 6px"}}><Badge id={s.id} small/></td>
                                <td style={{...tdS,color:empty?"#a0a8b0":"#1a8040",fontWeight:700,fontSize:14}}>{days||"–"}</td>
                                <td style={tdS}>{r.dc||"–"}</td>
                                <td style={tdS}>{r.nights||"–"}</td>
                                <td style={tdS}>{r.wknd||"–"}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })}
              <div style={{fontSize:11,color:"#7a8a98",lineHeight:1.5,marginTop:6}}>
                <strong style={{color:"#2c5a80"}}>Formula:</strong> Svc Wk × 7 + Nights × 1 + Weekends × 3 = Total Call Days. Billed monthly.
              </div>
            </div>
            );
          })()}

          {/* APP stats */}
          <div style={css.card}>
            <div style={css.cardT}>APP Distribution</div>
            {!Object.values(appStats).some(v=>v>0) ? (
              <p style={{color:"#7a8a98",fontSize:13}}>No APP shifts assigned yet.</p>
            ) : (
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{borderBottom:"2px solid #d0d8e0"}}>
                      <th style={thS}>APP</th>
                      <th style={thS}>Shifts</th>
                    </tr>
                  </thead>
                  <tbody>
                    {apps.map(a=>(
                      <tr key={a.id} style={{borderBottom:"1px solid #e8ecf0"}}>
                        <td style={{padding:"7px 8px"}}><AppBadge id={a.id}/></td>
                        <td style={tdS}>{appStats[a.id]||0}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* Vacation Days */}
          <div style={css.card}>
            <div style={css.cardT}>Vacation Days Used</div>
            {!Object.values(vacDays).some(v=>v>0) ? (
              <p style={{color:"#7a8a98",fontSize:13}}>No vacations entered yet.</p>
            ) : (
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{borderBottom:"2px solid #d0d8e0"}}>
                      <th style={thS}>Person</th>
                      <th style={thS}>Days Used</th>
                      <th style={thS}>Vacation Periods</th>
                    </tr>
                  </thead>
                  <tbody>
                    {surgeons.filter(s => isScheduler || !mySurgeon || mySurgeon === "admin" || s.id === mySurgeon).map(s=>{
                      const days = vacDays[s.id] || 0;
                      const ranges = vacations[s.id] || [];
                      return (
                        <tr key={s.id} style={{borderBottom:"1px solid #e8ecf0"}}>
                          <td style={{padding:"7px 8px"}}><Badge id={s.id}/></td>
                          <td style={{...tdS,fontWeight:700,color:days>0?"#60c0a0":"#3e4e5e",fontSize:15}}>{days}</td>
                          <td style={{padding:"7px 8px",fontSize:11,color:"#5a6a78",fontFamily:mono}}>
                            {ranges.map(([vs,ve],i)=>(
                              <span key={i}>{i>0?" · ":""}{vs} → {ve}</span>
                            ))}
                            {ranges.length===0 && <span style={{color:"#8a94a0"}}>—</span>}
                          </td>
                        </tr>
                      );
                    })}
                    {(isScheduler || mySurgeon === "admin" || apps.some(a => a.id === mySurgeon)) && apps.filter(a => isScheduler || mySurgeon === "admin" || a.id === mySurgeon).map(a=>{
                      const days = vacDays[a.id] || 0;
                      const ranges = vacations[a.id] || [];
                      if (!days && !ranges.length) return null;
                      return (
                        <tr key={a.id} style={{borderBottom:"1px solid #e8ecf0"}}>
                          <td style={{padding:"7px 8px"}}><AppBadge id={a.id}/></td>
                          <td style={{...tdS,fontWeight:700,color:days>0?"#60c0a0":"#3e4e5e",fontSize:15}}>{days}</td>
                          <td style={{padding:"7px 8px",fontSize:11,color:"#5a6a78",fontFamily:mono}}>
                            {ranges.map(([vs,ve],i)=>(
                              <span key={i}>{i>0?" · ":""}{vs} → {ve}</span>
                            ))}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* Fairness — based on 1-YEAR totals (scheduler/admin only) */}
          {(isScheduler || mySurgeon === "admin") && Object.values(stats).some(s=>s.dc>0) && (
            <div style={css.card}>
              <div style={css.cardT}>Fairness Check <span style={{fontWeight:400,fontSize:11,color:"#7a8a98"}}>— 1-Year (Prior + This Period)</span></div>
              <p style={{fontSize:12,color:"#7a8a98",margin:"0 0 10px",lineHeight:1.5}}>
                Evaluated against 1-year running totals. Enter current year prior counts in the Totals tab.
              </p>
              {(()=>{
                const v=fn=>surgeons.map(s=>fn(cum1yr[s.id]||{}));
                const sp=arr=>Math.max(...arr)-Math.min(...arr);
                const totalArr = surgeons.map(s=>calcShifts(cum1yr[s.id]||{}));
                const tSp = sp(totalArr);
                const tOk = tSp <= 7;
                return <>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:"8px 12px",background:tOk?"#e8f8e8":"#fef8e8",border:`1px solid ${tOk?"#b0d8b0":"#302810"}`,borderRadius:7}}>
                    <span style={{fontSize:16}}>{tOk?"✅":"⚠️"}</span>
                    <span style={{fontSize:13,fontWeight:700,color:tOk?"#60e0a0":"#e0a060"}}>
                      Total Call Days (1yr): spread {tSp} (min {Math.min(...totalArr)}, max {Math.max(...totalArr)}) — {tOk?"Fair":"Review recommended"}
                    </span>
                  </div>
                  {[
                    ["Service Wk (reg)", v(s=>s.dc||0)],
                    ["Nights (reg)", v(s=>s.nights||0)],
                    ["Weekends (reg)", v(s=>s.wknd||0)],
                    ["Service Wk (backup)", v(s=>s.dcB||0)],
                    ["Nights (backup)", v(s=>s.nightsB||0)],
                    ["Weekends (backup)", v(s=>s.wkndB||0)],
                  ].map(([label,arr])=>{
                    const s=sp(arr); const ok=s<=2;
                    return (
                      <div key={label} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                        <span style={{fontSize:15}}>{ok?"✅":"⚠️"}</span>
                        <span style={{fontSize:12,color:ok?"#50b070":"#b09040"}}>
                          {label}: spread {s} (min {Math.min(...arr)}, max {Math.max(...arr)}) — {ok?"Fair":"Review"}
                        </span>
                      </div>
                    );
                  })}
                </>;
              })()}
            </div>
          )}

          {/* Running Totals — 1yr, 2yr, multi-year */}
          {Object.values(stats).some(s=>s.dc>0) && (
            <div style={css.card}>
              <div style={css.cardT}>Running Totals <span style={{fontWeight:400,fontSize:11,color:"#7a8a98"}}>— Prior + This Period</span></div>

              {[
                {label:"1-Year", color:"#1a6fa8", data:cum1yr},
                {label:"2-Year", color:"#8a6a10", data:cum2yr},
                {label:"Multi-Year", color:"#7030a8", data:cumStats},
              ].map(tier=>(
                <div key={tier.label} style={{marginBottom:16}}>
                  <div style={{fontSize:12,fontWeight:700,color:tier.color,marginBottom:4,textTransform:"uppercase",letterSpacing:0.8}}>{tier.label}</div>
                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead>
                        <tr style={{borderBottom:"1px solid #d0d8e0"}}>
                          <th style={thS2}>Surgeon</th>
                          <th style={{...thS2,color:tier.color}}>Total</th>
                          <th style={thS2}>Svc Wk</th><th style={thS2}>Nights</th><th style={thS2}>Wknds</th><th style={thS2}>Off</th>
                          {showBackupStats && <><th style={{...thS2,borderLeft:"1px solid #d8c880"}}>B-SW</th><th style={thS2}>B-Ngt</th><th style={thS2}>B-Wknd</th><th style={thS2}>B-Off</th></>}
                        </tr>
                      </thead>
                      <tbody>
                        {surgeons.filter(s => isScheduler || !mySurgeon || mySurgeon === "admin" || s.id === mySurgeon).map(s=>{
                          const c=tier.data[s.id]||{};
                          const total = calcTotal(c);
                          return (
                            <tr key={s.id} style={{borderBottom:"1px solid #e8ecf0"}}>
                              <td style={{padding:"5px 6px"}}><Badge id={s.id} small/></td>
                              <td style={{...tdS,color:tier.color,fontWeight:700,fontSize:14}}>{total}</td>
                              {[c.dc,c.nights,c.wknd,c.off].map((v,i)=>
                                <td key={i} style={{...tdS,fontWeight:600}}>{v||0}</td>
                              )}
                              {showBackupStats && [c.dcB,c.nightsB,c.wkndB,c.offB].map((v,i)=>
                                <td key={"b"+i} style={{...tdS,fontWeight:600,...(i===0?{borderLeft:"1px solid #d8c880"}:{})}}>{v||0}</td>
                              )}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              ))}

              <div style={{fontSize:11,color:"#7a8a98",lineHeight:1.5}}>
                <strong style={{color:"#2c5a80"}}>Total</strong> = 1st Call + 2nd Call. Service Week = 6, Week Night = 1, Weekend = 2.
              </div>
            </div>
          )}
        </>}

        {/* ════════════════ MY SCHEDULE ════════════════ */}
        {view==="myschedule"&&<>
          <div style={css.card}>
            <div style={css.cardT}>My Call Schedule</div>
            <p style={{fontSize:13,color:"#5a6a78",margin:"0 0 12px",lineHeight:1.5}}>
              {userProfile ? `Showing schedule for ${userProfile.display_name}.` : "Select your name to see only your shifts and vacations."}
              {isScheduler && " As scheduler, you can view any surgeon's schedule."}
            </p>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:16}}>
              <select value={mySurgeon} onChange={e=>setMySurgeon(e.target.value)} style={{...css.inp,width:180,fontSize:14}}>
                <option value="">Select your name…</option>
                {surgeons.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
              {mySurgeon && (
                <button onClick={()=>downloadMyCal(mySurgeon)} style={{...css.btn(true),padding:"8px 18px"}}>
                  📅 Download My Calendar (.ics)
                </button>
              )}
            </div>
          </div>

          {mySurgeon && Object.keys(schedule).length > 0 && (() => {
            const myId = mySurgeon;
            const myName = sMap[myId]?.name || "?";
            const myVacs = vacations[myId] || [];

            // Build my shifts
            const myShifts = [];
            Object.entries(schedule).forEach(([mStr, wk]) => {
              const mon = parse(mStr);
              const endStr = fmt(addD(mon, 6));
              const roles = [];
              if (wk.dayCall === myId) roles.push({type: "Service Week (incl. Sat)", icon: "🏥", detail: "M–F 7a–5p + Sat 7a–Sun 7a", color: "#1a6fa8", shiftKey: "dayCall"});
              NIGHT_KEYS.forEach((sk, i) => {
                if (wk.nights?.[sk] === myId) roles.push({type: SHIFT_LABELS[sk], icon: "🌙", detail: SHIFT_TIMES[sk], color: "#6030a0", shiftKey: sk});
              });
              if (wk.nights?.wknd === myId) roles.push({type: "Weekend", icon: "🌗", detail: SHIFT_TIMES.wknd, color: "#7a6030", shiftKey: "wknd"});
              if (wk.off === myId) roles.push({type: "OFF", icon: "✅", detail: "No call this week", color: "#2a7a40", shiftKey: null});
              if (roles.length > 0) {
                myShifts.push({ mStr, endStr, roles, isBackup: wk.isBackup, isFierceBackup: wk.isFierceBackup });
              }
            });

            return (
              <>
                <div style={{fontSize:15,fontWeight:700,color:"#1a2a3a",marginBottom:12}}>
                  <Badge id={myId}/> <span style={{marginLeft:8}}>{MO[startMonth]} – {MO[endMoIdx]} {startYear}</span>
                </div>

                {/* My Vacations */}
                {myVacs.length > 0 && (
                  <div style={{...css.card,background:"#fef8f0",border:"1px solid #e8d8c0"}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#8a6a10",marginBottom:6}}>🏖 My Vacations</div>
                    {myVacs.map(([vs,ve],i) => (
                      <div key={i} style={{fontSize:13,color:"#5a5030",marginBottom:3}}>{vs} → {ve}</div>
                    ))}
                  </div>
                )}

                {/* My Shifts */}
                {myShifts.map(wk => (
                  <div key={wk.mStr} style={{...css.card,padding:12,marginBottom:8,border:wk.isBackup?"1px solid #e8d090":"1px solid #e0e4ea"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:4}}>
                      <span style={{fontFamily:mono,fontSize:13,color:wk.isBackup?"#8a6a10":"#1a6fa8",fontWeight:600}}>{wk.mStr} → {wk.endStr}</span>
                      {wk.isBackup && <span style={css.backupBanner}>⚡ BACKUP</span>}
                      {wk.isFierceBackup && <span style={{fontSize:11,color:"#1a6fa8",background:"#e8f0fc",border:"1px solid #a8c8e0",borderRadius:6,padding:"2px 8px",fontWeight:600}}>🛡 Fierce Backup</span>}
                    </div>
                    {wk.roles.map((r,i) => (
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",background:"#f8f9fb",borderRadius:5,border:"1px solid #e8ecf0",marginBottom:3}}>
                        <span style={{fontSize:14}}>{r.icon}</span>
                        <span style={{fontSize:13,fontWeight:600,color:r.color}}>{r.type}</span>
                        <span style={{fontSize:11,color:"#8a94a0",fontFamily:mono}}>{r.detail}</span>
                        {r.shiftKey && (
                          <button onClick={()=>{findSwapSuggestions(wk.mStr, r.shiftKey, myId); setView("calendar");}}
                            style={{marginLeft:"auto",background:"#f0e8fc",border:"1px solid #c8b0e0",color:"#6030a0",borderRadius:5,padding:"2px 10px",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:font}}>
                            🔄 Find Swap
                          </button>
                        )}
                      </div>
                    ))}
                  </div>
                ))}

                {myShifts.length === 0 && (
                  <div style={{...css.card,textAlign:"center",color:"#8a94a0",padding:30}}>No shifts assigned yet. Generate a schedule first.</div>
                )}
              </>
            );
          })()}

          {!mySurgeon && (
            <div style={{...css.card,textAlign:"center",color:"#8a94a0",padding:30}}>Select your name above to view your schedule.</div>
          )}
        </>}

        {/* ════════════════ REQUESTS ════════════════ */}
        {view==="requests"&&<>
          {/* Submit Vacation Request */}
          <div style={css.card}>
            <div style={css.cardT}>🏖 Request Vacation</div>
            <p style={{fontSize:13,color:"#5a6a78",margin:"0 0 12px",lineHeight:1.5}}>
              Submit a vacation request. It will be reviewed at the regular Friday meeting.
            </p>
            <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap",marginBottom:8}}>
              {isScheduler ? (
                <div>
                  <label style={{fontSize:11,color:"#7a8a98",display:"block",marginBottom:2}}>Person</label>
                  <select value={vacReqSurgeon} onChange={e=>setVacReqSurgeon(e.target.value)} style={{...css.inp,width:140}}>
                    <option value="">Select…</option>
                    <optgroup label="Surgeons">
                      {surgeons.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                    </optgroup>
                    <optgroup label="APPs">
                      {apps.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
                    </optgroup>
                  </select>
                </div>
              ) : (
                <div>
                  <label style={{fontSize:11,color:"#7a8a98",display:"block",marginBottom:2}}>Requesting for</label>
                  <div style={{fontSize:13,fontWeight:600,color:"#1a6fa8",padding:"6px 0"}}>{[...surgeons,...apps].find(p=>p.id===mySurgeon)?.name || "—"}</div>
                </div>
              )}
              <div>
                <label style={{fontSize:11,color:"#7a8a98",display:"block",marginBottom:2}}>Start Date</label>
                <input type="date" value={vacReqStart} onChange={e=>setVacReqStart(e.target.value)} style={{...css.inp,width:150}}/>
              </div>
              <div>
                <label style={{fontSize:11,color:"#7a8a98",display:"block",marginBottom:2}}>End Date</label>
                <input type="date" value={vacReqEnd} onChange={e=>setVacReqEnd(e.target.value)} style={{...css.inp,width:150}}/>
              </div>
              <button onClick={submitVacRequest} style={{...css.btn(true),padding:"7px 18px"}}>Submit Request</button>
            </div>
            <div>
              <label style={{fontSize:11,color:"#7a8a98",display:"block",marginBottom:2}}>Reason (optional)</label>
              <input value={vacReqReason} onChange={e=>setVacReqReason(e.target.value)} placeholder="Conference, personal, etc."
                style={{...css.inp,width:"100%",maxWidth:400}}/>
            </div>
          </div>

          {/* Pending Requests — Grouped by Person */}
          {(()=>{
            const pending = myVacRequests.filter(r => r.status === "pending");
            const reviewed = myVacRequests.filter(r => r.status !== "pending");

            // Group pending by surgeon_id
            const pendingGroups = {};
            pending.forEach(r => {
              if (!pendingGroups[r.surgeon_id]) pendingGroups[r.surgeon_id] = [];
              pendingGroups[r.surgeon_id].push(r);
            });
            // Sort groups: surgeons first (by order), then APPs
            const allPeople = [...surgeons, ...apps];
            const groupOrder = allPeople.map(p => p.id).filter(id => pendingGroups[id]);

            // Helper to format date range compactly
            const shortRange = (s, e) => {
              const sp = s.split("-"), ep = e.split("-");
              const sm = MO[parseInt(sp[1])-1]?.slice(0,3), sd = parseInt(sp[2]);
              const em = MO[parseInt(ep[1])-1]?.slice(0,3), ed = parseInt(ep[2]);
              if (s === e) return `${sm} ${sd}`;
              if (sp[1] === ep[1]) return `${sm} ${sd}–${ed}`;
              return `${sm} ${sd} – ${em} ${ed}`;
            };

            // Group reviewed by surgeon_id
            const reviewedGroups = {};
            reviewed.forEach(r => {
              if (!reviewedGroups[r.surgeon_id]) reviewedGroups[r.surgeon_id] = [];
              reviewedGroups[r.surgeon_id].push(r);
            });
            const reviewedGroupOrder = allPeople.map(p => p.id).filter(id => reviewedGroups[id]);

            return <>
              <div style={css.card}>
                <div style={css.cardT}>⏳ Pending Requests <span style={{fontWeight:400,fontSize:12,color:"#8a94a0"}}>— {pending.length}</span></div>
                {pending.length === 0 ? (
                  <p style={{color:"#8a94a0",fontSize:13}}>No pending requests.</p>
                ) : groupOrder.map(pid => {
                  const reqs = pendingGroups[pid];
                  const expanded = expandedVacGroups["p_"+pid];
                  return <div key={pid} style={{marginBottom:6,border:"1px solid #e8d8c0",borderRadius:8,overflow:"hidden",background:"#fef8f0"}}>
                    {/* Collapsed header row */}
                    <div onClick={()=>toggleVacGroup("p_"+pid)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",cursor:"pointer",flexWrap:"wrap"}}>
                      <span style={{fontSize:10,color:"#b0a080",transition:"transform 0.15s",transform:expanded?"rotate(90deg)":"rotate(0deg)"}}>▶</span>
                      {sMap[pid] ? <Badge id={pid}/> : <AppBadge id={pid}/>}
                      <span style={{fontSize:11,color:"#c09030",fontWeight:600,background:"#fef3e0",padding:"1px 8px",borderRadius:10,border:"1px solid #e8d090"}}>{reqs.length} pending</span>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginLeft:"auto"}}>
                        {reqs.map(r => <span key={r.id} style={{fontFamily:mono,fontSize:11,color:"#8a7a60",background:"#f8f0e0",padding:"1px 7px",borderRadius:4,border:"1px solid #e8dcc0"}}>{shortRange(r.start_date,r.end_date)}</span>)}
                      </div>
                    </div>
                    {/* Expanded detail rows */}
                    {expanded && <div style={{borderTop:"1px solid #e8d8c0",padding:"4px 12px 8px"}}>
                      {reqs.map(r => <div key={r.id} style={{padding:"8px 0",borderBottom:"1px solid #f0e8d8"}}>
                        {editingVacReq?.id === r.id ? (
                          <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap"}}>
                            <div>
                              <label style={{fontSize:10,color:"#7a8a98",display:"block"}}>Start</label>
                              <input type="date" value={editingVacReq.start_date} onChange={e=>setEditingVacReq(p=>({...p,start_date:e.target.value}))} style={{...css.inp,width:140,fontSize:12}}/>
                            </div>
                            <div>
                              <label style={{fontSize:10,color:"#7a8a98",display:"block"}}>End</label>
                              <input type="date" value={editingVacReq.end_date} onChange={e=>setEditingVacReq(p=>({...p,end_date:e.target.value}))} style={{...css.inp,width:140,fontSize:12}}/>
                            </div>
                            <div>
                              <label style={{fontSize:10,color:"#7a8a98",display:"block"}}>Reason</label>
                              <input value={editingVacReq.reason||""} onChange={e=>setEditingVacReq(p=>({...p,reason:e.target.value}))} style={{...css.inp,width:140,fontSize:12}}/>
                            </div>
                            <button onClick={saveVacRequestEdit} style={{...css.btn(true),padding:"5px 12px",fontSize:11}}>Save</button>
                            <button onClick={()=>setEditingVacReq(null)} style={{...css.btn(false),padding:"5px 12px",fontSize:11}}>Cancel</button>
                          </div>
                        ) : (
                          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                            <span style={{fontFamily:mono,fontSize:13,color:"#2c3e50",minWidth:130}}>{r.start_date} → {r.end_date}</span>
                            {r.reason && <span style={{fontSize:12,color:"#7a8a98",fontStyle:"italic"}}>"{r.reason}"</span>}
                            <span style={{fontSize:11,color:"#a0a8b0"}}>Submitted {new Date(r.submitted_at).toLocaleDateString()}</span>
                            {isScheduler && (
                              <div style={{marginLeft:"auto",display:"flex",gap:6}}>
                                <button onClick={()=>approveVacRequest(r)} style={{background:"#e8f8e8",border:"1px solid #a0d8a0",color:"#1a8040",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:font}}>✓ Approve</button>
                                <button onClick={()=>{const note=prompt("Reason for denial (optional):"); if(note!==null) denyVacRequest(r,note);}} style={{background:"#fce8e8",border:"1px solid #e0b0b0",color:"#c04040",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:font}}>✕ Deny</button>
                              </div>
                            )}
                            {!isScheduler && <span style={{marginLeft:"auto",fontSize:11,color:"#c09030",fontWeight:600,background:"#fef8e8",padding:"2px 8px",borderRadius:4,border:"1px solid #e8d090"}}>Pending review</span>}
                            <button onClick={()=>setEditingVacReq({id:r.id,start_date:r.start_date,end_date:r.end_date,reason:r.reason||""})} style={{background:"none",border:"1px solid #d0d8e0",color:"#5a6a78",borderRadius:5,padding:"2px 8px",fontSize:10,cursor:"pointer",fontFamily:font}}>✎ Edit</button>
                            <button onClick={()=>deleteVacRequest(r.id)} style={{background:"none",border:"1px solid #e0c0c0",color:"#904040",borderRadius:5,padding:"2px 8px",fontSize:10,cursor:"pointer",fontFamily:font}}>Withdraw</button>
                          </div>
                        )}
                      </div>)}
                    </div>}
                  </div>;
                })}
                {pending.length > 0 && !isScheduler && (
                  <p style={{fontSize:12,color:"#8a94a0",margin:"10px 0 0",lineHeight:1.5}}>
                    Only the scheduler can approve or deny requests. Enter the scheduler PIN in ⚙️ Settings to unlock.
                  </p>
                )}
              </div>

              {reviewed.length > 0 && (
                <div style={css.card}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={css.cardT}>📋 Reviewed <span style={{fontWeight:400,fontSize:12,color:"#8a94a0"}}>— {reviewed.length}</span></div>
                    {isScheduler && reviewed.length > 0 && (
                      <button onClick={clearReviewedRequests} style={{background:"none",border:"1px solid #e8c0c0",color:"#904040",borderRadius:5,padding:"3px 10px",fontSize:10,cursor:"pointer",fontFamily:font}}>Clear All Reviewed</button>
                    )}
                  </div>
                  {reviewedGroupOrder.map(pid => {
                    const reqs = reviewedGroups[pid];
                    const expanded = expandedVacGroups["r_"+pid];
                    const approvedCt = reqs.filter(r=>r.status==="approved").length;
                    const deniedCt = reqs.filter(r=>r.status==="denied").length;
                    const revokedCt = reqs.filter(r=>r.status==="revoked").length;
                    return <div key={pid} style={{marginBottom:5,border:"1px solid #d8e0d8",borderRadius:7,overflow:"hidden",background:"#f8faf8"}}>
                      <div onClick={()=>toggleVacGroup("r_"+pid)} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",cursor:"pointer",flexWrap:"wrap"}}>
                        <span style={{fontSize:10,color:"#a0b0a0",transition:"transform 0.15s",transform:expanded?"rotate(90deg)":"rotate(0deg)"}}>▶</span>
                        {sMap[pid] ? <Badge id={pid}/> : <AppBadge id={pid}/>}
                        {approvedCt > 0 && <span style={{fontSize:10,fontWeight:600,color:"#1a8040"}}>✓ {approvedCt}</span>}
                        {deniedCt > 0 && <span style={{fontSize:10,fontWeight:600,color:"#c04040"}}>✕ {deniedCt}</span>}
                        {revokedCt > 0 && <span style={{fontSize:10,fontWeight:600,color:"#8a8a40"}}>↩ {revokedCt}</span>}
                        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginLeft:"auto"}}>
                          {reqs.slice(0,6).map(r => <span key={r.id} style={{fontFamily:mono,fontSize:10,color:r.status==="approved"?"#4a8a4a":r.status==="revoked"?"#8a8a40":"#a06060",background:r.status==="approved"?"#e8f4e8":r.status==="revoked"?"#f4f4e8":"#f8e8e8",padding:"1px 6px",borderRadius:4,border:`1px solid ${r.status==="approved"?"#c0e0c0":r.status==="revoked"?"#d8d8c0":"#e0c0c0"}`}}>{shortRange(r.start_date,r.end_date)}</span>)}
                          {reqs.length > 6 && <span style={{fontSize:10,color:"#a0a8b0"}}>+{reqs.length-6}</span>}
                        </div>
                      </div>
                      {expanded && <div style={{borderTop:"1px solid #d8e0d8",padding:"4px 12px 6px"}}>
                        {reqs.map(r => <div key={r.id} style={{padding:"6px 0",borderBottom:"1px solid #e8f0e8"}}>
                          {editingVacReq?.id === r.id ? (
                            <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap"}}>
                              <div>
                                <label style={{fontSize:10,color:"#7a8a98",display:"block"}}>Start</label>
                                <input type="date" value={editingVacReq.start_date} onChange={e=>setEditingVacReq(p=>({...p,start_date:e.target.value}))} style={{...css.inp,width:140,fontSize:12}}/>
                              </div>
                              <div>
                                <label style={{fontSize:10,color:"#7a8a98",display:"block"}}>End</label>
                                <input type="date" value={editingVacReq.end_date} onChange={e=>setEditingVacReq(p=>({...p,end_date:e.target.value}))} style={{...css.inp,width:140,fontSize:12}}/>
                              </div>
                              <button onClick={saveVacRequestEdit} style={{...css.btn(true),padding:"4px 10px",fontSize:11}}>Save</button>
                              <button onClick={()=>setEditingVacReq(null)} style={{...css.btn(false),padding:"4px 10px",fontSize:11}}>Cancel</button>
                            </div>
                          ) : (
                            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                              <span style={{fontSize:13,fontWeight:700,color:r.status==="approved"?"#1a8040":r.status==="revoked"?"#8a8a40":"#c04040"}}>{r.status==="approved"?"✓":r.status==="revoked"?"↩":"✕"}</span>
                              <span style={{fontFamily:mono,fontSize:12,color:"#2c3e50"}}>{r.start_date} → {r.end_date}</span>
                              {r.reason && <span style={{fontSize:11,color:"#8a94a0"}}>"{r.reason}"</span>}
                              {r.review_note && <span style={{fontSize:11,color:"#c04040"}}>Note: {r.review_note}</span>}
                              {r.status==="revoked" && <span style={{fontSize:10,color:"#8a8a40",fontWeight:600}}>Revoked</span>}
                              <span style={{fontSize:11,color:"#a0a8b0",marginLeft:"auto"}}>{r.reviewed_at ? new Date(r.reviewed_at).toLocaleDateString() : ""}</span>
                              {isScheduler && r.status==="approved" && (
                                <>
                                  <button onClick={()=>setEditingVacReq({id:r.id,start_date:r.start_date,end_date:r.end_date,reason:r.reason||""})} style={{background:"none",border:"1px solid #d0d8e0",color:"#5a6a78",borderRadius:5,padding:"2px 8px",fontSize:10,cursor:"pointer",fontFamily:font}}>✎ Edit</button>
                                  <button onClick={()=>revokeApprovedVac(r)} style={{background:"none",border:"1px solid #e0c0c0",color:"#904040",borderRadius:5,padding:"2px 8px",fontSize:10,cursor:"pointer",fontFamily:font}}>↩ Revoke</button>
                                </>
                              )}
                              {isScheduler && (
                                <button onClick={()=>deleteVacRequest(r.id)} style={{background:"none",border:"none",color:"#c04040",cursor:"pointer",fontSize:12,padding:"0 4px"}}>✕</button>
                              )}
                            </div>
                          )}
                        </div>)}
                      </div>}
                    </div>;
                  })}
                </div>
              )}
            </>;
          })()}

          {/* ─── Shift Trade Requests ─── */}
          <div style={css.card}>
            <div style={css.cardT}>🔄 Propose a Shift Trade</div>
            <p style={{fontSize:13,color:"#5a6a78",margin:"0 0 12px",lineHeight:1.5}}>
              Propose a two-way trade with another surgeon — you take one of their shifts in return. They'll be notified and can accept or decline.
            </p>
            <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap",marginBottom:8}}>
              {isScheduler ? (
                <div>
                  <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>From</label>
                  <select value={tradeFrom} onChange={e=>setTradeFrom(e.target.value)} style={{...css.inp,width:100}}>
                    <option value="">Who…</option>
                    {surgeons.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                </div>
              ) : (
                <div>
                  <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>From</label>
                  <div style={{fontSize:13,fontWeight:600,color:"#6030a0",padding:"6px 0"}}>{surgeons.find(s=>s.id===mySurgeon)?.name || "—"}</div>
                </div>
              )}
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Trade with</label>
                <select value={tradeTo} onChange={e=>setTradeTo(e.target.value)} style={{...css.inp,width:100}}>
                  <option value="">Who…</option>
                  {surgeons.filter(s=>s.id!==tradeFrom).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>
              {isScheduler ? <>
                <div>
                  <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Week</label>
                  <select value={tradeWeek} onChange={e=>setTradeWeek(e.target.value)} style={{...css.inp,width:140}}>
                    <option value="">Select…</option>
                    {Object.keys(schedule).sort().map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Shift to give</label>
                  <select value={tradeShift} onChange={e=>setTradeShift(e.target.value)} style={{...css.inp,width:130}}>
                    <option value="">Select…</option>
                    {ALL_SHIFT_KEYS.map(sk=><option key={sk} value={sk}>{SHIFT_LABELS[sk]}</option>)}
                  </select>
                </div>
              </> : (
                <div>
                  <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Shift to give</label>
                  {(()=>{
                    const opts = [];
                    Object.keys(schedule).sort().forEach(m => {
                      const wk = schedule[m];
                      if (!wk) return;
                      ALL_SHIFT_KEYS.forEach(sk => {
                        const holder = sk === "dayCall" ? wk.dayCall : wk.nights?.[sk];
                        if (holder === tradeFrom) {
                          const d = parse(m);
                          const label = `${MO[d.getMonth()].slice(0,3)} ${d.getDate()} — ${SHIFT_LABELS[sk]}${wk.isBackup ? " (Backup)" : ""}`;
                          opts.push({ value: `${m}|${sk}`, label });
                        }
                      });
                    });
                    const curVal = tradeWeek && tradeShift ? `${tradeWeek}|${tradeShift}` : "";
                    return (
                      <select value={curVal} onChange={e=>{
                        const v = e.target.value;
                        if (!v) { setTradeWeek(""); setTradeShift(""); }
                        else { const [w, s] = v.split("|"); setTradeWeek(w); setTradeShift(s); }
                      }} style={{...css.inp,minWidth:240}}>
                        <option value="">{opts.length === 0 ? "No shifts scheduled" : "Select your shift…"}</option>
                        {opts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                      </select>
                    );
                  })()}
                </div>
              )}
            </div>
            <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap",marginBottom:10}}>
              {isScheduler ? <>
                <div>
                  <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Return week</label>
                  <select value={tradeReturnWeek} onChange={e=>setTradeReturnWeek(e.target.value)} style={{...css.inp,width:140}}>
                    <option value="">Select…</option>
                    {Object.keys(schedule).sort().map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Return shift</label>
                  <select value={tradeReturnShift} onChange={e=>setTradeReturnShift(e.target.value)} style={{...css.inp,width:130}}>
                    <option value="">Select…</option>
                    {ALL_SHIFT_KEYS.map(sk=><option key={sk} value={sk}>{SHIFT_LABELS[sk]}</option>)}
                  </select>
                </div>
              </> : (
                <div>
                  <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Return shift</label>
                  {(()=>{
                    const opts = [];
                    if (tradeTo) {
                      Object.keys(schedule).sort().forEach(m => {
                        const wk = schedule[m];
                        if (!wk) return;
                        ALL_SHIFT_KEYS.forEach(sk => {
                          const holder = sk === "dayCall" ? wk.dayCall : wk.nights?.[sk];
                          if (holder === tradeTo) {
                            const d = parse(m);
                            const label = `${MO[d.getMonth()].slice(0,3)} ${d.getDate()} — ${SHIFT_LABELS[sk]}${wk.isBackup ? " (Backup)" : ""}`;
                            opts.push({ value: `${m}|${sk}`, label });
                          }
                        });
                      });
                    }
                    const curVal = tradeReturnWeek && tradeReturnShift ? `${tradeReturnWeek}|${tradeReturnShift}` : "";
                    const placeholder = !tradeTo ? "Pick trade partner first" : (opts.length === 0 ? "They have no scheduled shifts" : "Select their shift…");
                    return (
                      <select value={curVal} onChange={e=>{
                        const v = e.target.value;
                        if (!v) { setTradeReturnWeek(""); setTradeReturnShift(""); }
                        else { const [w, s] = v.split("|"); setTradeReturnWeek(w); setTradeReturnShift(s); }
                      }} style={{...css.inp,minWidth:240}} disabled={!tradeTo}>
                        <option value="">{placeholder}</option>
                        {opts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                      </select>
                    );
                  })()}
                </div>
              )}
              <button onClick={submitTradeRequest} style={{...css.btn(true),padding:"7px 18px",background:"linear-gradient(135deg,#6030a0,#8050c0)",borderColor:"#6030a0"}}>Propose Trade</button>
            </div>
            {/* Cascade Preview — show downstream effects of DC/Weekend swaps */}
            {tradeFrom && tradeTo && tradeWeek && tradeShift && (tradeShift === "dayCall" || tradeShift === "wknd") && (()=>{
              const previewReq = {
                from_surgeon_id: tradeFrom, to_surgeon_id: tradeTo,
                week_monday: tradeWeek, shift_key: tradeShift,
                return_week: tradeReturnWeek || null, return_shift: tradeReturnShift || null
              };
              const cascades = detectCascadeChanges(schedule, previewReq);
              if (cascades.length === 0) return null;
              return (
                <div style={{marginTop:10,padding:"10px 14px",background:"#fef8e8",border:"1px solid #e8d090",borderRadius:8}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#8a6a10",marginBottom:6}}>⚠️ This swap will also change:</div>
                  {cascades.map((c,i) => (
                    <div key={i} style={{fontSize:11,color:"#5a4a10",marginBottom:3,paddingLeft:8}}>
                      • {c.reason}{c.requiresApproval ? " ⚠️ requires approval" : ""}
                    </div>
                  ))}
                </div>
              );
            })()}
          </div>

          {/* Pending Trades */}
          {(()=>{
            const pendingTrades = myTradeRequests.filter(r => r.status === "pending");
            const reviewedTrades = myTradeRequests.filter(r => r.status !== "pending");
            return <>
              {pendingTrades.length > 0 && (
                <div style={css.card}>
                  <div style={css.cardT}>⏳ Pending Trades <span style={{fontWeight:400,fontSize:12,color:"#8a94a0"}}>— {pendingTrades.length}</span></div>
                  {pendingTrades.map(r => (
                    <div key={r.id} style={{padding:"10px 12px",marginBottom:6,background:"#f8f0ff",border:"1px solid #d0c0e8",borderRadius:8,flexWrap:"wrap"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                        <Badge id={r.from_surgeon_id}/>
                        <span style={{fontSize:12,color:"#6030a0",fontWeight:600}}>→</span>
                        <Badge id={r.to_surgeon_id}/>
                        <span style={{fontFamily:mono,fontSize:12,color:"#2c3e50"}}>{r.shift_label} ({r.week_monday})</span>
                        {r.return_shift_label && <span style={{fontSize:11,color:"#8a94a0"}}>↔ {r.return_shift_label} ({r.return_week})</span>}
                      </div>
                      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                        <span style={{fontSize:10,color:"#a0a8b0"}}>Proposed {new Date(r.submitted_at).toLocaleDateString()}</span>
                        {(mySurgeon === r.to_surgeon_id || isScheduler) && (
                          <>
                            <button onClick={()=>acceptTradeRequest(r)} style={{background:"#e8f8e8",border:"1px solid #a0d8a0",color:"#1a8040",borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:font}}>✓ Accept</button>
                            <button onClick={()=>declineTradeRequest(r)} style={{background:"#fce8e8",border:"1px solid #e0b0b0",color:"#c04040",borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:font}}>✕ Decline</button>
                          </>
                        )}
                        {mySurgeon === r.from_surgeon_id && <button onClick={()=>deleteTradeRequest(r.id)} style={{background:"none",border:"1px solid #d0d8e0",color:"#8a94a0",borderRadius:5,padding:"2px 8px",fontSize:10,cursor:"pointer",fontFamily:font}}>Withdraw</button>}
                        {mySurgeon !== r.to_surgeon_id && mySurgeon !== r.from_surgeon_id && !isScheduler && (
                          <span style={{fontSize:10,color:"#8a6a10",fontWeight:600}}>Awaiting {r.to_surgeon_name}'s response</span>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {reviewedTrades.length > 0 && (
                <div style={css.card}>
                  <div style={css.cardT}>📋 Completed Trades <span style={{fontWeight:400,fontSize:12,color:"#8a94a0"}}>— {reviewedTrades.length}</span></div>
                  {reviewedTrades.slice(0,15).map(r => (
                    <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",marginBottom:3,background:r.status==="accepted"?"#f0faf0":"#faf0f0",border:`1px solid ${r.status==="accepted"?"#c0e0c0":"#e0c0c0"}`,borderRadius:5,flexWrap:"wrap"}}>
                      <span style={{fontSize:12,fontWeight:700,color:r.status==="accepted"?"#1a8040":"#c04040"}}>{r.status==="accepted"?"✓":"✕"}</span>
                      <Badge id={r.from_surgeon_id} small/><span style={{fontSize:10,color:"#6030a0"}}>↔</span><Badge id={r.to_surgeon_id} small/>
                      <span style={{fontFamily:mono,fontSize:11,color:"#5a6a78"}}>{r.shift_label} ({r.week_monday})</span>
                      {isScheduler && <button onClick={()=>deleteTradeRequest(r.id)} style={{background:"none",border:"none",color:"#c04040",cursor:"pointer",fontSize:11,marginLeft:"auto"}}>✕</button>}
                    </div>
                  ))}
                </div>
              )}
            </>;
          })()}
        </>}

        {/* ════════════════ SETTINGS ════════════════ */}
        {view==="settings"&&<>
          {/* Dark / Light Mode */}
          <div style={css.card}>
            <div style={css.cardT}>🎨 Appearance</div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:13,color:"#5a6a78"}}>Theme</span>
              <button onClick={()=>setDarkMode(d=>!d)} style={{...css.btn(!darkMode),padding:"6px 16px",fontSize:12}}>
                ☀️ Light
              </button>
              <button onClick={()=>setDarkMode(d=>!d)} style={{...css.btn(darkMode),padding:"6px 16px",fontSize:12}}>
                🌙 Dark
              </button>
            </div>
          </div>

          {/* Scheduler Mode */}
          <div style={css.card}>
            <div style={css.cardT}>🔒 Scheduler Mode</div>
            {!isScheduler ? (
              <div>
                <p style={{fontSize:12,color:"#7a8a98",margin:"0 0 8px",lineHeight:1.5}}>
                  Enter the scheduler PIN to unlock admin features (approve/deny vacation requests, set PIN).
                </p>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input type="password" placeholder="Enter PIN" value={pinInput} onChange={e=>setPinInput(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&checkPin()}
                    style={{...css.inp,width:140,fontSize:13,fontFamily:mono}}/>
                  <button onClick={checkPin} style={{...css.btn(true),padding:"6px 14px"}}>Unlock</button>
                  {pinError && <span style={{fontSize:12,color:"#c04040",fontWeight:600}}>{pinError}</span>}
                </div>
                {!schedulerPin && <p style={{fontSize:11,color:"#a0a8b0",margin:"6px 0 0"}}>No PIN set yet. Enter at least 4 characters and click Unlock to set your PIN.</p>}
              </div>
            ) : (
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <span style={{fontSize:12,color:"#1a8040",fontWeight:600}}>✓ Scheduler mode active</span>
                  <button onClick={()=>setIsScheduler(false)} style={{background:"none",border:"1px solid #d0d8e0",color:"#6a7a88",borderRadius:5,padding:"3px 10px",fontSize:11,cursor:"pointer",fontFamily:font}}>Lock</button>
                </div>
                <div>
                  <label style={{fontSize:11,color:"#7a8a98",display:"block",marginBottom:2}}>Set or change scheduler PIN</label>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <input type="password" placeholder="New PIN" value={pinInput} onChange={e=>setPinInput(e.target.value)}
                      style={{...css.inp,width:140,fontSize:13,fontFamily:mono}}/>
                    <button onClick={()=>{if(pinInput.length>=4){setSchedulerPin(pinInput);setPinInput("");alert("PIN updated!");}else{alert("PIN must be at least 4 characters");}}} style={{...css.btn(true),padding:"6px 14px"}}>Save PIN</button>
                  </div>
                  {schedulerPin && <p style={{fontSize:11,color:"#8a94a0",margin:"4px 0 0"}}>Current PIN: {schedulerPin.replace(/./g,"•")}</p>}
                </div>
              </div>
            )}
          </div>

          {/* APP Shift Managers — scheduler/admin only */}
          {(isScheduler || userProfile?.person_id === "admin") && (
            <div style={css.card}>
              <div style={css.cardT}>👩‍⚕️ APP Shift Managers</div>
              <p style={{fontSize:12,color:"#7a8a98",margin:"0 0 10px",lineHeight:1.5}}>
                Users listed here can assign APP shifts on the Setup tab (but have no other scheduler access). Toggle the switch to grant or revoke permission.
              </p>
              <button onClick={async ()=>{
                const profiles = await dbAuth.getAllProfiles();
                setAllProfiles(profiles || []);
              }} style={{...css.btn(false),padding:"5px 12px",fontSize:11,marginBottom:10}}>
                🔄 Load Users
              </button>
              {allProfiles.length === 0 ? (
                <p style={{fontSize:12,color:"#a0a8b0",fontStyle:"italic"}}>Click "Load Users" to see all signed-up users.</p>
              ) : (
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {allProfiles.sort((a,b)=>(a.display_name||"").localeCompare(b.display_name||"")).map(p => (
                    <div key={p.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 10px",background:"#f8f9fb",borderRadius:6,border:"1px solid #e0e4ea"}}>
                      <div>
                        <span style={{fontSize:13,fontWeight:600,color:"#2c3e50"}}>{p.display_name}</span>
                        <span style={{fontSize:11,color:"#8a94a0",marginLeft:8}}>{p.person_id}</span>
                        {p.person_id === "admin" && <span style={{fontSize:10,color:"#6030a0",marginLeft:6,fontWeight:600}}>(admin)</span>}
                        {p.role === "scheduler" && <span style={{fontSize:10,color:"#1a6fa8",marginLeft:6,fontWeight:600}}>(scheduler)</span>}
                      </div>
                      <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
                        <span style={{fontSize:11,color:p.can_assign_apps?"#1a8040":"#a0a8b0",fontWeight:600}}>
                          {p.can_assign_apps ? "Can assign APPs" : "No APP access"}
                        </span>
                        <input type="checkbox" checked={!!p.can_assign_apps} onChange={async (e)=>{
                          const newVal = e.target.checked;
                          const updated = { ...p, can_assign_apps: newVal };
                          const { error } = await dbAuth.upsertProfile(updated);
                          if (error) { alert("Failed to update: " + error); return; }
                          setAllProfiles(prev => prev.map(x => x.id === p.id ? updated : x));
                          // If updating the current user, refresh their own profile too
                          if (p.id === authUser?.id) setUserProfile(updated);
                        }} style={{cursor:"pointer",width:16,height:16}}/>
                      </label>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Notifications */}
          <div style={css.card}>
            <div style={css.cardT}>🔔 Notification Settings</div>

            {/* Push Notifications via OneSignal */}
            <div style={{background:dk?"#1a2a3e":"#f8f9fb",border:`1px solid ${dkCardBorder}`,borderRadius:8,padding:"12px 14px",marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:600,color:dkText}}>Push Notifications (OneSignal)</span>
                {oneSignalSubscribed && <span style={{fontSize:11,color:"#1a8040",fontWeight:600}}>✓ Subscribed on this device</span>}
                {pushPermission === "denied" && <span style={{fontSize:11,color:"#c04040",fontWeight:600}}>✕ Blocked</span>}
              </div>
              <p style={{fontSize:11,color:dkSubtext,margin:"0 0 8px",lineHeight:1.5}}>
                Each partner needs to click "Enable" once on their device. Notifications will arrive even when the browser is closed.
              </p>
              {!oneSignalSubscribed && pushPermission !== "denied" && (
                <button onClick={requestPushPermission} style={{...css.btn(true),padding:"6px 14px",fontSize:12}}>
                  Enable Push Notifications
                </button>
              )}
              {pushPermission === "denied" && (
                <p style={{fontSize:11,color:"#c04040",lineHeight:1.5}}>
                  Notifications are blocked. Please allow notifications for this site in your browser settings.
                </p>
              )}
              {pushPermission === "granted" && isScheduler && (
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                  <button onClick={sendTestNotification} style={{...css.btn(false),padding:"5px 12px",fontSize:11}}>
                    🔔 Send Test Notification
                  </button>
                  {notifTestSent && <span style={{fontSize:11,color:"#1a8040",fontWeight:600}}>{notifTestSent}</span>}
                </div>
              )}
              {isScheduler && (
                <div style={{marginTop:8,paddingTop:8,borderTop:"1px dashed #e0e4ea"}}>
                  <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>OneSignal REST API Key (for sending push to all devices)</label>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <input type="password" value={oneSignalApiKey} onChange={e=>setOneSignalApiKey(e.target.value)}
                      placeholder="Paste REST API key from OneSignal → Settings → Keys & IDs"
                      style={{...css.inp,width:"100%",maxWidth:420,fontSize:11,fontFamily:mono}}/>
                    <button onClick={()=>{
                      try { localStorage.setItem("dsg-onesignal-key", oneSignalApiKey); } catch(e) {}
                      setSaveStatus("Saved"); setTimeout(()=>setSaveStatus(""),2000);
                    }} style={{...css.btn(true),padding:"5px 12px",fontSize:11,whiteSpace:"nowrap"}}>Save</button>
                  </div>
                  <p style={{fontSize:10,color:"#8a94a0",margin:"4px 0 0"}}>Find this at onesignal.com → your app → Settings → Keys & IDs → REST API Key</p>
                  {oneSignalApiKey && (
                    <button onClick={async ()=>{
                      try {
                        const resp = await fetch("https://onesignal.com/api/v1/notifications", {
                          method: "POST",
                          headers: { "Content-Type": "application/json", Authorization: `Basic ${oneSignalApiKey}` },
                          body: JSON.stringify({
                            app_id: "9ca5c08f-6fb3-4ee5-b564-09aafc1c1901",
                            included_segments: ["Subscribed Users"],
                            headings: { en: "DSG Call Schedule" },
                            contents: { en: "Test push notification — if you see this, push is working!" },
                            url: "https://fkhan628.github.io/Call-Schedule-App/",
                          }),
                        });
                        const data = await resp.json();
                        alert(`Push test result:\nStatus: ${resp.status}\nRecipients: ${data.recipients || 0}\n${data.errors ? "Errors: " + JSON.stringify(data.errors) : "Success!"}`);
                      } catch(e) { alert("Push test error: " + e.message); }
                    }} style={{...css.btn(false),padding:"4px 10px",fontSize:10,marginTop:6}}>
                      Test Push to All Devices
                    </button>
                  )}
                </div>
              )}
            </div>

            {/* Email Notifications */}
            <div style={{background:dk?"#1a2a3e":"#f8f9fb",border:`1px solid ${dkCardBorder}`,borderRadius:8,padding:"12px 14px",marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:600,color:dkText,marginBottom:6}}>📧 Email Notifications</div>
              <p style={{fontSize:11,color:dkSubtext,margin:"0 0 8px",lineHeight:1.5}}>
                Set up email addresses for each surgeon. Requires a Supabase Edge Function — see the setup guide below.
              </p>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Edge Function URL</label>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input value={edgeFunctionUrl} onChange={e=>setEdgeFunctionUrl(e.target.value)}
                    placeholder="https://your-project.supabase.co/functions/v1/send-notification"
                    style={{...css.inp,width:"100%",maxWidth:420,fontSize:11,fontFamily:mono}}/>
                  <button onClick={async ()=>{
                    try {
                      await supabase.from("call_schedule_config").upsert({ id:"config", edge_function_url: edgeFunctionUrl, updated_at: new Date().toISOString() });
                      setSaveStatus("Saved"); setTimeout(()=>setSaveStatus(""),2000);
                    } catch(e){}
                  }} style={{...css.btn(true),padding:"5px 12px",fontSize:11,whiteSpace:"nowrap"}}>Save URL</button>
                </div>
                {!edgeFunctionUrl && <p style={{fontSize:10,color:"#c04040",margin:"4px 0 0"}}>Email notifications require the Edge Function URL. Deploy the function first.</p>}
                {edgeFunctionUrl && <p style={{fontSize:10,color:"#1a8040",margin:"4px 0 0"}}>✓ Edge Function configured</p>}
              </div>

              {/* Personal notification settings (shown to everyone) */}
              {mySurgeon && mySurgeon !== "admin" && (
                <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #e8ecf0"}}>
                  <div style={{fontSize:11,fontWeight:600,color:"#5a6a78",marginBottom:6}}>My Email for Notifications</div>
                  <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
                    <input value={(notifPrefs[mySurgeon] || {}).email || ""} onChange={e=>saveNotifPref(mySurgeon, {email:e.target.value})}
                      placeholder={authUser?.email || "email@example.com"} type="email"
                      style={{...css.inp,width:240,fontSize:11,fontFamily:mono,padding:"4px 8px"}}/>
                    <label style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:"#5a6a78",cursor:"pointer"}}>
                      <input type="checkbox" checked={(notifPrefs[mySurgeon] || {}).email_notifs || false}
                        onChange={e=>saveNotifPref(mySurgeon, {email_notifs:e.target.checked})}/>
                      Email
                    </label>
                    <label style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:"#5a6a78",cursor:"pointer"}}>
                      <input type="checkbox" checked={(notifPrefs[mySurgeon] || {}).browser_push !== false}
                        onChange={e=>saveNotifPref(mySurgeon, {browser_push:e.target.checked})}/>
                      Push
                    </label>
                  </div>
                  <p style={{fontSize:10,color:"#8a94a0",margin:"0 0 8px"}}>Leave blank to use your signup email ({authUser?.email}). Or enter a different email.</p>

                  <div style={{fontSize:11,fontWeight:600,color:"#5a6a78",marginBottom:6}}>Notify me about:</div>
                  {[
                    ["schedule_changes", "Schedule changes & shift swaps"],
                    ["vacation_updates", "Vacation requests & approvals"],
                    ["shift_reminders", "Shift reminders"],
                  ].map(([key, label]) => (
                    <label key={key} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,fontSize:12,color:"#3a4a58",cursor:"pointer"}}>
                      <input type="checkbox" checked={(notifPrefs[mySurgeon] || {})[key] !== false}
                        onChange={e=>saveNotifPref(mySurgeon, {[key]:e.target.checked})}/>
                      {label}
                    </label>
                  ))}
                </div>
              )}

              {/* Scheduler-only: all surgeon emails */}
              {isScheduler && (
                <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #e8ecf0"}}>
                  <div style={{fontSize:11,fontWeight:600,color:"#5a6a78",marginBottom:6}}>All Surgeon Email Addresses (Scheduler Only)</div>
                  {surgeons.map(s => {
                    const pref = notifPrefs[s.id] || {};
                    return (
                      <div key={s.id} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
                        <Badge id={s.id} small/>
                        <input value={pref.email || ""} onChange={e=>saveNotifPref(s.id, {email:e.target.value})}
                          placeholder="email@example.com" type="email"
                          style={{...css.inp,width:200,fontSize:11,fontFamily:mono,padding:"4px 8px"}}/>
                        <label style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:"#5a6a78",cursor:"pointer"}}>
                          <input type="checkbox" checked={pref.email_notifs || false}
                            onChange={e=>saveNotifPref(s.id, {email_notifs:e.target.checked})}/>
                          Email
                        </label>
                        <label style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:"#5a6a78",cursor:"pointer"}}>
                          <input type="checkbox" checked={pref.browser_push !== false}
                            onChange={e=>saveNotifPref(s.id, {browser_push:e.target.checked})}/>
                          Push
                        </label>
                      </div>
                    );
                  })}
                  {notifPrefsSaving && <span style={{fontSize:10,color:"#1a8040"}}>Saving…</span>}
                </div>
              )}
            </div>
          </div>

          {/* Account */}
          <div style={css.card}>
            <div style={css.cardT}>👤 Account</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:biometricAvail?12:0}}>
              <div>
                <p style={{fontSize:13,color:dkText,margin:"0 0 2px"}}>
                  Signed in as <strong style={{color:"#1a6fa8"}}>{userProfile?.display_name || "—"}</strong>
                </p>
                <p style={{fontSize:11,color:"#7a8a98",margin:0}}>{authUser?.email}</p>
              </div>
              <button onClick={handleSignOut} style={{...css.btn(false),padding:"6px 14px",fontSize:12}}>
                Sign Out
              </button>
            </div>
            {biometricAvail && (
              <div style={{paddingTop:12,borderTop:"1px solid #e0e4ea"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                  <div>
                    <p style={{fontSize:12,fontWeight:600,color:dkText,margin:"0 0 2px"}}>🔐 Biometric Login</p>
                    <p style={{fontSize:11,color:"#7a8a98",margin:0}}>
                      {biometricEnrolled ? "Face ID / Touch ID is enabled" : "Use Face ID or Touch ID to unlock the app"}
                    </p>
                  </div>
                  {biometricEnrolled ? (
                    <button onClick={handleBiometricUnenroll} style={{...css.btn(false),padding:"6px 14px",fontSize:12}}>
                      Disable
                    </button>
                  ) : (
                    <button onClick={handleBiometricEnroll} style={{...css.btn(true),padding:"6px 14px",fontSize:12}}>
                      Enable
                    </button>
                  )}
                </div>
              </div>
            )}
          </div>

          {/* Calendar Sync - Subscribable URLs */}
          <div style={css.card}>
            <div style={css.cardT}>📅 Live Calendar Sync</div>
            <p style={{fontSize:12,color:"#5a6a78",margin:"0 0 10px",lineHeight:1.5}}>
              Subscribe to {isScheduler ? "these URLs" : "your personal URL"} in Google Calendar, Outlook, or Apple Calendar. The calendar auto-updates when the schedule changes — no need to re-download.
            </p>
            <div style={{fontSize:11,color:"#7a8a98",marginBottom:8}}>
              <strong>How to subscribe:</strong> In Google Calendar: Other calendars (+) → From URL → paste the link below.
            </div>

            {/* Personal calendar link (shown to everyone with a surgeon/APP identity) */}
            {mySurgeon && mySurgeon !== "admin" && (() => {
              const myName = [...surgeons, ...apps].find(p => p.id === mySurgeon)?.name;
              if (!myName) return null;
              const myUrl = `${SUPABASE_URL}/functions/v1/calendar-sync?surgeon=${myName}`;
              return (
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:600,color:"#5a6a78",marginBottom:4}}>My Calendar:</div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <input readOnly value={myUrl}
                      style={{...css.inp,width:"100%",maxWidth:420,fontSize:10,fontFamily:mono,padding:"4px 8px"}}
                      onClick={e=>e.target.select()}/>
                    <button onClick={()=>copyText(myUrl, "my")} style={{...css.btn(copiedUrl==="my"),padding:"4px 10px",fontSize:10,whiteSpace:"nowrap"}}>
                      {copiedUrl==="my" ? "✓ Copied" : "Copy"}
                    </button>
                  </div>
                </div>
              );
            })()}

            {/* Scheduler sees full schedule + all surgeon links */}
            {isScheduler && <>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:600,color:"#5a6a78",marginBottom:4}}>Full Schedule:</div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input readOnly value={`${SUPABASE_URL}/functions/v1/calendar-sync`}
                    style={{...css.inp,width:"100%",maxWidth:420,fontSize:10,fontFamily:mono,padding:"4px 8px"}}
                    onClick={e=>e.target.select()}/>
                  <button onClick={()=>copyText(`${SUPABASE_URL}/functions/v1/calendar-sync`, "full")} style={{...css.btn(copiedUrl==="full"),padding:"4px 10px",fontSize:10,whiteSpace:"nowrap"}}>
                    {copiedUrl==="full" ? "✓ Copied" : "Copy"}
                  </button>
                </div>
              </div>
              <div style={{fontSize:11,fontWeight:600,color:"#5a6a78",marginBottom:4}}>Per Surgeon:</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                {surgeons.map(s => (
                  <button key={s.id} onClick={()=>copyText(`${SUPABASE_URL}/functions/v1/calendar-sync?surgeon=${s.name}`, s.id)}
                    style={{...css.badge(sMap[s.id]?.idx||0),cursor:"pointer",padding:"3px 10px",fontSize:10,border:copiedUrl===s.id?"2px solid #1a8040":undefined}}>
                    {copiedUrl===s.id ? "✓ " : "📋 "}{s.name}
                  </button>
                ))}
                {copiedUrl && copiedUrl !== "full" && copiedUrl !== "my" && (
                  <span style={{fontSize:10,color:"#1a8040",fontWeight:600,marginLeft:6}}>URL copied to clipboard</span>
                )}
              </div>
            </>}
            <p style={{fontSize:10,color:"#8a94a0",marginTop:6}}>{isScheduler ? "Click a name to copy their subscribe URL." : "Paste this URL into your calendar app to subscribe."} Requires deploying the calendar-sync Edge Function.</p>
          </div>

          {/* Refresh App */}
          <div style={css.card}>
            <div style={css.cardT}>🔄 Refresh App</div>
            <p style={{fontSize:12,color:"#5a6a78",marginBottom:10,lineHeight:1.4}}>If the app seems stuck on an old version or the schedule looks wrong, tap below to clear the cache and reload fresh.</p>
            <button onClick={()=>{
              if (confirm("Refresh the app? This clears the local cache and reloads the latest version. No data is lost.")) {
                if (typeof window.__dsgHardReset === "function") window.__dsgHardReset();
                else window.location.reload();
              }
            }} style={{...css.btn(true),padding:"8px 16px",fontSize:13,borderRadius:7}}>
              Refresh Now
            </button>
          </div>

          {/* Reset */}
          {isScheduler && <div style={css.card}>
            <div style={css.cardT}>🗑 Data Management</div>
            <button onClick={resetAllData} style={{background:"none",border:"1px solid #e8c0c0",color:"#804040",borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer",fontFamily:font}}>
              Reset All Data
            </button>
          </div>}
        </>}
      </div>
      </>}
    </div>
  );
}

const thS = {textAlign:"left",padding:"7px 8px",color:"#5a6a78",fontWeight:600,fontSize:10,textTransform:"uppercase",letterSpacing:0.5};
const thS2 = {textAlign:"left",padding:"4px 8px",color:"#7a8a98",fontWeight:500,fontSize:10,textTransform:"uppercase",letterSpacing:0.3};
const tdS = {padding:"7px 8px",fontFamily:"'JetBrains Mono',monospace",color:"#4a5a68",fontSize:13};

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(CallSchedule));
  </script>
</body>
</html>
