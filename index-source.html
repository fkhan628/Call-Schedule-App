              minors.forEach(h => { if(h.surgeonA) usedInMinor.add(h.surgeonA); if(h.surgeonB) usedInMinor.add(h.surgeonB); });

              const renderCard = (hol, idx) => {
                // Surgeons used in OTHER holidays of the same group (not this one)
                const sameGroup = assignments.filter(h => h.type === hol.type && h.date !== hol.date);
                const usedElsewhere = new Set();
                sameGroup.forEach(h => { if(h.surgeonA) usedElsewhere.add(h.surgeonA); if(h.surgeonB) usedElsewhere.add(h.surgeonB); });

                return (
                <div key={hol.date} style={{background:dk?"#1a2a2e":"#fff",border:`1px solid ${hol.type==="major"?"#e0a868":"#a0c0d8"}`,borderRadius:8,padding:"10px 14px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
                    <div style={{fontSize:14,fontWeight:700,color:hol.type==="major"?"#c06020":"#2868a8"}}>
                      {hol.emoji} {hol.name}
                      <span style={{fontSize:11,fontWeight:400,color:"#8a94a0",marginLeft:8}}>{hol.date} ({["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][parse(hol.date).getDay()]})</span>
                    </div>
                    <span style={{fontSize:10,fontWeight:600,color:hol.type==="major"?"#c06020":"#2868a8",background:hol.type==="major"?"#fef0e0":"#e0f0ff",padding:"2px 8px",borderRadius:4}}>{hol.type.toUpperCase()}</span>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
                    <div>
                      <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:1}}>Surgeon A (Holiday)</label>
                      <select value={hol.surgeonA||""} onChange={e=>swapHolidaySurgeon(holidayYear,idx,"surgeonA",e.target.value)} style={{...css.inp,padding:"3px 6px",fontSize:11,width:110}}>
                        {surgeons.map(s=><option key={s.id} value={s.id}>{s.name}{usedElsewhere.has(s.id)?" ⚠️":""}</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:1}}>Surgeon B (Day After)</label>
                      <select value={hol.surgeonB||""} onChange={e=>swapHolidaySurgeon(holidayYear,idx,"surgeonB",e.target.value)} style={{...css.inp,padding:"3px 6px",fontSize:11,width:110}}>
                        {surgeons.map(s=><option key={s.id} value={s.id}>{s.name}{usedElsewhere.has(s.id)?" ⚠️":""}</option>)}
                      </select>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    {(hol.coverage||[]).map((c,j)=>{
                      const isEve = c.isEve;
                      // Eve tag shows Surgeon B (the "Day After / Eve" dropdown value).
                      // Non-eve tag shows whoever that specific coverage row is assigned to.
                      const displaySurgeon = isEve ? (hol.surgeonB || c.surgeon) : c.surgeon;
                      const isSurgA = !isEve && c.surgeon === hol.surgeonA;
                      return (
                      <div key={j} style={{padding:"4px 10px",borderRadius:5,fontSize:11,fontWeight:600,
                        background: isEve
                          ? (dk?"#2a2420":"#fef8f0")
                          : isSurgA?(dk?"#1a3020":"#e8f8e8"):(dk?"#2a2040":"#f0e8f8"),
                        border:`1px solid ${isEve?"#e0c890":isSurgA?"#a0d0a0":"#c0b0e0"}`,
                        color:isEve?"#8a6820":isSurgA?"#1a6030":"#5030a0",
                        opacity:isEve?0.85:1}}>
                        <span style={{fontWeight:400,marginRight:4}}>{c.day}</span>
                        <Badge id={displaySurgeon} small/>
                        <span style={{fontSize:9,color:isEve?"#b09050":"#8a94a0",marginLeft:4}}>{isEve ? "night before" : "24h"}</span>
                      </div>
                    )})}
                  </div>
                </div>
              )};

              return <>
                <div style={{fontSize:12,fontWeight:700,color:"#c06020",marginBottom:6}}>⭐ Major Holidays</div>
                {majors.map((h,i)=>renderCard(h, assignments.indexOf(h)))}

                <div style={{fontSize:12,fontWeight:700,color:"#2868a8",marginBottom:6,marginTop:14}}>📌 Minor Holidays</div>
                {minors.map((h,i)=>renderCard(h, assignments.indexOf(h)))}

                {/* Distinct-pair validation */}
                {(()=>{
                  const checkGroup = (group, label) => {
                    const seen = {};
                    const dupes = [];
                    group.forEach(h => {
                      [h.surgeonA, h.surgeonB].forEach(sid => {
                        if (!sid) return;
                        if (seen[sid]) dupes.push({ surgeon: sid, hol1: seen[sid], hol2: h.name });
                        else seen[sid] = h.name;
                      });
                    });
                    return { label, ok: dupes.length === 0, dupes, uniqueCount: Object.keys(seen).length, freeCount: surgeons.length - Object.keys(seen).length };
                  };
                  const majorCheck = checkGroup(majors, "Major");
                  const minorCheck = checkGroup(minors, "Minor");
                  return (
                    <div style={{marginTop:10,display:"flex",gap:8,flexWrap:"wrap"}}>
                      {[majorCheck, minorCheck].map(ck => (
                        <div key={ck.label} style={{flex:1,minWidth:180,padding:"8px 12px",borderRadius:6,fontSize:11,
                          background:ck.ok?"#e8f8e8":"#fce8e8",border:`1px solid ${ck.ok?"#a0d8a0":"#e0a0a0"}`,color:ck.ok?"#1a6030":"#903030"}}>
                          <span style={{fontWeight:700}}>{ck.ok?"✓":"⚠"} {ck.label} group:</span>{" "}
                          {ck.ok
                            ? `All ${ck.uniqueCount} surgeons distinct (${ck.freeCount} free)`
                            : ck.dupes.map(d => `${surgeons.find(s=>s.id===d.surgeon)?.name||d.surgeon} is on both ${d.hol1} & ${d.hol2}`).join("; ")}
                        </div>
                      ))}
                    </div>
                  );
                })()}

                {/* Summary */}
                <div style={{marginTop:14,paddingTop:10,borderTop:"1px solid #e0e4ea"}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#5a6a78",marginBottom:6}}>Holiday Coverage per Surgeon — {holidayYear}</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {surgeons.map(s=>{
                      const mc = holCounts[s.id]?.major||0;
                      const mi = holCounts[s.id]?.minor||0;
                      return (
                        <div key={s.id} style={{...css.badge(sMap[s.id]?.idx||0),padding:"4px 10px",fontSize:11}}>
                          {s.name} <span style={{fontWeight:400}}>— {mc} major, {mi} minor</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </>;
            })()}
          </div>

          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={()=>doGenerate(true)} style={{...css.btn(false),padding:"13px 24px",fontSize:14,fontWeight:700,borderRadius:9,letterSpacing:0.3,flex:1}}>
              👁 Preview Schedule
            </button>
            <button onClick={doGenerateAndNotify} style={{...css.btn(true),padding:"13px 24px",fontSize:14,fontWeight:700,borderRadius:9,letterSpacing:0.3,flex:1}}>
              Generate & Publish →
            </button>
          </div>

          {/* What-If Preview */}
          {showPreview && previewSchedule && (()=>{
            // Build preview stats
            const pStats = {};
            surgeons.forEach(s => { pStats[s.id] = {dc:0,nights:0,wknd:0,off:0}; });
            Object.values(previewSchedule).forEach(wk => {
              if (wk.dayCall && pStats[wk.dayCall]) pStats[wk.dayCall][wk.isBackup?"dcB":"dc"]++;
              if (wk.off && pStats[wk.off]) pStats[wk.off][wk.isBackup?"offB":"off"]++;
              Object.entries(wk.nights||{}).forEach(([sh,sid]) => {
                if (!sid || !pStats[sid]) return;
                if (sh==="wknd") pStats[sid][wk.isBackup?"wkndB":"wknd"]++;
                else pStats[sid][wk.isBackup?"nightsB":"nights"]++;
              });
            });

            // Build calData from preview schedule
            const pCalData = {};
            Object.entries(previewSchedule).forEach(([mStr,wk])=>{
              const mon=parse(mStr);
              const pfx = wk.isBackup ? "B-" : "";
              const cls = wk.isBackup ? "backup" : "primary";
              const holCov = wk.holidayCoverage || {};
              if(wk.dayCall){
                for(let i=0;i<5;i++){
                  const ds=fmt(addD(mon,i));
                  if(holCov[ds]) continue;
                  pCalData[ds]=[...(pCalData[ds]||[]),{type:pfx+"Svc",surgeon:wk.dayCall,cls}];
                }
                const sat=fmt(addD(mon,5));
                if(!holCov[sat]) pCalData[sat]=[...(pCalData[sat]||[]),{type:pfx+"Wknd",surgeon:wk.dayCall,cls,note:"Sat 7a–7a"}];
              }
              NIGHT_KEYS.forEach((sk,i)=>{
                const sid=wk.nights?.[sk]; if(!sid) return;
                const ds=fmt(addD(mon,i));
                if(holCov[ds]) return;
                pCalData[ds]=[...(pCalData[ds]||[]),{type:pfx+"Ngt",surgeon:sid,cls}];
              });
              const wkndS = wk.nights?.wknd;
              if(wkndS){
                const fri=fmt(addD(mon,4));
                if(!holCov[fri]) pCalData[fri]=[...(pCalData[fri]||[]),{type:pfx+"Wknd",surgeon:wkndS,cls,note:"5p–7a"}];
                const sun=fmt(addD(mon,6));
                if(!holCov[sun]) pCalData[sun]=[...(pCalData[sun]||[]),{type:pfx+"Wknd",surgeon:wkndS,cls,note:"7a–7a"}];
              }
              if(wk.holidayCoverage){
                Object.entries(wk.holidayCoverage).forEach(([ds, cov]) => {
                  pCalData[ds]=[...(pCalData[ds]||[]),{type:"Holiday",surgeon:cov.surgeonId,cls:"holiday",hours:cov.hours,holName:cov.name}];
                });
              }
            });
            // APP shifts
            Object.entries(appShifts).forEach(([ds,aid])=>{
              pCalData[ds]=[...(pCalData[ds]||[]),{type:"APP",appId:aid,cls:"app"}];
            });
            // Vacation entries
            const pvOnVac = (ds) => [...surgeons,...apps].filter(s=>onVac(s.id,ds,vacations));

            // Get unique months covered by preview
            const previewMonths = [];
            const seenMonths = new Set();
            Object.keys(previewSchedule).forEach(mStr => {
              const mon = parse(mStr);
              for(let i=0;i<7;i++){
                const d = addD(mon,i);
                const key = `${d.getFullYear()}-${d.getMonth()}`;
                if(!seenMonths.has(key)){
                  seenMonths.add(key);
                  previewMonths.push({year:d.getFullYear(),month:d.getMonth()});
                }
              }
            });
            previewMonths.sort((a,b)=>a.year-b.year||a.month-b.month);

            const pmi = Math.min(previewCalMonth, previewMonths.length-1);
            const pm = previewMonths[pmi] || previewMonths[0];
            const pmDays = pm ? new Date(pm.year, pm.month+1, 0).getDate() : 0;
            const pmFirst = pm ? new Date(pm.year, pm.month, 1).getDay() : 0;
            const pmGrid = [];
            for(let i=0;i<pmFirst;i++) pmGrid.push(null);
            for(let d=1;d<=pmDays;d++) pmGrid.push(d);
            while(pmGrid.length%7) pmGrid.push(null);

            return (
              <div style={{...css.card,marginTop:14,background:dk?"#1a2a1a":"#f0faf0",border:"2px solid #80c080"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
                  <div style={css.cardT}>👁 Schedule Preview</div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>{setPreviewCalMonth(0);doGenerate(true);}} style={{...css.btn(false),padding:"6px 14px",fontSize:12}}>↻ Re-roll</button>
                    <button onClick={acceptPreview} style={{...css.btn(true),padding:"6px 14px",fontSize:12,background:"linear-gradient(135deg,#1a8040,#30a060)",borderColor:"#1a8040"}}>✓ Accept & Publish</button>
                    <button onClick={discardPreview} style={{background:"none",border:"1px solid #e0c0c0",color:"#904040",borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer",fontFamily:font}}>✕ Discard</button>
                  </div>
                </div>

                {/* Preview Calendar Grid */}
                {pm && <>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:10}}>
                    <button onClick={()=>setPreviewCalMonth(Math.max(0,pmi-1))} disabled={pmi===0}
                      style={{...css.btn(false),padding:"4px 10px",fontSize:14,opacity:pmi===0?0.3:1}}>◀</button>
                    <span style={{fontSize:15,fontWeight:700,color:"#1a6fa8",minWidth:140,textAlign:"center"}}>{MO[pm.month]} {pm.year}</span>
                    <button onClick={()=>setPreviewCalMonth(Math.min(previewMonths.length-1,pmi+1))} disabled={pmi>=previewMonths.length-1}
                      style={{...css.btn(false),padding:"4px 10px",fontSize:14,opacity:pmi>=previewMonths.length-1?0.3:1}}>▶</button>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,marginBottom:1}}>
                    {DAY_HDR.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:"#8a94a0",padding:"4px 0",letterSpacing:1}}>{d}</div>)}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,marginBottom:14}}>
                    {pmGrid.map((day,i)=>{
                      if(!day) return <div key={`e${i}`} style={{background:dk?"#162016":"#f0faf0",minHeight:70}}/>;
                      const ds=`${pm.year}-${String(pm.month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
                      const entries=pCalData[ds]||[];
                      const isWknd=[0,6].includes(new Date(pm.year,pm.month,day).getDay());
                      const vacList = pvOnVac(ds);
                      return (
                        <div key={ds} style={{background:dk?"#162016":isWknd?"#e8f0e8":"#f4faf4",border:"1px solid #a0d0a0",minHeight:70,padding:"2px 3px",borderRadius:2}}>
                          <div style={{fontSize:10,fontWeight:600,color:isWknd?"#5a8a5a":"#3a6a3a",fontFamily:mono,marginBottom:1}}>{day}</div>
                          {entries.filter(e=>e.type!=="APP").map((e,j)=>{
                            const isB = e.cls==="backup";
                            const isD = e.type.includes("Svc");
                            const isW = e.type.includes("Wknd");
                            const isH = e.type==="Holiday";
                            const label = isH?"H":isD?"S":isW?"W":"N";
                            const color = isH?"#c06020":isD?"#3080a8":isW?"#908050":"#6850a0";
                            return (
                              <div key={j} style={{fontSize:9,marginBottom:1,padding:"0 2px",borderRadius:2,
                                background:isH?"#fef0e8":isB?"#fef8e8":"transparent",whiteSpace:"nowrap",overflow:"hidden"}}>
                                {isB&&<span style={{color:"#8a6a10",fontWeight:700,fontSize:7,marginRight:1}}>B</span>}
                                <span style={{color,fontWeight:700}}>{label}</span>
                                {" "}
                                <span style={{color:PAL[sMap[e.surgeon]?.idx%7]?.tx||"#4a5868",fontWeight:500}}>{sMap[e.surgeon]?.name||"?"}</span>
                              </div>
                            );
                          })}
                          {entries.filter(e=>e.type==="APP").map((e,j)=>(
                            <div key={"a"+j} style={{fontSize:9,marginBottom:1,padding:"0 2px",whiteSpace:"nowrap"}}>
                              <span style={{color:"#c08050",fontWeight:700}}>A</span>
                              {" "}
                              <span style={{color:"#8a6040"}}>{aMap[e.appId]?.name||"?"}</span>
                            </div>
                          ))}
                          {vacList.length>0&&<div style={{fontSize:8,color:"#a07070",marginTop:1}}>🏖{vacList.map(v=>v.name).join(",")}</div>}
                        </div>
                      );
                    })}
                  </div>
                </>}

                {/* Counts Table */}
                <div style={{fontSize:12,fontWeight:700,color:"#3a6a3a",marginBottom:6}}>Assignment Counts</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{borderBottom:"2px solid #b0d8b0"}}>
                        <th style={thS2}>Surgeon</th>
                        <th style={thS2}>Svc Wk</th><th style={thS2}>Nights</th><th style={thS2}>Wknds</th><th style={thS2}>Off</th>
                      </tr>
                    </thead>
                    <tbody>
                      {surgeons.map(s => {
                        const ps = pStats[s.id]||{};
                        return (
                          <tr key={s.id} style={{borderBottom:"1px solid #c0e0c0"}}>
                            <td style={{padding:"5px 6px"}}><Badge id={s.id} small/></td>
                            <td style={tdS}>{ps.dc||0}</td>
                            <td style={tdS}>{ps.nights||0}</td>
                            <td style={tdS}>{ps.wknd||0}</td>
                            <td style={tdS}>{ps.off||0}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <p style={{fontSize:11,color:"#5a8a5a",marginTop:8}}>Click "Re-roll" to generate a different version. Use ◀ ▶ to browse months. Click "Accept" to commit this schedule.</p>
              </div>
            );
          })()}
          </>}

        </>}

        {/* ════════════════ TOTALS ════════════════ */}
        {view==="totals"&&<>
          <div style={css.card}>
            <div style={css.cardT}>Running Totals <span style={{fontWeight:400,fontSize:11,color:"#7a8a98"}}>— 1-Year, 2-Year, and Multi-Year</span></div>
            <p style={{fontSize:12,color:"#7a8a98",margin:"0 0 10px",lineHeight:1.5}}>
              Enter shift counts across three time frames. The generator uses the <strong style={{color:"#7030a8"}}>multi-year</strong> totals for balancing assignments. All three are shown in Stats for tracking.
            </p>

            {/* Template download & upload */}
            <div style={{background:"linear-gradient(135deg,#f4f6f8,#f0f2f5)",border:"1px dashed #a8c0d8",borderRadius:8,padding:"14px 16px",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,color:"#1a6fa8",marginBottom:6}}>📄 Import from Spreadsheet</div>
              <div style={{fontSize:11,color:"#7a8a98",lineHeight:1.5,marginBottom:10}}>
                Download the template, fill in each surgeon's counts, then upload. Imports into the Multi-Year table. Accepts CSV or Excel (.xlsx).
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <button onClick={downloadTemplate} style={{...css.btn(false),padding:"6px 14px",fontSize:12}}>
                  ⬇ Download Template
                </button>
                <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls"
                  onChange={e => { if(e.target.files?.[0]) handleTemplateUpload(e.target.files[0]); }}
                  style={{display:"none"}} id="templateInput"/>
                <button onClick={()=>fileRef.current?.click()} disabled={scanning}
                  style={{...css.btn(true),opacity:scanning?0.5:1,padding:"6px 14px",fontSize:12}}>
                  {scanning ? "⏳ Reading…" : "⬆ Upload Filled Template"}
                </button>
              </div>
            </div>
            {scanMsg && (
              <div style={{fontSize:12,color:scanMsg.includes("Could not")||scanMsg.includes("could not")?"#c06060":"#50a070",marginBottom:10,padding:"6px 10px",background:scanMsg.includes("Could not")||scanMsg.includes("could not")?"#fce8e8":"#e8f8e8",border:`1px solid ${scanMsg.includes("Could not")||scanMsg.includes("could not")?"#e8c0c0":"#b0d8b0"}`,borderRadius:6}}>
                {scanMsg}
              </div>
            )}

            {/* Helper to render an editable totals table */}
            {[
              {label:"1-Year (Current Year)",color:"#1a6fa8",counts:year1Counts,setter:setYear1Counts},
              {label:"2-Year",color:"#8a6a10",counts:year2Counts,setter:setYear2Counts},
              {label:"Multi-Year (Used by Generator)",color:"#7030a8",counts:priorCounts,setter:setPriorCounts},
            ].map(tier=>(
              <div key={tier.label} style={{marginBottom:16}}>
                <div style={{fontSize:12,fontWeight:700,color:tier.color,marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>{tier.label}</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{borderBottom:"1px solid #d0d8e0"}}>
                        <th style={thS2}>Surgeon</th>
                        <th style={thS2}>Svc Wk</th><th style={thS2}>Nights</th><th style={thS2}>Wknds</th>
                        <th style={{...thS2,borderLeft:"1px solid #d8c880"}}>B-SW</th><th style={thS2}>B-Ngt</th><th style={thS2}>B-Wknd</th>
                      </tr>
                    </thead>
                    <tbody>
                      {surgeons.map(s=>{
                        const p = tier.counts[s.id]||{};
                        const total = calcShifts(p);
                        const upd = (field, val) => {
                          const v = parseInt(val)||0;
                          tier.setter(prev=>({...prev,[s.id]:{...(prev[s.id]||{}), [field]:v}}));
                        };
                        const ci = (field) => (
                          <input type="number" min="0" value={p[field]||0}
                            onChange={e=>upd(field,e.target.value)}
                            style={{...css.inp,width:46,padding:"2px 4px",textAlign:"center",fontFamily:mono,fontSize:12}}/>
                        );
                        return (
                          <tr key={s.id} style={{borderBottom:"1px solid #e8ecf0"}}>
                            <td style={{padding:"5px 6px"}}><Badge id={s.id} small/></td>
                            <td style={{padding:"3px 4px"}}>{ci("dc")}</td>
                            <td style={{padding:"3px 4px"}}>{ci("nights")}</td>
                            <td style={{padding:"3px 4px"}}>{ci("wknd")}</td>
                            <td style={{padding:"3px 4px",borderLeft:"1px solid #d8c880"}}>{ci("dcB")}</td>
                            <td style={{padding:"3px 4px"}}>{ci("nightsB")}</td>
                            <td style={{padding:"3px 4px"}}>{ci("wkndB")}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            ))}

            <div style={{fontSize:11,color:"#7a8a98",lineHeight:1.5}}>
              <strong style={{color:"#2c5a80"}}>B-SW</strong> = backup service week days. Type breakdown (Svc Wk, Nights, Wknds) used by generator for balancing.
            </div>
          </div>
        </>}

        {/* ════════════════ CALENDAR ════════════════ */}
        {view==="calendar"&&<>
          {/* ─── On Call Today Banner ─── */}
          {hasCallToday && (
            <div style={{background:"linear-gradient(135deg,#ffffff,#f0f8ff)",border:"1px solid #b0d0f0",borderRadius:12,padding:"14px 18px",marginBottom:14,boxShadow:"0 2px 8px rgba(26,111,168,0.08)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
                <div style={{fontSize:15,fontWeight:700,color:"#1a2a3a"}}>

                    {calFilters.fierce && hasFierceBkp && !hasFierce && <span style={{fontSize:8,fontWeight:700,color:"#1a6fa8",background:"#e8f0fc",borderRadius:3,padding:"0 4px",letterSpacing:0.5}}>F·BKP</span>}
                  </div>

                  {entries.filter(e=>{
                    if(e.type==="Fierce"||e.type==="FierceBkp"||e.type==="APP"||e.type==="Holiday") return false;
                    const isD = e.type.includes("Svc");
                    const isW = e.type.includes("Wknd");
                    if(isD && !calFilters.svc) return false;
                    if(isW && !calFilters.wknd) return false;
                    if(!isD && !isW && !calFilters.night) return false;
                    if(sf && e.surgeon !== sf) return false;
                    return true;
                  }).map((e,j)=>{
                    const isB = e.cls==="backup";
                    const isD = e.type.includes("Svc");
                    const isW = e.type.includes("Wknd");
                    const label = isD?"S":isW?"W":"N";
                    const color = isD?"#3080a8":isW?"#908050":"#6850a0";
                    const highlighted = sf && e.surgeon === sf;
                    return (
                      <div key={j} style={{marginBottom:1,padding:"1px 3px",borderRadius:3,fontSize:10,
                        background:highlighted?"#e0f0ff":isB?"#fef8e8":isD?"#f8f9fb":isW?"#faf8f0":"#f4f0f8",
                        border:`1px solid ${highlighted?"#80b8e0":isB?"#d8c880":isD?"#d0dce8":isW?"#faf0d8":"#141028"}`,

                      <span style={{color:"#c06020",fontWeight:700}}>🎄</span>

                      <span style={{color:PAL[sMap[e.surgeon]?.idx%7]?.tx||"#4a5868"}}>{sMap[e.surgeon]?.name||"?"}</span>

            <span><span style={{color:"#908050",fontWeight:700}}>W</span> Weekend</span>
            <span><span style={{color:"#c08050",fontWeight:700}}>A</span> APP</span>
            <span><span style={{color:"#8a6a10",fontWeight:700}}>B</span> Backup</span>

                  {(()=>{
                    // Find all Mondays whose week STARTS in the viewed calendar month.
                    // Week is "in" a month if its Monday falls in that month.
                    const first = new Date(calYear, calMonth, 1);
                    // Find the first Monday on or after the 1st of the month
                    let mon = new Date(first);
                    if (mon.getDay() !== 1) {
                      // day=0 (Sun) → +1; day=2 (Tue) → +6; day=3 (Wed) → +5; etc.
                      const dow = mon.getDay();
                      const offset = (dow === 0) ? 1 : (8 - dow);
                      mon = addD(mon, offset);
                    }
                    const results = [];
                    while (mon.getMonth() === calMonth && mon.getFullYear() === calYear) {
                      results.push(fmt(mon));
                      mon = addD(mon, 7);
                    }
                    return results;
                  })().map(m => {
                    const mon = parse(m);
                    const sun = addD(mon, 6);
                    const exists = !!schedule[m];
                    const suffix = exists
                      ? (schedule[m].isBackup ? " (Backup)" : "")
                      : " (new)";
                    const label = `Wk of ${MO[mon.getMonth()].slice(0,3)} ${mon.getDate()} – ${MO[sun.getMonth()].slice(0,3)} ${sun.getDate()}${suffix}`;

                      <option value="">Select shift…</option>
                      {ALL_SHIFT_KEYS.map(sk=><option key={sk} value={sk}>{SHIFT_LABELS[sk]}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Current Surgeon</label>
                    {(()=>{
                      const m = swapTarget?.mondayStr;
                      const sh = swapTarget?.shift;
                      const wk = m ? schedule[m] : null;
                      let currentId = null;
                      if (wk && sh) {
                        currentId = sh === "dayCall" ? wk.dayCall : wk.nights?.[sh];

                      return currentId ? (
                        <div style={{padding:"6px 10px"}}><Badge id={currentId}/></div>

                        <div style={{padding:"6px 10px",fontSize:12,color:"#8a94a0"}}>—</div>
                      );
                    })()}

                      Object.keys(schedule).sort().forEach(m => {
                        const wk = schedule[m];
                        if (!wk) return;
                        ALL_SHIFT_KEYS.forEach(sk => {
                          const holder = sk === "dayCall" ? wk.dayCall : wk.nights?.[sk];
                          if (holder === mySurgeon) {
                            const d = parse(m);
                            const label = `${MO[d.getMonth()].slice(0,3)} ${d.getDate()} — ${SHIFT_LABELS[sk]}${wk.isBackup ? " (Backup)" : ""}`;
                            opts.push({ value: `${m}|${sk}`, label });
                          }
                        });
                      });
                      const curVal = swapTarget?.mondayStr && swapTarget?.shift ? `${swapTarget.mondayStr}|${swapTarget.shift}` : "";
                      const placeholder = !mySurgeon ? "Select your name in Mine tab first"
                        : (opts.length === 0 ? "You have no scheduled shifts" : "Select your shift…");
                      return (
                        <select value={curVal} onChange={e=>{
                          const v = e.target.value;
                          setSwapSuggestions(null);
                          if (!v) { setSwapTarget(null); }
                          else { const [w, s] = v.split("|"); setSwapTarget({ mondayStr: w, shift: s }); }
                        }} style={{...css.inp,minWidth:260}} disabled={!mySurgeon || opts.length === 0}>
                          <option value="">{placeholder}</option>
                          {opts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                        </select>
                      );
                    })()}
                  </div>
                )}

                  const m = swapTarget?.mondayStr;
                  const sh = swapTarget?.shift;

                  if (!wk || !sh) return;

                  findSwapSuggestions(m, sh, currentId);

                  Find Swap Options

          {/* Export & Share */}
          {Object.keys(schedule).length > 0 && (

                  <button key={s.id} onClick={() => {
                    const events = buildICSEvents(schedule, s.id, s.name, appShifts, aMap);
                    const ics = generateICS(events, `Call Schedule — ${s.name}`);
                    downloadICS(ics, `call-schedule-${s.name.toLowerCase()}.ics`);

                    ⬇ {s.name}
                  </button>
                ))}
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                <button onClick={() => {
                  const allEvents = [];
                  surgeons.forEach(s => { allEvents.push(...buildICSEvents(schedule, s.id, s.name, appShifts, aMap)); });
                  Object.entries(appShifts).forEach(([ds, aid]) => {
                    const d = parse(ds); const next = addD(d, 1); const appName = aMap?.[aid]?.name || aid;
                    const dow = d.getDay(); const isWeekend = dow === 0 || dow === 6;
                    const startHour = isWeekend ? 7 : 17;
                    const timeLabel = isWeekend ? "7:00 AM – 7:00 AM" : "5:00 PM – 7:00 AM";
                    allEvents.push({ start: icsDate(d.getFullYear(),d.getMonth()+1,d.getDate(),startHour), end: icsDate(next.getFullYear(),next.getMonth()+1,next.getDate(),7), summary: `APP Call — ${appName}`, desc: `APP Call ${timeLabel}` });
                  });

                }} style={{...css.btn(true),padding:"6px 16px"}}>

                            <select value={draft.apps[ds]||""} onChange={e=>updateDraft(dr=>({...dr,apps:{...dr.apps,[ds]:e.target.value}}))} style={{...css.inp,padding:"6px 8px"}}>{appOpts}</select>

                  {/* Reason */}
                  <div style={{marginBottom:14}}>
                    <label style={{fontSize:12,fontWeight:700,color:dk?"#b0b8c0":"#5a6a78",marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:0.5}}>Reason (optional)</label>
                    <input type="text" value={draft.reason} onChange={e=>updateDraft(d=>({...d,reason:e.target.value}))} placeholder="e.g. REH sick, covering with FAK" style={{...css.inp,width:"100%",padding:"6px 8px"}} />
                  </div>

                  {/* Buttons */}
                  <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                    <button onClick={()=>setEditWeekModal(null)} style={{...css.btn(false),padding:"8px 16px"}}>Cancel</button>
                    <button onClick={saveWeekEdits} style={{...css.btn(true),padding:"8px 16px"}}>💾 Save Changes</button>
                  </div>
                </div>
              </div>
            );
          })()}
        </>}

        {/* ════════════════ STATS ════════════════ */}
        {view==="stats"&&<>
          {/* Export — scheduler only */}
          {isScheduler && (
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}>
              <button onClick={exportYearlySummary} style={{...css.btn(true),padding:"6px 16px",fontSize:12}}>
                ⬇ Export Yearly Summary (CSV)
              </button>
            </div>
          )}
          {/* Backup toggle */}
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
            <button onClick={()=>setShowBackupStats(p=>!p)}
              style={{background:showBackupStats?"#fef8e8":"#f4f6f8",border:`1px solid ${showBackupStats?"#d8c880":"#d0d8e0"}`,color:showBackupStats?"#8a6a10":"#5a6a78",borderRadius:6,padding:"4px 12px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:font}}>
              {showBackupStats ? "Hide 2nd Call" : "Show 2nd Call"}
            </button>
          </div>
          {/* Surgeon stats */}
          <div style={css.card}>
            <div style={css.cardT}>This Period — {MO[startMonth]} to {MO[endMoIdx]} {startYear}</div>
            {!Object.values(stats).some(s=>s.dc>0||s.nights>0) ? (
              <p style={{color:"#7a8a98",fontSize:13}}>Generate a schedule first.</p>
            ) : (
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{borderBottom:"2px solid #d0d8e0"}}>
                      <th style={thS}>Surgeon</th>
                      <th style={thS}><span style={{color:"#1a8040"}}>Total</span></th>
                      <th style={thS} colSpan={4}><span style={{color:"#1a6fa8"}}>{showBackupStats ? "1st Call" : "Regular"}</span></th>
                      {showBackupStats && <th style={{...thS,borderLeft:"2px solid #d8c880"}} colSpan={4}><span style={{color:"#8a6a10"}}>2nd Call</span></th>}
                    </tr>
                    <tr style={{borderBottom:"1px solid #e0e4ea"}}>
                      <th style={thS2}></th>
                      <th style={thS2}><span style={{color:"#1a8040"}}>Shifts</span></th>
                      <th style={thS2}>Svc Wk</th><th style={thS2}>Nights</th><th style={thS2}>Wknds</th><th style={thS2}>Off</th>
                      {showBackupStats && <><th style={{...thS2,borderLeft:"2px solid #d8c880"}}>Svc Wk</th><th style={thS2}>Nights</th><th style={thS2}>Wknds</th><th style={thS2}>Off</th></>}
                    </tr>

                    {surgeons.filter(s => isScheduler || !mySurgeon || mySurgeon === "admin" || s.id === mySurgeon).map(s=>{

                </div>
              </div>
            )}
          </div>

          {/* Monthly Call Summary */}
          {Object.keys(schedule).length > 0 && (()=>{
            // Compute monthly breakdown
            // Formula: Service Week = 6, Week Night = 1, Weekend = 2
            // Whole-shift shifts (Svc Wk, Weekend) are attributed to the month the shift STARTS in
            const monthlyData = {};
            const allMonths = new Set();
            Object.entries(schedule).forEach(([mStr, wk]) => {
              const mon = parse(mStr);
              // Register every month touched by this week so all surgeons show columns
              for (let i = 0; i < 7; i++) {
                const d = addD(mon, i);
                const moKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
                allMonths.add(moKey);
                if (!monthlyData[moKey]) monthlyData[moKey] = {};
                surgeons.forEach(s => { if (!monthlyData[moKey][s.id]) monthlyData[moKey][s.id] = { total1st: 0, total2nd: 0 }; });
              }
              const isB = wk.isBackup;
              const countKey = isB ? "total2nd" : "total1st";

              // Service Week = 6 points, attributed to the month containing Monday
              if (wk.dayCall) {
                const monMoKey = `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,"0")}`;
                if (monthlyData[monMoKey]?.[wk.dayCall]) monthlyData[monMoKey][wk.dayCall][countKey] += 6;
              }

              // Week Nights (Mon-Thu) = 1 point each, attributed to the night's own month
              NIGHT_KEYS.forEach((sk, i) => {
                const sid = wk.nights?.[sk];
                if (!sid) return;
                const d = addD(mon, i);
                const moKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
                if (monthlyData[moKey]?.[sid]) monthlyData[moKey][sid][countKey] += 1;
              });

              // Weekend (Fri night + Sun 24h) = 2 points, attributed to the month containing Friday
              const wkndSid = wk.nights?.wknd;
              if (wkndSid) {
                const fri = addD(mon, 4);
                const friMo = `${fri.getFullYear()}-${String(fri.getMonth()+1).padStart(2,"0")}`;
                if (monthlyData[friMo]?.[wkndSid]) monthlyData[friMo][wkndSid][countKey] += 2;
              }
            });

            const sortedMonths = [...allMonths].sort();
            const moLabels = sortedMonths.map(m => { const [y,mo] = m.split("-"); return MO[parseInt(mo)-1].slice(0,3) + " " + y.slice(2); });

            return (
              <div style={css.card}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
                  <div style={css.cardT}>📊 Monthly Call Summary</div>
                  <button onClick={()=>{
                    const header = ["Surgeon", ...moLabels.map(m=>m+" 1st"), "Total 1st", ...moLabels.map(m=>m+" 2nd"), "Total 2nd", "Grand Total"];
                    const rows = surgeons.map(s => {
                      const m1 = sortedMonths.map(m => monthlyData[m]?.[s.id]?.total1st || 0);
                      const m2 = sortedMonths.map(m => monthlyData[m]?.[s.id]?.total2nd || 0);
                      const t1 = m1.reduce((a,b)=>a+b,0);
                      const t2 = m2.reduce((a,b)=>a+b,0);
                      return [s.name, ...m1, t1, ...m2, t2, t1+t2].join(",");
                    });
                    const csv = [header.join(","), ...rows].join("\n");
                    const blob = new Blob([csv], {type:"text/csv"});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a"); a.href=url; a.download=`monthly-call-summary-${startYear}.csv`; a.click();
                    URL.revokeObjectURL(url);
                  }} style={{...css.btn(true),padding:"5px 14px",fontSize:11}}>
                    ⬇ Export CSV
                  </button>
                </div>

                {/* 1st Call (Regular) */}
                <div style={{fontSize:11,fontWeight:700,color:"#1a6fa8",marginBottom:4}}>1st Call (Regular)</div>

                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead>
                      <tr style={{borderBottom:"2px solid #d0d8e0"}}>
                        <th style={{...thS2,position:"sticky",left:0,background:dk?"#16213e":"#fff",zIndex:1}}>Surgeon</th>
