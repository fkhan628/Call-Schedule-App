// Lightweight Supabase REST client (no SDK dependency needed)
const supabase = {
  from: (table) => ({
    select: (cols) => ({
      eq: (col, val) => ({
        single: async () => {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=${cols}&${col}=eq.${val}`, {
            headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
          });
          const rows = await res.json();
          return { data: rows?.[0] || null, error: rows?.error || null };
        }
      })
    }),
    upsert: async (row) => {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method: "POST",
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          "Content-Type": "application/json",
          Prefer: "resolution=merge-duplicates",
        },
        body: JSON.stringify(row),
      });
      return { error: res.ok ? null : await res.text() };
    },
  }),
};

/* ═══ Date helpers ═══ */
const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const parse = s => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const addD = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const monOf = d => { const r=new Date(d); r.setDate(r.getDate()-((r.getDay()+6)%7)); return r; };

function getMondays(yr,mo,numWeeks) {
  const ms=[], s=new Date(yr,mo,1);
  let d=monOf(s); if(d<s) d=addD(d,7);
  while(ms.length<numWeeks){ ms.push(new Date(d)); d=addD(d,7); }
  return ms;
}

function onVac(id,ds,v){ return (v[id]||[]).some(([a,b])=>ds>=a&&ds<=b); }

/* ═══ ICS Calendar Generation ═══ */
function icsDate(y,m,d,h,min) {
  return `${y}${String(m).padStart(2,"0")}${String(d).padStart(2,"0")}T${String(h).padStart(2,"0")}${String(min||0).padStart(2,"0")}00`;
}

function buildICSEvents(schedule, surgeonId, surgeonName, appShifts, aMap) {
  const events = [];
  const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2,9)}@callsched`;

  Object.entries(schedule).forEach(([mondayStr, wk]) => {
    const mon = parse(mondayStr);
    const bkLabel = wk.isBackup ? " [BACKUP]" : "";

    // Day Call
    if (wk.dayCall === surgeonId) {
      // Mon-Fri 7a-5p
      for (let i = 0; i < 5; i++) {
        const d = addD(mon, i);
        const y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate();
        events.push({
          start: icsDate(y,m,day,7), end: icsDate(y,m,day,17),
          summary: `Day Call${bkLabel} — ${surgeonName}`,
          desc: `Day Call 7:00 AM – 5:00 PM${bkLabel}`
        });
      }
      // Sat 7a - Sun 7a (24h)
      const sat = addD(mon, 5);
      const sunD = addD(mon, 6);
      events.push({
        start: icsDate(sat.getFullYear(),sat.getMonth()+1,sat.getDate(),7),
        end: icsDate(sunD.getFullYear(),sunD.getMonth()+1,sunD.getDate(),7),
        summary: `Day Call Saturday 24h${bkLabel} — ${surgeonName}`,
        desc: `Saturday 7:00 AM – Sunday 7:00 AM${bkLabel}`
      });
    }

    // Night shifts (Mon-Thu)
    const nightKeys = ["mon","tue","wed","thu"];
    nightKeys.forEach((sk, i) => {
      if (wk.nights?.[sk] === surgeonId) {
        const d = addD(mon, i);
        const next = addD(mon, i + 1);
        events.push({
          start: icsDate(d.getFullYear(),d.getMonth()+1,d.getDate(),17),
          end: icsDate(next.getFullYear(),next.getMonth()+1,next.getDate(),7),
          summary: `Night Call${bkLabel} — ${surgeonName}`,
          desc: `${SHIFT_LABELS[sk]} 5:00 PM – 7:00 AM${bkLabel}`
        });
      }
    });

    // Weekend (Fri night + Sunday)
    if (wk.nights?.wknd === surgeonId) {
      // Fri 5p - Sat 7a
      const fri = addD(mon, 4);
      const sat = addD(mon, 5);
      events.push({
        start: icsDate(fri.getFullYear(),fri.getMonth()+1,fri.getDate(),17),
        end: icsDate(sat.getFullYear(),sat.getMonth()+1,sat.getDate(),7),
        summary: `Weekend Call (Fri Night)${bkLabel} — ${surgeonName}`,
        desc: `Friday 5:00 PM – Saturday 7:00 AM${bkLabel}`
      });
      // Sun 7a - Mon 7a
      const sunD = addD(mon, 6);
      const nextMon = addD(mon, 7);
      events.push({
        start: icsDate(sunD.getFullYear(),sunD.getMonth()+1,sunD.getDate(),7),
        end: icsDate(nextMon.getFullYear(),nextMon.getMonth()+1,nextMon.getDate(),7),
        summary: `Weekend Call (Sunday 24h)${bkLabel} — ${surgeonName}`,
        desc: `Sunday 7:00 AM – Monday 7:00 AM${bkLabel}`
      });
    }
  });

  // APP shifts (only if surgeonId is null = export all, or for APP-specific export)
  if (!surgeonId) {
    Object.entries(appShifts).forEach(([ds, aid]) => {
      const d = parse(ds);
      const next = addD(d, 1);
      const appName = aMap?.[aid]?.name || aid;
      events.push({
        start: icsDate(d.getFullYear(),d.getMonth()+1,d.getDate(),17),
        end: icsDate(next.getFullYear(),next.getMonth()+1,next.getDate(),7),
        summary: `APP Call — ${appName}`,
        desc: `APP Night Call 5:00 PM – 7:00 AM`
      });
    });
  }

  return events;
}

function generateICS(events, calName) {
  const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2,9)}@callsched`;
  let ics = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//DSG Call Schedule//EN\r\nCALSCALE:GREGORIAN\r\nX-WR-CALNAME:${calName}\r\n`;
  events.forEach(e => {
    ics += `BEGIN:VEVENT\r\nUID:${uid()}\r\nDTSTART:${e.start}\r\nDTEND:${e.end}\r\nSUMMARY:${e.summary}\r\nDESCRIPTION:${e.desc}\r\nEND:VEVENT\r\n`;
  });
  ics += `END:VCALENDAR\r\n`;
  return ics;
}

function downloadICS(content, filename) {
  const blob = new Blob([content], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

/* ═══ Schedule Generator (surgeons only — APPs are manual) ═══ */
function generate(surgeons, mondays, vac, backupMondays, priorCounts, preferences, fierceBackupMondays) {
  const sched = {};
  const ids = surgeons.map(s=>s.id);
  const nameMap = {}; surgeons.forEach(s => nameMap[s.id] = s.name);

  // Running counters seeded from prior totals
  const dcCt={}; const nCt={}; const wkndCt={}; const offCt={}; const lastPos={};
  // Weighted total burden: DC week=7, Night=1, Weekend=3
  const burden = {};
  ids.forEach(id=>{
    const p = priorCounts[id] || {};
    dcCt[id] = (p.dc||0) + (p.dcB||0);
    nCt[id] = (p.nights||0) + (p.nightsB||0);
    wkndCt[id] = (p.wknd||0) + (p.wkndB||0);
    offCt[id] = (p.off||0) + (p.offB||0);
    burden[id] = dcCt[id]*7 + nCt[id] + wkndCt[id]*3;
  });
  let prevWkndSurgeon = null;
  let prevDcSurgeon = null;

  const prefs = preferences || {};

  // Helper: is surgeon on vacation on a given date?
  const vacStartsNextDay = (id, dateStr) => {
    const d = parse(dateStr);
    const nextDay = fmt(addD(d, 1));
    return onVac(id, nextDay, vac);
  };

  for (const monday of mondays) {
    const mStr = fmt(monday);
    const isBackup = backupMondays.has(mStr);
    const isFierceBackup = (fierceBackupMondays||new Set()).has(mStr);
    const nextMondayStr = fmt(addD(monday, 7));

    // ═══ DAY CALL — pick surgeon with lowest DC count, tiebreak by total burden ═══
    const availDC = ids.filter(id => {
      for(let i=0;i<6;i++) if(onVac(id, fmt(addD(monday,i)), vac)) return false;
      return true;
    });

    let dc = null;
    if (availDC.length) {
      // Prefer surgeon who has had MORE off-weeks (they've been resting more, should work more)
      availDC.sort((a,b) => {
        const d = dcCt[a]-dcCt[b]; if(d) return d;
        // Tiebreak: lower total burden gets priority
        const bd = burden[a]-burden[b]; if(bd) return bd;
        // Tiebreak: more off-weeks → should take DC
        const od = offCt[b]-offCt[a]; if(od) return od;
        // RULE: avoid weekend call into day call week
        if(a===prevWkndSurgeon) return 1;
        if(b===prevWkndSurgeon) return -1;
        return 0;
      });
      dc = availDC[0]; dcCt[dc]++; burden[dc]+=7;
    }

    const rem = ids.filter(id=>id!==dc);
    const nights = {};
    const used = new Set();

    // ═══ WEEKEND SHIFT — assign first (most constrained) ═══
    const friDate = fmt(addD(monday,4));
    const sunDate = fmt(addD(monday,6));
    const nextMonDate = fmt(addD(monday,7));

    let availWknd = rem.filter(id => !onVac(id,friDate,vac) && !onVac(id,sunDate,vac));
    availWknd = availWknd.filter(id => !onVac(id, nextMonDate, vac));

    const prefWknd = availWknd.filter(id => id !== prevWkndSurgeon);
    const wkndPool = prefWknd.length > 0 ? prefWknd : availWknd;

    if (wkndPool.length) {
      wkndPool.sort((a,b) => {
        const d = wkndCt[a]-wkndCt[b]; if(d) return d;
        const bd = burden[a]-burden[b]; if(bd) return bd;
        if(lastPos[a]==="wknd"&&lastPos[b]!=="wknd") return 1;
        if(lastPos[b]==="wknd"&&lastPos[a]!=="wknd") return -1;
        return 0;
      });
      nights.wknd = wkndPool[0]; used.add(wkndPool[0]); wkndCt[wkndPool[0]]++; burden[wkndPool[0]]+=3;
    } else {
      const fb=rem.filter(id=>!used.has(id));
      if(fb.length){nights.wknd=fb[0];used.add(fb[0]);} else nights.wknd=null;
    }

    // ═══ WEEKNIGHT SHIFTS — assign with fairness-aware ordering ═══
    // Before assigning nights: figure out who SHOULD get the off-week
    // The surgeon with the highest burden (who is not on vacation) should ideally be off
    const nightCandidates = rem.filter(id => !used.has(id));

    // Identify the ideal off-person: highest burden among available, or lowest off-count
    let idealOff = null;
    if (nightCandidates.length > 0) {
      const sorted = [...nightCandidates].sort((a,b) => {
        // Surgeon with fewest off-weeks should get off next (fairness)
        const od = offCt[a]-offCt[b]; if(od) return od;
        // Tiebreak: highest burden → most deserving of rest
        const bd = burden[b]-burden[a]; if(bd) return bd;
        return 0;
      });
      idealOff = sorted[0];
    }

    // Shuffle night keys to prevent Mon-first positional bias
    const shuffledNightKeys = [...NIGHT_KEYS];
    for(let i=shuffledNightKeys.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [shuffledNightKeys[i],shuffledNightKeys[j]]=[shuffledNightKeys[j],shuffledNightKeys[i]];
    }

    // Assign nights: try to leave idealOff unassigned
    const nightAssignments = {};
    const nightUsed = new Set();

    for (const sk of shuffledNightKeys) {
      const dayOffset = {mon:0,tue:1,wed:2,thu:3}[sk];
      const sd = fmt(addD(monday, dayOffset));
      const nextDayStr = fmt(addD(monday, dayOffset + 1));

      let avail = rem.filter(id => !used.has(id) && !nightUsed.has(id) && !onVac(id,sd,vac));
      avail = avail.filter(id => !onVac(id, nextDayStr, vac));

      // Fallback layers
      if(!avail.length) avail = rem.filter(id => !used.has(id) && !nightUsed.has(id) && !onVac(id,sd,vac));
      if(!avail.length) avail = rem.filter(id => !used.has(id) && !nightUsed.has(id));
      if(!avail.length){ nightAssignments[sk]=null; continue; }

      avail.sort((a,b) => {
        // If idealOff is in the pool, push them to the back
        if(a===idealOff && b!==idealOff) return 1;
        if(b===idealOff && a!==idealOff) return -1;

        const d=nCt[a]-nCt[b]; if(d) return d;
        const bd = burden[a]-burden[b]; if(bd) return bd;

        // Preferences
        const aPref = prefs[a]; const bPref = prefs[b];
        const aBonus = (aPref?.preferShift===sk ? -10 : 0) + (aPref?.avoidShift===sk ? 10 : 0);
        const bBonus = (bPref?.preferShift===sk ? -10 : 0) + (bPref?.avoidShift===sk ? 10 : 0);
        if(aBonus !== bBonus) return aBonus - bBonus;

        if(lastPos[a]===sk&&lastPos[b]!==sk) return 1;
        if(lastPos[b]===sk&&lastPos[a]!==sk) return -1;
        if(sk==="mon"&&a===prevWkndSurgeon) return 1;
        if(sk==="mon"&&b===prevWkndSurgeon) return -1;
        return 0;
      });

      nightAssignments[sk] = avail[0]; nightUsed.add(avail[0]); nCt[avail[0]]++; burden[avail[0]]++; lastPos[avail[0]] = sk;
    }

    // Copy to nights object
    for (const sk of NIGHT_KEYS) nights[sk] = nightAssignments[sk] || null;

    if(nights.wknd) lastPos[nights.wknd] = "wknd";
    prevWkndSurgeon = nights.wknd || null;
    prevDcSurgeon = dc;

    const assigned = new Set([dc, ...Object.values(nights)].filter(Boolean));
    const off = ids.find(id => !assigned.has(id)) || null;
    if(off) offCt[off]++;

    sched[mStr] = { dayCall:dc, nights, off, isBackup, isFierceBackup };
  }

  // ═══ POST-OPTIMIZATION PASS ═══
  // Try swaps within same shift type to reduce unfairness
  const mondayStrs = mondays.map(m => fmt(m));
  const calcSpread = (ct) => { const vals = Object.values(ct); return Math.max(...vals)-Math.min(...vals); };

  for (let pass = 0; pass < 50; pass++) {
    let improved = false;

    // Try swapping day call between two weeks
    for (let i = 0; i < mondayStrs.length && !improved; i++) {
      for (let j = i+1; j < mondayStrs.length && !improved; j++) {
        const wkA = sched[mondayStrs[i]];
        const wkB = sched[mondayStrs[j]];
        if (!wkA?.dayCall || !wkB?.dayCall || wkA.dayCall === wkB.dayCall) continue;

        const a = wkA.dayCall, b = wkB.dayCall;
        const monA = parse(mondayStrs[i]), monB = parse(mondayStrs[j]);

        // Check vacation constraints
        let aCanDoB = true, bCanDoA = true;
        for(let d=0;d<6;d++){
          if(onVac(a, fmt(addD(monB,d)), vac)) aCanDoB=false;
          if(onVac(b, fmt(addD(monA,d)), vac)) bCanDoA=false;
        }
        if(!aCanDoB || !bCanDoA) continue;

        // Check if swap reduces DC spread
        const oldSpread = calcSpread(dcCt);
        dcCt[a]--; dcCt[b]--;
        dcCt[a]++; dcCt[b]++;
        // Simulate swap
        const simDcCt = {...dcCt};
        simDcCt[a]--; simDcCt[b]--; // undo both
        simDcCt[b]++; simDcCt[a]++; // swap: a does j, b does i... wait this is same
        // Actually the counts don't change for DC since both still do 1 DC each
        // Swaps help when one surgeon has an extra DC due to vacation constraints
        // Skip DC swaps for now — they're already well-balanced
      }
    }

    // Try swapping weekend assignments between two weeks
    for (let i = 0; i < mondayStrs.length && !improved; i++) {
      for (let j = i+1; j < mondayStrs.length && !improved; j++) {
        const wkA = sched[mondayStrs[i]];
        const wkB = sched[mondayStrs[j]];
        const a = wkA.nights?.wknd, b = wkB.nights?.wknd;
        if (!a || !b || a === b) continue;

        const monA = parse(mondayStrs[i]), monB = parse(mondayStrs[j]);

        // Check vacation constraints for weekend (Fri + Sun)
        const friA = fmt(addD(monA,4)), sunA = fmt(addD(monA,6)), nMonA = fmt(addD(monA,7));
        const friB = fmt(addD(monB,4)), sunB = fmt(addD(monB,6)), nMonB = fmt(addD(monB,7));

        const bCanDoA = !onVac(b,friA,vac) && !onVac(b,sunA,vac) && !onVac(b,nMonA,vac) && b !== wkA.dayCall;
        const aCanDoB = !onVac(a,friB,vac) && !onVac(a,sunB,vac) && !onVac(a,nMonB,vac) && a !== wkB.dayCall;
        if (!bCanDoA || !aCanDoB) continue;

        // Check if swap reduces weekend spread
        const oldSpread = calcSpread(wkndCt);
        const simWknd = {...wkndCt};
        simWknd[a]--; simWknd[b]--;
        simWknd[b]++; simWknd[a]++;
        // Swap: a→j's weekend, b→i's weekend
        const swapWknd = {...wkndCt};
        swapWknd[a]--; swapWknd[b]--;
        swapWknd[a]++; swapWknd[b]++;
        // Again counts don't change if both had 1 weekend each
        // Swaps help when one has 3 weekends and another has 1
        const testCt = {...wkndCt};
        testCt[a]--; testCt[b]++; // a loses one, b gains one
        const testCt2 = {...testCt};
        testCt2[b]--; testCt2[a]++; // reverse — net zero
        // Need asymmetric check only when counts differ
        if (wkndCt[a] > wkndCt[b] + 1) {
          // a has more weekends — swap so a does fewer
          wkndCt[a]--; wkndCt[b]++;
          burden[a]-=3; burden[b]+=3;
          wkA.nights.wknd = b; wkB.nights.wknd = a;
          // Update off assignments
          const fixOff = (wk, mStr) => {
            const assigned = new Set([wk.dayCall, ...Object.values(wk.nights)].filter(Boolean));
            wk.off = ids.find(id => !assigned.has(id)) || null;
          };
          fixOff(wkA, mondayStrs[i]);
          fixOff(wkB, mondayStrs[j]);
          improved = true;
        } else if (wkndCt[b] > wkndCt[a] + 1) {
          wkndCt[b]--; wkndCt[a]++;
          burden[b]-=3; burden[a]+=3;
          wkA.nights.wknd = b; wkB.nights.wknd = a;
          const fixOff = (wk) => {
            const assigned = new Set([wk.dayCall, ...Object.values(wk.nights)].filter(Boolean));
            wk.off = ids.find(id => !assigned.has(id)) || null;
          };
          fixOff(wkA); fixOff(wkB);
          improved = true;
        }
      }
    }

    if (!improved) break;
  }

  return sched;
}

          for (const p of patterns) {
            if (k.includes(p)) return parseInt(row[key]) || 0;

    a.href = url;
    a.download = `dsg-call-schedule-${MO[startMonth].toLowerCase()}-${MO[endMoIdx].toLowerCase()}-${startYear}.html`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // Stats
  const stats = useMemo(() => {
    const s={}; surgeons.forEach(sg=>s[sg.id]={dc:0,nights:0,wknd:0,off:0,dcB:0,nightsB:0,wkndB:0,offB:0});
    Object.values(schedule).forEach(wk => {
      const bk = wk.isBackup;
      if(wk.dayCall&&s[wk.dayCall]) s[wk.dayCall][bk?"dcB":"dc"]++;
      if(wk.off&&s[wk.off]) s[wk.off][bk?"offB":"off"]++;
      Object.entries(wk.nights||{}).forEach(([sh,sid])=>{
        if(!sid||!s[sid]) return;
        if(sh==="wknd") s[sid][bk?"wkndB":"wknd"]++;
        else s[sid][bk?"nightsB":"nights"]++;
      });
    });
    return s;
  }, [schedule, surgeons]);

  // APP stats
  const appStats = useMemo(() => {
    const s={}; apps.forEach(a=>s[a.id]=0);
    Object.values(appShifts).forEach(aid=>{ if(s[aid]!==undefined) s[aid]++; });
    return s;
  }, [appShifts, apps]);

  // Vacation days per surgeon
  const vacDays = useMemo(() => {
    const d = {};
    surgeons.forEach(s => {
      const ranges = vacations[s.id] || [];
      let total = 0;
      ranges.forEach(([start, end]) => {
        const s1 = parse(start);
        const s2 = parse(end);
        const diff = Math.round((s2 - s1) / (1000*60*60*24)) + 1;
        if (diff > 0) total += diff;
      });
      d[s.id] = total;
    });
    return d;
  }, [vacations, surgeons]);

  // Cumulative stats: 1-year, 2-year, multi-year (each = prior tier + current schedule)
  const buildCum = (prior) => {
    const c = {};
    surgeons.forEach(s => {
      const p = prior[s.id] || {};
      const cur = stats[s.id] || {};
      c[s.id] = {
        dc: (p.dc||0)+(cur.dc||0), nights: (p.nights||0)+(cur.nights||0), wknd: (p.wknd||0)+(cur.wknd||0), off: (p.off||0)+(cur.off||0),
        dcB: (p.dcB||0)+(cur.dcB||0), nightsB: (p.nightsB||0)+(cur.nightsB||0), wkndB: (p.wkndB||0)+(cur.wkndB||0), offB: (p.offB||0)+(cur.offB||0),
      };
    });
    return c;
  };
  const cum1yr = useMemo(() => buildCum(year1Counts), [stats, year1Counts, surgeons]);
  const cum2yr = useMemo(() => buildCum(year2Counts), [stats, year2Counts, surgeons]);
  const cumStats = useMemo(() => buildCum(priorCounts), [stats, priorCounts, surgeons]);

  // Total call shifts (regular only): Day Call wk = 7, Night = 1, Weekend = 3
  const calcShifts = (s) => (s.dc||0)*7 + (s.nights||0)*1 + (s.wknd||0)*3;

  // Calendar data
  const calData = useMemo(() => {
    const d={};
    Object.entries(schedule).forEach(([mStr,wk])=>{
      const mon=parse(mStr);
      const pfx = wk.isBackup ? "B-" : "";
      const cls = wk.isBackup ? "backup" : "primary";
      if(wk.dayCall){
        for(let i=0;i<5;i++){
          const ds=fmt(addD(mon,i));
          d[ds]=[...(d[ds]||[]),{type:pfx+"Day",surgeon:wk.dayCall,cls}];
        }
        const sat=fmt(addD(mon,5));
        d[sat]=[...(d[sat]||[]),{type:pfx+"Day",surgeon:wk.dayCall,cls,note:"24h"}];
      }
      NIGHT_KEYS.forEach((sk,i)=>{
        const sid=wk.nights?.[sk]; if(!sid) return;
        const ds=fmt(addD(mon,i));
        d[ds]=[...(d[ds]||[]),{type:pfx+"Ngt",surgeon:sid,cls}];
      });
      const wkndS = wk.nights?.wknd;
      if(wkndS){
        const fri=fmt(addD(mon,4));
        d[fri]=[...(d[fri]||[]),{type:pfx+"Wknd",surgeon:wkndS,cls,note:"5p–7a"}];
        const sun=fmt(addD(mon,6));
        d[sun]=[...(d[sun]||[]),{type:pfx+"Wknd",surgeon:wkndS,cls,note:"7a–7a"}];
      }
      if(wk.isBackup){
        for(let i=0;i<7;i++){
          const ds=fmt(addD(mon,i));
          d[ds]=[...(d[ds]||[]),{type:"Fierce",surgeon:null,cls:"fierce"}];
        }
      }
      if(wk.isFierceBackup){
        for(let i=0;i<7;i++){
          const ds=fmt(addD(mon,i));
          d[ds]=[...(d[ds]||[]),{type:"FierceBkp",surgeon:null,cls:"fiercebkp"}];
        }
      }
    });
    // APP shifts
    Object.entries(appShifts).forEach(([ds,aid])=>{
      d[ds]=[...(d[ds]||[]),{type:"APP",appId:aid,cls:"app"}];
    });
    return d;
  }, [schedule, appShifts]);

  // Calendar grid
  const calGrid = useMemo(() => {
    const days=new Date(calYear,calMonth+1,0).getDate();
    const first=new Date(calYear,calMonth,1).getDay();
    const c=[]; for(let i=0;i<first;i++) c.push(null);
    for(let d=1;d<=days;d++) c.push(d);
    while(c.length%7) c.push(null);
    return c;
  }, [calYear,calMonth]);

  // Which APP shifts fall in a given week (for schedule view)
  const appShiftsInWeek = (mondayStr) => {
    const mon = parse(mondayStr);
    const result = [];
    for(let i=0;i<7;i++){
      const ds = fmt(addD(mon,i));
      if(appShifts[ds]) result.push({date:ds, day:DAY_HDR[addD(mon,i).getDay()], appId:appShifts[ds]});
    }
    return result;
  };

  const Badge = ({id,small}) => {
    const s=sMap[id]; if(!s) return <span style={{color:"#a0a8b0",fontSize:10}}>—</span>;
    return <span style={{...css.badge(s.idx),fontSize:small?10:11,padding:small?"1px 6px":"2px 9px"}}>{s.name}</span>;
  };

  const AppBadge = ({id,small}) => {
    const a=aMap[id]; if(!a) return <span style={{color:"#a0a8b0",fontSize:10}}>—</span>;
    return <span style={{...css.appBadge(a.idx),fontSize:small?10:11,padding:small?"1px 6px":"2px 9px"}}>{a.name}</span>;
  };

  return (
    <div style={css.root}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

      {/* ─── Header ─── */}
      <div style={css.hdr}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:38,height:38,borderRadius:8,background:"linear-gradient(135deg,#1a6fa8,#2488c8)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 2px 6px rgba(26,111,168,0.25)"}}>
            <span style={{color:"#fff",fontSize:15,fontWeight:800,letterSpacing:-0.5,fontFamily:font}}>DSG</span>
          </div>
          <div>
            <h1 style={css.h1}>Davenport Surgical Group</h1>
            <p style={css.sub}>
              Call Schedule · Surgeons + APPs
              {saveStatus && <span style={{marginLeft:8,color:"#1a8040",fontWeight:600,fontSize:11}}>☁ {saveStatus}</span>}
              {loaded && !saveStatus && <span style={{marginLeft:8,color:"#a0a8b0",fontSize:10}}>☁ Synced</span>}
              {!loaded && <span style={{marginLeft:8,color:"#6a7a88",fontSize:10}}>Connecting…</span>}
            </p>
          </div>
        </div>
        <div style={css.nav}>
          {[["setup","Setup"],["totals","Totals"],["schedule","Schedule"],["calendar","Calendar"],["stats","Stats"]].map(([k,l])=>
            <button key={k} style={css.tab(view===k)} onClick={()=>setView(k)}>{l}</button>
          )}
        </div>
      </div>

      <div style={{maxWidth:1020,margin:"0 auto",padding:"18px 14px 60px"}}>

        {/* ════════════════ SETUP ════════════════ */}
        {view==="setup"&&<>
          {/* Surgeons */}
          <div style={css.card}>
            <div style={css.cardT}>Surgeons</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:6}}>
              {surgeons.map((s,i)=>(
                <div key={s.id} style={{display:"flex",alignItems:"center",gap:6,background:"#f4f6f8",borderRadius:6,padding:"5px 8px",border:"1px solid #e0e4ea"}}>
                  <div style={{width:8,height:8,borderRadius:2,background:PAL[i%7].tx,flexShrink:0}}/>
                  <input value={s.name} onChange={e=>rename(s.id,e.target.value)}
                    style={{...css.inp,border:"none",padding:"3px 4px",background:"transparent",width:"100%",fontWeight:600,letterSpacing:0.5}}/>
                </div>
              ))}
            </div>
          </div>

          {/* APPs */}
          <div style={css.card}>
            <div style={css.cardT}>APPs <span style={{fontWeight:400,fontSize:11,color:"#7a8a98"}}>— Night Call 5p–7a (Intermittent)</span></div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:6}}>
              {apps.map((a,i)=>(
                <div key={a.id} style={{display:"flex",alignItems:"center",gap:6,background:"#f4f6f8",borderRadius:6,padding:"5px 8px",border:`1px solid ${APP_PAL[i%4].bd}`}}>
                  <div style={{width:8,height:8,borderRadius:2,background:APP_PAL[i%4].tx,flexShrink:0}}/>
                  <input value={a.name} onChange={e=>renameApp(a.id,e.target.value)}
                    style={{...css.inp,border:"none",padding:"3px 4px",background:"transparent",width:"100%",fontWeight:600,letterSpacing:0.5}}/>
                </div>
              ))}
            </div>
          </div>

          {/* Period */}
          <div style={css.card}>
            <div style={css.cardT}>Schedule Period (14 Weeks)</div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <select value={startMonth} onChange={e=>setStartMonth(+e.target.value)} style={{...css.inp,width:140}}>
                {MO.map((m,i)=><option key={i} value={i}>{m}</option>)}

              <select value={startYear} onChange={e=>setStartYear(+e.target.value)} style={{...css.inp,width:90}}>

              <span style={{color:"#7a8a98",fontSize:12}}>→ {MO[endMoIdx]} {endYr}</span>

              <div style={{fontSize:13,fontWeight:600,color:"#1a6fa8",marginBottom:6}}>📄 Import Vacation Schedule</div>
              <div style={{fontSize:11,color:"#7a8a98",lineHeight:1.5,marginBottom:8}}>
                Upload a PDF, Excel, Word, or image of approved vacations. The tool will match surgeon initials and import dates automatically.
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <input ref={vacFileRef} type="file" accept=".pdf,image/*,.xlsx,.xls,.csv,.docx,.doc" capture="environment"
                  onChange={e => { if(e.target.files?.[0]) handleVacationScan(e.target.files[0]); }}
                  style={{display:"none"}} id="vacScanInput"/>
                <button onClick={()=>vacFileRef.current?.click()} disabled={vacScanning}
                  style={{...css.btn(true),opacity:vacScanning?0.5:1,padding:"6px 14px",fontSize:12}}>
                  {vacScanning ? "⏳ Reading…" : "📄 Upload Vacation File"}
                </button>
              </div>
            </div>
            {vacScanMsg && (
              <div style={{fontSize:12,color:vacScanMsg.includes("Could not")||vacScanMsg.includes("No vacations")?"#c06060":"#50a070",marginBottom:10,padding:"6px 10px",background:vacScanMsg.includes("Could not")||vacScanMsg.includes("No vacations")?"#fce8e8":"#e8f8e8",border:`1px solid ${vacScanMsg.includes("Could not")||vacScanMsg.includes("No vacations")?"#e8c0c0":"#b0d8b0"}`,borderRadius:6}}>
                {vacScanMsg}
              </div>
            )}

            <div style={{fontSize:11,fontWeight:600,color:"#6a7a88",marginBottom:8}}>Or add manually:</div>
            <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap",marginBottom:12}}>
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Surgeon</label>
                <select value={vacSurgeon} onChange={e=>setVacSurgeon(e.target.value)} style={{...css.inp,width:120}}>
                  <option value="">Select…</option>
                  {surgeons.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Start</label>
                <input type="date" value={vacStart} onChange={e=>setVacStart(e.target.value)} style={{...css.inp,width:140}}/>
              </div>
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>End</label>
                <input type="date" value={vacEnd} onChange={e=>setVacEnd(e.target.value)} style={{...css.inp,width:140}}/>
              </div>
              <button onClick={addVac} style={css.btn(true)}>+ Add</button>
            </div>
            {surgeons.map(s=>{
              const v=vacations[s.id]||[]; if(!v.length) return null;
              return (
                <div key={s.id} style={{marginBottom:6,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <Badge id={s.id}/>
                  {v.map(([vs,ve],i)=>(
                    <span key={i} style={{fontFamily:mono,fontSize:11,color:"#5a6a78"}}>
                      {vs} → {ve}
                      <button onClick={()=>rmVac(s.id,i)} style={{background:"none",border:"none",color:"#904040",cursor:"pointer",fontSize:11,marginLeft:3}}>✕</button>
                    </span>
                  ))}
                </div>
              );
            })}
          </div>

          {/* APP Shift Assignments */}
          <div style={css.card}>
            <div style={css.cardT}>APP Call Shifts <span style={{fontWeight:400,fontSize:11,color:"#7a8a98"}}>— Assign Individually</span></div>
            <p style={{fontSize:12,color:"#7a8a98",margin:"0 0 10px",lineHeight:1.5}}>
              Assign APP night shifts (5p–7a) on specific dates. These are added manually since APP coverage is intermittent.
            </p>
            <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap",marginBottom:12}}>
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Date</label>
                <input type="date" value={appDate} onChange={e=>setAppDate(e.target.value)} style={{...css.inp,width:150}}/>
              </div>
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>APP</label>
                <select value={appPerson} onChange={e=>setAppPerson(e.target.value)} style={{...css.inp,width:120}}>
                  <option value="">Select…</option>
                  {apps.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
                </select>
              </div>
              <button onClick={addAppShift} style={css.btn(true)}>+ Assign</button>
            </div>
            {Object.entries(appShifts).sort(([a],[b])=>a.localeCompare(b)).map(([ds,aid])=>(
              <div key={ds} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span style={{fontFamily:mono,fontSize:12,color:"#5a6a78"}}>{ds}</span>
                <span style={{fontSize:11,color:"#5a6a78"}}>{DAY_HDR[parse(ds).getDay()]}</span>
                <AppBadge id={aid}/>
                <span style={{fontSize:10,color:"#7a8a98"}}>5p–7a</span>
                <button onClick={()=>rmAppShift(ds)} style={{background:"none",border:"none",color:"#904040",cursor:"pointer",fontSize:11}}>✕</button>
              </div>
            ))}
          </div>

          {/* Backup Weeks */}
          <div style={css.card}>
            <div style={css.cardT}>Backup Weeks <span style={{fontWeight:400,fontSize:11,color:"#7a8a98"}}>(Fierce = Primary)</span></div>
            <p style={{fontSize:12,color:"#7a8a98",margin:"0 0 10px",lineHeight:1.5}}>
              Mark weeks where <strong style={{color:"#8a6a10"}}>Fierce</strong> is the primary surgeon. Group provides backup coverage with the same rotation.
            </p>

            {/* Scan Fierce's schedule */}
            <div style={{background:"#fef8e8",border:"1px dashed #d8c070",borderRadius:8,padding:"12px 16px",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,color:"#7a5a00",marginBottom:6}}>📄 Import Fierce's Schedule</div>
              <div style={{fontSize:12,color:"#5a5030",lineHeight:1.5,marginBottom:8}}>
                Upload a photo, Excel, Word, or CSV file of Fierce's upcoming schedule. The tool will identify which weeks Fierce is on and auto-mark them as backup.
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <input ref={bkFileRef} type="file" accept="image/*,.xlsx,.xls,.csv,.docx,.doc" capture="environment"
                  onChange={e => { if(e.target.files?.[0]) handleBackupScan(e.target.files[0]); }}
                  style={{display:"none"}} id="bkScanInput"/>
                <button onClick={()=>bkFileRef.current?.click()} disabled={bkScanning}
                  style={{...css.btn(true),opacity:bkScanning?0.5:1,padding:"6px 14px",fontSize:12,background:"linear-gradient(135deg,#f8f0d8,#e0c870)",borderColor:"#d0b860",color:"#8a6a10"}}>
                  {bkScanning ? "⏳ Scanning…" : "📷 Upload Fierce's Schedule"}
                </button>
              </div>
            </div>
            {bkScanMsg && (
              <div style={{fontSize:12,color:bkScanMsg.includes("Could not")||bkScanMsg.includes("No weeks")?"#c06060":"#50a070",marginBottom:10,padding:"6px 10px",background:bkScanMsg.includes("Could not")||bkScanMsg.includes("No weeks")?"#fce8e8":"#e8f8e8",border:`1px solid ${bkScanMsg.includes("Could not")||bkScanMsg.includes("No weeks")?"#e8c0c0":"#b0d8b0"}`,borderRadius:6}}>
                {bkScanMsg}
              </div>

            <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap",marginBottom:12}}>
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Or add manually — Week Starting (Monday)</label>
                <input type="date" value={bkMonday} onChange={e=>setBkMonday(e.target.value)} style={{...css.inp,width:160}}/>
              </div>
              <button onClick={()=>{ if(bkMonday){ setBackupMondaySet(p=>{const n=new Set(p);n.add(bkMonday);return n;}); setBkMonday(""); }}} style={css.btn(true)}>+ Mark Backup</button>
            </div>
            {[...backupMondaySet].sort().map(m=>(
              <div key={m} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                <span style={{fontFamily:mono,fontSize:12,color:"#5a6a78"}}>Wk of {m}</span>
                <span style={css.backupBanner}>⚡ BACKUP — Fierce Primary</span>
                <button onClick={()=>setBackupMondaySet(p=>{const n=new Set(p);n.delete(m);return n;})} style={{background:"none",border:"none",color:"#904040",cursor:"pointer",fontSize:12}}>✕</button>
              </div>
            ))}

            {/* Fierce Backup weeks — label only, no schedule change */}
            <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid #e0e4ea"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#6090a8",marginBottom:6}}>Fierce Backup Weeks <span style={{fontWeight:400,color:"#7a8a98"}}>— Regular schedule, Fierce backs up the group</span></div>
              <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap",marginBottom:10}}>
                <div>
                  <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Week Starting (Monday)</label>

                  <span style={{fontSize:11,color:"#1a6fa8",background:"#e8f0fc",border:"1px solid #a8c8e0",borderRadius:6,padding:"3px 8px",fontWeight:600}}>🛡 Fierce Backup</span>

                <p style={{fontSize:11,color:"#7a8a98",margin:"0 0 10px",lineHeight:1.6}}>
                  Required for AI-powered file scanning (vacations, Fierce schedules, prior call sheets). This key is shared with anyone who has access to this artifact.
                  Get a key at <span style={{color:"#1a6fa8"}}>console.anthropic.com</span>
                </p>
                {!apiKey ? (
                  <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                    <input type="password" placeholder="sk-ant-api03-..." value={apiKey} onChange={e=>setApiKey(e.target.value)}
                      style={{...css.inp,width:300,fontSize:12,fontFamily:mono}}/>
                    <span style={{fontSize:10,color:"#8a94a0"}}>Paste and it auto-saves</span>
                  </div>
                ) : (
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:12,color:"#6a7a88",fontFamily:mono}}>{apiKey.slice(0,12)}…{apiKey.slice(-4)}</span>
                    <span style={{fontSize:11,color:"#1a8040",fontWeight:600}}>✓ Active</span>
                    <button onClick={()=>setApiKey("")} style={{background:"none",border:"1px solid #e8c0c0",color:"#804040",borderRadius:5,padding:"3px 10px",fontSize:11,cursor:"pointer",fontFamily:font}}>Remove</button>
                  </div>
                )}

                <div style={{marginTop:16,paddingTop:12,borderTop:"1px solid #e0e4ea"}}>
                  <button onClick={resetAllData} style={{background:"none",border:"1px solid #e8c0c0",color:"#804040",borderRadius:6,padding:"5px 12px",fontSize:11,cursor:"pointer",fontFamily:font}}>
                    Reset All Data
                  </button>
                </div>
              </div>
            )}
          </div>
        </>}

        {/* ════════════════ TOTALS ════════════════ */}
        {view==="totals"&&<>
          <div style={css.card}>
            <div style={css.cardT}>Running Totals <span style={{fontWeight:400,fontSize:11,color:"#7a8a98"}}>— 1-Year, 2-Year, and Multi-Year</span></div>
            <p style={{fontSize:12,color:"#7a8a98",margin:"0 0 10px",lineHeight:1.5}}>
              Enter shift counts across three time frames. The generator uses the <strong style={{color:"#7030a8"}}>multi-year</strong> totals for balancing assignments. All three are shown in Stats for tracking.
            </p>

            {/* Template download & upload */}
            <div style={{background:"linear-gradient(135deg,#f4f6f8,#f0f2f5)",border:"1px dashed #a8c0d8",borderRadius:8,padding:"14px 16px",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,color:"#1a6fa8",marginBottom:6}}>📄 Import from Spreadsheet</div>
              <div style={{fontSize:11,color:"#7a8a98",lineHeight:1.5,marginBottom:10}}>
                Download the template, fill in each surgeon's counts, then upload. Imports into the Multi-Year table. Accepts CSV or Excel (.xlsx).
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <button onClick={downloadTemplate} style={{...css.btn(false),padding:"6px 14px",fontSize:12}}>
                  ⬇ Download Template
                </button>
                <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls"
                  onChange={e => { if(e.target.files?.[0]) handleTemplateUpload(e.target.files[0]); }}
                  style={{display:"none"}} id="templateInput"/>
                <button onClick={()=>fileRef.current?.click()} disabled={scanning}
                  style={{...css.btn(true),opacity:scanning?0.5:1,padding:"6px 14px",fontSize:12}}>
                  {scanning ? "⏳ Reading…" : "⬆ Upload Filled Template"}
                </button>
              </div>
            </div>
            {scanMsg && (
              <div style={{fontSize:12,color:scanMsg.includes("Could not")||scanMsg.includes("could not")?"#c06060":"#50a070",marginBottom:10,padding:"6px 10px",background:scanMsg.includes("Could not")||scanMsg.includes("could not")?"#fce8e8":"#e8f8e8",border:`1px solid ${scanMsg.includes("Could not")||scanMsg.includes("could not")?"#e8c0c0":"#b0d8b0"}`,borderRadius:6}}>
                {scanMsg}
              </div>
            )}

            {/* AI-powered schedule scan */}
            <div style={{background:"linear-gradient(135deg,#f8f0f4,#f8f0f4)",border:"1px dashed #c0a0d8",borderRadius:8,padding:"14px 16px",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,color:"#7030a8",marginBottom:6}}>🤖 Scan a Past Call Schedule</div>
              <div style={{fontSize:11,color:"#7a8a98",lineHeight:1.5,marginBottom:10}}>
                Upload a photo, PDF, Excel, Word, or CSV of a previous call schedule. AI will read it and count each surgeon's shifts automatically. Imports into the Multi-Year table.
                {!apiKey && <span style={{color:"#c04040",fontWeight:600}}> Requires API key — add one in ⚙️ Settings on the Setup tab.</span>}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <input ref={priorFileRef} type="file" accept=".pdf,image/*,.xlsx,.xls,.csv,.docx,.doc" capture="environment"
                  onChange={e => { if(e.target.files?.[0]) handlePriorScheduleScan(e.target.files[0]); }}
                  style={{display:"none"}} id="priorScanInput"/>
                <button onClick={()=>priorFileRef.current?.click()} disabled={priorScanning}
                  style={{...css.btn(true),opacity:priorScanning?0.5:1,padding:"6px 14px",fontSize:12,background:"linear-gradient(135deg,#f0e8f8,#e8d8f4)",borderColor:"#c0a0d8",color:"#7030a8"}}>
                  {priorScanning ? "⏳ Analyzing…" : "📷 Upload Past Schedule"}
                </button>
                {apiKey && <span style={{fontSize:10,color:"#1a8040"}}>✓ AI scanning ready</span>}
              </div>
            </div>
            {priorScanMsg && (
              <div style={{fontSize:12,color:priorScanMsg.includes("Could not")||priorScanMsg.includes("API key")?"#c06060":"#50a070",marginBottom:10,padding:"6px 10px",background:priorScanMsg.includes("Could not")||priorScanMsg.includes("API key")?"#fce8e8":"#e8f8e8",border:`1px solid ${priorScanMsg.includes("Could not")||priorScanMsg.includes("API key")?"#e8c0c0":"#b0d8b0"}`,borderRadius:6,lineHeight:1.5}}>
                {priorScanMsg}
              </div>
            )}

            {/* Helper to render an editable totals table */}
            {[
              {label:"1-Year (Current Year)",color:"#1a6fa8",counts:year1Counts,setter:setYear1Counts},
              {label:"2-Year",color:"#8a6a10",counts:year2Counts,setter:setYear2Counts},
              {label:"Multi-Year (Used by Generator)",color:"#7030a8",counts:priorCounts,setter:setPriorCounts},
            ].map(tier=>(
              <div key={tier.label} style={{marginBottom:16}}>
                <div style={{fontSize:12,fontWeight:700,color:tier.color,marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>{tier.label}</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{borderBottom:"1px solid #d0d8e0"}}>
                        <th style={thS2}>Surgeon</th>
                        <th style={{...thS2,color:tier.color}}>Shifts</th>
                        <th style={thS2}>Day Call</th><th style={thS2}>Nights</th><th style={thS2}>Wknds</th>
                        <th style={{...thS2,borderLeft:"1px solid #d8c880"}}>B-Day</th><th style={thS2}>B-Ngt</th><th style={thS2}>B-Wknd</th>
                      </tr>
                    </thead>
                    <tbody>
                      {surgeons.map(s=>{
                        const p = tier.counts[s.id]||{};
                        const total = calcShifts(p);
                        const upd = (field, val) => {
                          const v = parseInt(val)||0;
                          tier.setter(prev=>({...prev,[s.id]:{...(prev[s.id]||{}), [field]:v}}));
                        };
                        const ci = (field) => (
                          <input type="number" min="0" value={p[field]||0}
                            onChange={e=>upd(field,e.target.value)}
                            style={{...css.inp,width:46,padding:"2px 4px",textAlign:"center",fontFamily:mono,fontSize:12}}/>
                        );
                        return (
                          <tr key={s.id} style={{borderBottom:"1px solid #e8ecf0"}}>
                            <td style={{padding:"5px 6px"}}><Badge id={s.id} small/></td>
                            <td style={{padding:"5px 6px",fontFamily:mono,fontSize:13,color:tier.color,fontWeight:700}}>{total}</td>
                            <td style={{padding:"3px 4px"}}>{ci("dc")}</td>
                            <td style={{padding:"3px 4px"}}>{ci("nights")}</td>
                            <td style={{padding:"3px 4px"}}>{ci("wknd")}</td>
                            <td style={{padding:"3px 4px",borderLeft:"1px solid #d8c880"}}>{ci("dcB")}</td>
                            <td style={{padding:"3px 4px"}}>{ci("nightsB")}</td>
                            <td style={{padding:"3px 4px"}}>{ci("wkndB")}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            ))}

            <div style={{fontSize:11,color:"#7a8a98",lineHeight:1.5}}>
              <strong style={{color:"#2c5a80"}}>Total Shifts</strong> = regular call only. Day Call wk = 7 · Weeknight = 1 · Weekend = 3
            </div>
          </div>
        </>}

        {/* ════════════════ SCHEDULE ════════════════ */}
        {view==="schedule"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <div style={{fontSize:14,fontWeight:600,color:"#2c5a80"}}>
              {MO[startMonth]} – {MO[endMoIdx]} {startYear}
              <span style={{fontSize:11,color:"#7a8a98",marginLeft:6}}>({mondays.length} weeks)</span>
            </div>
            <div style={{display:"flex",gap:5}}>
              <button onClick={()=>setView("setup")} style={css.btn(false)}>← Setup</button>
              <button onClick={doGenerate} style={css.btn(true)}>↻ Regenerate</button>
            </div>
          </div>

          {!Object.keys(schedule).length && (
            <div style={{...css.card,textAlign:"center",color:"#7a8a98",padding:36}}>No schedule yet. Go to Setup → Generate.</div>
          )}

          {/* Calendar Export */}
          {Object.keys(schedule).length > 0 && (
            <div style={{...css.card,background:"linear-gradient(135deg,#f8f9fb,#f0f2f5)",border:"1px solid #d0d8e4"}}>
              <div style={css.cardT}>📤 Export to Calendar <span style={{fontWeight:400,fontSize:11,color:"#7a8a98"}}>— Google / Outlook / Apple</span></div>
              <p style={{fontSize:12,color:"#7a8a98",margin:"0 0 12px",lineHeight:1.5}}>
                Download .ics files to import directly into any calendar app. Each surgeon gets their own file with just their shifts.
              </p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                {surgeons.map(s => (
                  <button key={s.id} onClick={() => {
                    const events = buildICSEvents(schedule, s.id, s.name, appShifts, aMap);
                    const ics = generateICS(events, `Call Schedule — ${s.name}`);
                    downloadICS(ics, `call-schedule-${s.name.toLowerCase()}.ics`);
                  }} style={{...css.badge(sMap[s.id]?.idx||0),cursor:"pointer",padding:"5px 12px",fontSize:12}}>
                    ⬇ {s.name}
                  </button>
                ))}
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <button onClick={() => {
                  const allEvents = [];
                  surgeons.forEach(s => {
                    allEvents.push(...buildICSEvents(schedule, s.id, s.name, appShifts, aMap));
                  });
                  // Also add APP shifts
                  Object.entries(appShifts).forEach(([ds, aid]) => {
                    const d = parse(ds);
                    const next = addD(d, 1);
                    const appName = aMap?.[aid]?.name || aid;
                    allEvents.push({
                      start: icsDate(d.getFullYear(),d.getMonth()+1,d.getDate(),17),
                      end: icsDate(next.getFullYear(),next.getMonth()+1,next.getDate(),7),
                      summary: `APP Call — ${appName}`,
                      desc: `APP Night Call 5:00 PM – 7:00 AM`
                    });
                  });
                  const ics = generateICS(allEvents, "Full Call Schedule");
                  downloadICS(ics, "call-schedule-full.ics");
                }} style={{...css.btn(true),padding:"6px 16px"}}>
                  ⬇ Full Schedule (All Surgeons + APPs)
                </button>
              </div>

              {/* Share read-only */}
              <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid #e0e4ea"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#1a6fa8",marginBottom:6}}>📋 Share Read-Only Calendar</div>
                <p style={{fontSize:11,color:"#7a8a98",margin:"0 0 8px",lineHeight:1.4}}>
                  Download a read-only calendar view of the finalized schedule. Email it, drop it in a shared drive, or text it to the group. No one can edit it — it's view-only and prints cleanly.
                </p>
                <button onClick={generateShareHTML} style={{...css.btn(true),padding:"8px 20px"}}>
                  ⬇ Download Shareable Calendar (HTML)
                </button>
              </div>
            </div>
          )}

          {mondays.map(monday=>{
            const mStr=fmt(monday);
            const wk=schedule[mStr]; if(!wk) return null;
            const endStr=fmt(addD(monday,6));
            const isEd=editingWeek===mStr;
            const weekAppShifts = appShiftsInWeek(mStr);

            return (
              <div key={mStr} style={{...css.card,padding:0,overflow:"hidden",border:wk.isBackup?"1px solid #e0c870":"1px solid #e0e4ea"}}>
                {/* Week header */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px",background:wk.isBackup?"linear-gradient(90deg,#fef8e8,#fdf4e0)":"#f4f5f8",borderBottom:"1px solid #e0e4ea",flexWrap:"wrap",gap:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontFamily:mono,fontSize:12,color:wk.isBackup?"#d0a830":"#50b0d8",fontWeight:600}}>{mStr}</span>
                    <span style={{fontSize:11,color:"#8a94a0"}}>→ {endStr}</span>
                    {wk.isBackup && <span style={css.backupBanner}>⚡ BACKUP WEEK — Fierce Primary</span>}
                    {wk.isFierceBackup && <span style={{fontSize:11,color:"#1a6fa8",background:"#e8f0fc",border:"1px solid #a8c8e0",borderRadius:6,padding:"3px 8px",fontWeight:600}}>🛡 Fierce Backup</span>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    {wk.off && <span style={{fontSize:11,color:"#2a7a40",background:"#e8f8e8",border:"1px solid #b0d8b0",borderRadius:5,padding:"2px 8px"}}>OFF: {sMap[wk.off]?.name}</span>}
                    <button onClick={()=>{setEditingWeek(isEd?null:mStr);setEditShift(null);}} style={{...css.btn(false),padding:"3px 9px",fontSize:11}}>{isEd?"Done":"Edit"}</button>
                  </div>
                </div>

                <div style={{padding:"10px 14px 12px"}}>
                  {/* Surgeon shifts */}
                  {ALL_SHIFT_KEYS.map(sk=>{
                    const sid = sk==="dayCall" ? wk.dayCall : wk.nights?.[sk];
                    const editing = isEd && editShift===sk+"-"+mStr;
                    const isDay = sk==="dayCall";
                    const isWknd = sk==="wknd";

                    return (
                      <div key={sk} style={{display:"flex",alignItems:"center",gap:8,marginBottom:sk==="dayCall"?8:4,padding:isDay?"8px 10px":"5px 10px",background:isDay?"#f4f5f8":"#f8f9fb",borderRadius:isDay?7:5,border:`1px solid ${!sid&&sk!=="dayCall"?"#e8c0c0":"#e0e4ea"}`,flexWrap:"wrap"}}>
                        <span style={{fontSize:isDay?11:10,color:isDay?"#1a6fa8":isWknd?"#7a6030":"#4a5868",width:isDay?85:80,flexShrink:0,fontWeight:isDay?700:600}}>
                          {SHIFT_ICONS[sk]} {SHIFT_LABELS[sk]}
                        </span>
                        <span style={{fontSize:10,color:"#8a94a0",width:isDay?175:135,flexShrink:0,fontFamily:mono}}>
                          {SHIFT_TIMES[sk]}
                        </span>
                        {editing ? (
                          <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                            {surgeons.filter(s=> isDay ? true : s.id!==wk.dayCall).map(s=>(
                              <button key={s.id} onClick={()=>swapShift(mStr,sk,s.id)}
                                style={{...css.badge(sMap[s.id]?.idx||0),cursor:"pointer",fontSize:11}}>{s.name}</button>
                            ))}
                          </div>
                        ) : (
                          <div onClick={()=>isEd&&setEditShift(sk+"-"+mStr)} style={{cursor:isEd?"pointer":"default"}}>
                            {sid ? <Badge id={sid} small={!isDay}/> : <span style={{color:"#c04040",fontSize:11,fontWeight:700}}>⚠ UNFILLED</span>}
                          </div>
                        )}
                      </div>
                    );
                  })}

                  {/* APP shifts this week */}
                  {weekAppShifts.length > 0 && (
                    <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #e0e4ea"}}>
                      <span style={{fontSize:11,fontWeight:700,color:"#7a6030",textTransform:"uppercase",letterSpacing:0.8}}>APP Coverage</span>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
                        {weekAppShifts.map(as=>(
                          <div key={as.date} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 8px",background:"#f8f5f4",borderRadius:5,border:"1px solid #e8d0d0"}}>
                            <span style={{fontSize:11,color:"#5a6a78",fontFamily:mono}}>{as.day}</span>
                            <AppBadge id={as.appId} small/>
                            <span style={{fontSize:10,color:"#7a8a98"}}>5p–7a</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </>}

        {/* ════════════════ CALENDAR ════════════════ */}
        {view==="calendar"&&<>
          <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:10,marginBottom:14}}>
            <button onClick={()=>{if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1);}} style={css.btn(false)}>◀</button>
            <span style={{fontSize:15,fontWeight:700,color:"#2c5a80",minWidth:170,textAlign:"center"}}>{MO[calMonth]} {calYear}</span>
            <button onClick={()=>{if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1);}} style={css.btn(false)}>▶</button>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,marginBottom:1}}>
            {DAY_HDR.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:"#8a94a0",padding:"5px 0",letterSpacing:1}}>{d}</div>)}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1}}>
            {calGrid.map((day,i)=>{
              if(!day) return <div key={`e${i}`} style={{background:"#f8f9fb",minHeight:82}}/>;
              const ds=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const entries=calData[ds]||[];
              const isWknd=[0,6].includes(new Date(calYear,calMonth,day).getDay());
              const hasFierce = entries.some(e=>e.type==="Fierce");
              const hasFierceBkp = entries.some(e=>e.type==="FierceBkp");
              const hasApp = entries.some(e=>e.type==="APP");
              const onVacList = surgeons.filter(s=>onVac(s.id,ds,vacations));

              return (
                <div key={ds} style={{
                  background: hasFierce?"#faf8f0":hasFierceBkp?"#f8f9fb":isWknd?"#edf0f4":"#f8f9fb",
                  border: hasFierce?"1px solid #2a2810":hasFierceBkp?"1px solid #d0d8e4":"1px solid #e8ecf0",
                  minHeight:82, padding:"3px 4px", borderRadius:2,
                }}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                    <span style={{fontSize:11,fontWeight:600,color:isWknd?"#5a7090":"#4a5868",fontFamily:mono}}>{day}</span>
                    {hasFierce && <span style={{fontSize:8,fontWeight:700,color:"#8a6a10",background:"#fef8e8",borderRadius:3,padding:"0 4px",letterSpacing:0.5}}>BKP</span>}
                    {hasFierceBkp && !hasFierce && <span style={{fontSize:8,fontWeight:700,color:"#1a6fa8",background:"#e8f0fc",borderRadius:3,padding:"0 4px",letterSpacing:0.5}}>F·BKP</span>}
                  </div>

                  {entries.filter(e=>e.type!=="Fierce"&&e.type!=="FierceBkp"&&e.type!=="APP").map((e,j)=>{
                    const isB = e.cls==="backup";
                    const isD = e.type.includes("Day");
                    const isW = e.type.includes("Wknd");
                    const label = isD?"D":isW?"W":"N";
                    const color = isD?"#3080a8":isW?"#908050":"#6850a0";
                    return (
                      <div key={j} style={{marginBottom:1,padding:"1px 3px",borderRadius:3,fontSize:10,
                        background:isB?"#fef8e8":isD?"#f8f9fb":isW?"#faf8f0":"#f4f0f8",
                        border:`1px solid ${isB?"#d8c880":isD?"#d0dce8":isW?"#faf0d8":"#141028"}`,
                        opacity:isB?0.85:1,
                      }}>
                        {isB&&<span style={{color:"#8a6a10",fontWeight:700,fontSize:8,marginRight:2}}>B</span>}
                        <span style={{color,fontWeight:700}}>{label}</span>
                        {" "}
                        <span style={{color:PAL[sMap[e.surgeon]?.idx%7]?.tx||"#4a5868"}}>{sMap[e.surgeon]?.name||"?"}</span>
                      </div>
                    );
                  })}

                  {/* APP entries */}
                  {entries.filter(e=>e.type==="APP").map((e,j)=>(
                    <div key={"app"+j} style={{marginBottom:1,padding:"1px 3px",borderRadius:3,fontSize:10,
                      background:"#fcf4f0",border:"1px solid #281818"}}>
                      <span style={{color:"#c08050",fontWeight:700}}>A</span>
                      {" "}
                      <span style={{color:APP_PAL[aMap[e.appId]?.idx%4]?.tx||"#5a6878"}}>{aMap[e.appId]?.name||"?"}</span>
                      <span style={{color:"#8a94a0",fontSize:8,marginLeft:2}}>5p–7a</span>
                    </div>
                  ))}

                  {hasFierce && <div style={{fontSize:8,color:"#8a6a10",marginTop:1,fontWeight:600}}>⚡ Fierce Primary</div>}
                  {hasFierceBkp && !hasFierce && <div style={{fontSize:8,color:"#1a6fa8",marginTop:1,fontWeight:600}}>🛡 Fierce Backup</div>}
                  {onVacList.map(s=>(
                    <div key={s.id} style={{fontSize:8,color:"#c04848",marginTop:1}}>🏖 {s.name}</div>
                  ))}
                </div>
              );
            })}
          </div>

          <div style={{marginTop:10,display:"flex",gap:12,fontSize:10,color:"#8a94a0",flexWrap:"wrap"}}>
            <span><span style={{color:"#3080a8",fontWeight:700}}>D</span> Day Call</span>
            <span><span style={{color:"#6030a0",fontWeight:700}}>N</span> Night</span>
            <span><span style={{color:"#908050",fontWeight:700}}>W</span> Weekend</span>
            <span><span style={{color:"#c08050",fontWeight:700}}>A</span> APP</span>
            <span><span style={{color:"#8a6a10",fontWeight:700}}>B</span> Backup</span>
            <span><span style={{color:"#8a6a10"}}>⚡</span> Fierce Primary</span>
            <span><span style={{color:"#1a6fa8"}}>🛡</span> Fierce Backup</span>
            <span>🏖 Vacation</span>
          </div>
        </>}

        {/* ════════════════ STATS ════════════════ */}
        {view==="stats"&&<>
          {/* Surgeon stats */}
          <div style={css.card}>
            <div style={css.cardT}>This Period — {MO[startMonth]} to {MO[endMoIdx]} {startYear}</div>
            {!Object.values(stats).some(s=>s.dc>0||s.nights>0) ? (
              <p style={{color:"#7a8a98",fontSize:13}}>Generate a schedule first.</p>
            ) : (
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{borderBottom:"2px solid #d0d8e0"}}>
                      <th style={thS}>Surgeon</th>
                      <th style={thS}><span style={{color:"#1a8040"}}>Total</span></th>
                      <th style={thS} colSpan={4}><span style={{color:"#1a6fa8"}}>Regular</span></th>
                      <th style={{...thS,borderLeft:"2px solid #d8c880"}} colSpan={4}><span style={{color:"#8a6a10"}}>Backup</span></th>
                    </tr>
                    <tr style={{borderBottom:"1px solid #e0e4ea"}}>
                      <th style={thS2}></th>
                      <th style={thS2}><span style={{color:"#1a8040"}}>Shifts</span></th>
                      <th style={thS2}>Day</th><th style={thS2}>Nights</th><th style={thS2}>Wknds</th><th style={thS2}>Off</th>
                      <th style={{...thS2,borderLeft:"2px solid #d8c880"}}>Day</th><th style={thS2}>Nights</th><th style={thS2}>Wknds</th><th style={thS2}>Off</th>
                    </tr>
                  </thead>
                  <tbody>
                    {surgeons.map(s=>{
                      const st=stats[s.id]||{};
                      const total = calcShifts(st);
                      return (
                        <tr key={s.id} style={{borderBottom:"1px solid #e8ecf0"}}>
                          <td style={{padding:"7px 8px"}}><Badge id={s.id}/></td>
                          <td style={{...tdS,color:"#1a8040",fontWeight:700,fontSize:15}}>{total}</td>
                          {[st.dc,st.nights,st.wknd,st.off].map((v,i)=>
                            <td key={i} style={tdS}>{v||0}</td>
                          )}
                          {[st.dcB,st.nightsB,st.wkndB,st.offB].map((v,i)=>
                            <td key={"b"+i} style={{...tdS,...(i===0?{borderLeft:"2px solid #d8c880"}:{})}}>{v||0}</td>
                          )}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                <div style={{marginTop:8,fontSize:11,color:"#7a8a98",lineHeight:1.5}}>
                  <strong style={{color:"#2c5a80"}}>Total Shifts</strong> = regular call only (not backup). Day Call wk = 7 shifts · Weeknight = 1 shift · Weekend = 3 shifts (Fri night 1 + Sun 24h = 2)
                </div>
              </div>
            )}
          </div>

          {/* APP stats */}
          <div style={css.card}>
            <div style={css.cardT}>APP Distribution</div>
            {!Object.values(appStats).some(v=>v>0) ? (
              <p style={{color:"#7a8a98",fontSize:13}}>No APP shifts assigned yet.</p>
            ) : (
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{borderBottom:"2px solid #d0d8e0"}}>
                      <th style={thS}>APP</th>
                      <th style={thS}>Night Shifts (5p–7a)</th>
                    </tr>
                  </thead>
                  <tbody>
                    {apps.map(a=>(
                      <tr key={a.id} style={{borderBottom:"1px solid #e8ecf0"}}>
                        <td style={{padding:"7px 8px"}}><AppBadge id={a.id}/></td>
                        <td style={tdS}>{appStats[a.id]||0}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* Vacation Days */}
          <div style={css.card}>
            <div style={css.cardT}>Vacation Days Used</div>
            {!Object.values(vacDays).some(v=>v>0) ? (
              <p style={{color:"#7a8a98",fontSize:13}}>No vacations entered yet.</p>
            ) : (
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{borderBottom:"2px solid #d0d8e0"}}>
                      <th style={thS}>Surgeon</th>
                      <th style={thS}>Days Used</th>
                      <th style={thS}>Vacation Periods</th>
                    </tr>
                  </thead>
                  <tbody>
                    {surgeons.map(s=>{
                      const days = vacDays[s.id] || 0;
                      const ranges = vacations[s.id] || [];
                      return (
                        <tr key={s.id} style={{borderBottom:"1px solid #e8ecf0"}}>
                          <td style={{padding:"7px 8px"}}><Badge id={s.id}/></td>
                          <td style={{...tdS,fontWeight:700,color:days>0?"#60c0a0":"#3e4e5e",fontSize:15}}>{days}</td>
                          <td style={{padding:"7px 8px",fontSize:11,color:"#5a6a78",fontFamily:mono}}>
                            {ranges.map(([vs,ve],i)=>(
                              <span key={i}>{i>0?" · ":""}{vs} → {ve}</span>
                            ))}
                            {ranges.length===0 && <span style={{color:"#8a94a0"}}>—</span>}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* Fairness — based on 1-YEAR totals */}
          {Object.values(stats).some(s=>s.dc>0) && (
            <div style={css.card}>
              <div style={css.cardT}>Fairness Check <span style={{fontWeight:400,fontSize:11,color:"#7a8a98"}}>— 1-Year (Prior + This Period)</span></div>
              <p style={{fontSize:12,color:"#7a8a98",margin:"0 0 10px",lineHeight:1.5}}>
                Evaluated against 1-year running totals. Enter current year prior counts in the Totals tab.
              </p>
              {(()=>{
                const v=fn=>surgeons.map(s=>fn(cum1yr[s.id]||{}));
                const sp=arr=>Math.max(...arr)-Math.min(...arr);
                const totalArr = surgeons.map(s=>calcShifts(cum1yr[s.id]||{}));
                const tSp = sp(totalArr);
                const tOk = tSp <= 5;
                return <>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:"8px 12px",background:tOk?"#e8f8e8":"#fef8e8",border:`1px solid ${tOk?"#b0d8b0":"#302810"}`,borderRadius:7}}>
                    <span style={{fontSize:16}}>{tOk?"✅":"⚠️"}</span>
                    <span style={{fontSize:13,fontWeight:700,color:tOk?"#60e0a0":"#e0a060"}}>
                      Total Call Shifts (1yr): spread {tSp} (min {Math.min(...totalArr)}, max {Math.max(...totalArr)}) — {tOk?"Fair":"Review recommended"}
                    </span>
                  </div>
                  {[
                    ["Day Call (reg)", v(s=>s.dc||0)],
                    ["Nights (reg)", v(s=>s.nights||0)],
                    ["Weekends (reg)", v(s=>s.wknd||0)],
                    ["Day Call (backup)", v(s=>s.dcB||0)],
                    ["Nights (backup)", v(s=>s.nightsB||0)],
                    ["Weekends (backup)", v(s=>s.wkndB||0)],
                  ].map(([label,arr])=>{
                    const s=sp(arr); const ok=s<=2;
                    return (
                      <div key={label} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                        <span style={{fontSize:15}}>{ok?"✅":"⚠️"}</span>
                        <span style={{fontSize:12,color:ok?"#50b070":"#b09040"}}>
                          {label}: spread {s} (min {Math.min(...arr)}, max {Math.max(...arr)}) — {ok?"Fair":"Review"}
                        </span>
                      </div>
                    );
                  })}
                </>;
              })()}
            </div>
          )}

          {/* Running Totals — 1yr, 2yr, multi-year */}
          {Object.values(stats).some(s=>s.dc>0) && (
            <div style={css.card}>
              <div style={css.cardT}>Running Totals <span style={{fontWeight:400,fontSize:11,color:"#7a8a98"}}>— Prior + This Period</span></div>

              {[
                {label:"1-Year", color:"#1a6fa8", data:cum1yr},
                {label:"2-Year", color:"#8a6a10", data:cum2yr},
                {label:"Multi-Year", color:"#7030a8", data:cumStats},
              ].map(tier=>(
                <div key={tier.label} style={{marginBottom:16}}>
                  <div style={{fontSize:12,fontWeight:700,color:tier.color,marginBottom:4,textTransform:"uppercase",letterSpacing:0.8}}>{tier.label}</div>
                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead>
                        <tr style={{borderBottom:"1px solid #d0d8e0"}}>
                          <th style={thS2}>Surgeon</th>
                          <th style={{...thS2,color:tier.color}}>Shifts</th>
                          <th style={thS2}>Day</th><th style={thS2}>Nights</th><th style={thS2}>Wknds</th><th style={thS2}>Off</th>
                          <th style={{...thS2,borderLeft:"1px solid #d8c880"}}>B-Day</th><th style={thS2}>B-Ngt</th><th style={thS2}>B-Wknd</th><th style={thS2}>B-Off</th>
                        </tr>
                      </thead>
                      <tbody>
                        {surgeons.map(s=>{
                          const c=tier.data[s.id]||{};
                          const total = calcShifts(c);
                          return (
                            <tr key={s.id} style={{borderBottom:"1px solid #e8ecf0"}}>
                              <td style={{padding:"5px 6px"}}><Badge id={s.id} small/></td>
                              <td style={{...tdS,color:tier.color,fontWeight:700,fontSize:14}}>{total}</td>
                              {[c.dc,c.nights,c.wknd,c.off].map((v,i)=>
                                <td key={i} style={{...tdS,fontWeight:600}}>{v||0}</td>
                              )}
                              {[c.dcB,c.nightsB,c.wkndB,c.offB].map((v,i)=>
                                <td key={"b"+i} style={{...tdS,fontWeight:600,...(i===0?{borderLeft:"1px solid #d8c880"}:{})}}>{v||0}</td>
                              )}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              ))}

              <div style={{fontSize:11,color:"#7a8a98",lineHeight:1.5}}>
                <strong style={{color:"#2c5a80"}}>Total Shifts</strong> = regular call only. Day Call wk = 7 · Weeknight = 1 · Weekend = 3
              </div>
            </div>
          )}
        </>}
      </div>
    </div>
  );
}

const thS = {textAlign:"left",padding:"7px 8px",color:"#5a6a78",fontWeight:600,fontSize:10,textTransform:"uppercase",letterSpacing:0.5};
const thS2 = {textAlign:"left",padding:"4px 8px",color:"#7a8a98",fontWeight:500,fontSize:10,textTransform:"uppercase",letterSpacing:0.3};
const tdS = {padding:"7px 8px",fontFamily:"'JetBrains Mono',monospace",color:"#4a5a68",fontSize:13};

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(CallSchedule));
  </script>
</body>
</html>
