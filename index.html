// Lightweight Supabase REST client (no SDK dependency needed)
const dbHeaders = { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`, "Content-Type": "application/json" };
const supabase = {
  from: (table) => ({
    select: (cols) => ({
      eq: (col, val) => ({
        single: async () => {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=${cols}&${col}=eq.${val}`, { headers: dbHeaders });
          const rows = await res.json();
          return { data: rows?.[0] || null, error: rows?.error || null };
        }
      })
    }),
    upsert: async (row) => {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method: "POST", headers: { ...dbHeaders, Prefer: "resolution=merge-duplicates" },
        body: JSON.stringify(row),
      });
      return { error: res.ok ? null : await res.text() };
    },
  }),
};

// Extended DB helpers for new tables
const db = {
  async query(table, { eq, order, limit, select } = {}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?select=${select || "*"}`;
    if (eq) Object.entries(eq).forEach(([k, v]) => { url += `&${k}=eq.${v}`; });
    if (order) url += `&order=${order}`;
    if (limit) url += `&limit=${limit}`;
    const res = await fetch(url, { headers: dbHeaders });
    return res.ok ? await res.json() : [];
  },
  async insert(table, row) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: "POST", headers: { ...dbHeaders, Prefer: "return=representation" },
      body: JSON.stringify(row),
    });
    const data = await res.json();
    return { data: Array.isArray(data) ? data[0] : data, error: res.ok ? null : data };
  },
  async update(table, id, data) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: "PATCH", headers: { ...dbHeaders, Prefer: "return=representation" },
      body: JSON.stringify(data),
    });
    return { error: res.ok ? null : await res.text() };
  },
  async upsert(table, row) {
    return supabase.from(table).upsert(row);
  },
};

/* ═══ Date helpers ═══ */
const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const parse = s => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const addD = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const monOf = d => { const r=new Date(d); r.setDate(r.getDate()-((r.getDay()+6)%7)); return r; };

function getMondays(yr,mo,numWeeks) {
  const ms=[], s=new Date(yr,mo,1);
  let d=monOf(s); if(d<s) d=addD(d,7);
  while(ms.length<numWeeks){ ms.push(new Date(d)); d=addD(d,7); }
  return ms;
}

function onVac(id,ds,v){ return (v[id]||[]).some(([a,b])=>ds>=a&&ds<=b); }

/* ═══ ICS Calendar Generation ═══ */
function icsDate(y,m,d,h,min) {
  return `${y}${String(m).padStart(2,"0")}${String(d).padStart(2,"0")}T${String(h).padStart(2,"0")}${String(min||0).padStart(2,"0")}00`;
}

function buildICSEvents(schedule, surgeonId, surgeonName, appShifts, aMap) {
  const events = [];
  const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2,9)}@callsched`;

  Object.entries(schedule).forEach(([mondayStr, wk]) => {
    const mon = parse(mondayStr);
    const bkLabel = wk.isBackup ? " [BACKUP]" : "";

    // Day Call
    if (wk.dayCall === surgeonId) {
      // Mon-Fri 7a-5p
      for (let i = 0; i < 5; i++) {
        const d = addD(mon, i);
        const y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate();
        events.push({
          start: icsDate(y,m,day,7), end: icsDate(y,m,day,17),
          summary: `Service Week${bkLabel} — ${surgeonName}`,
          desc: `Service Week 7:00 AM – 5:00 PM${bkLabel}`
        });
      }
      // Sat 7a - Sun 7a (24h)
      const sat = addD(mon, 5);
      const sunD = addD(mon, 6);
      events.push({
        start: icsDate(sat.getFullYear(),sat.getMonth()+1,sat.getDate(),7),
        end: icsDate(sunD.getFullYear(),sunD.getMonth()+1,sunD.getDate(),7),
        summary: `Weekend Saturday 24h${bkLabel} — ${surgeonName}`,
        desc: `Weekend Saturday 7:00 AM – Sunday 7:00 AM${bkLabel}`
      });
    }

    // Night shifts (Mon-Thu)
    const nightKeys = ["mon","tue","wed","thu"];
    nightKeys.forEach((sk, i) => {
      if (wk.nights?.[sk] === surgeonId) {
        const d = addD(mon, i);
        const next = addD(mon, i + 1);
        events.push({
          start: icsDate(d.getFullYear(),d.getMonth()+1,d.getDate(),17),
          end: icsDate(next.getFullYear(),next.getMonth()+1,next.getDate(),7),
          summary: `Night Call${bkLabel} — ${surgeonName}`,
          desc: `${SHIFT_LABELS[sk]} 5:00 PM – 7:00 AM${bkLabel}`
        });
      }
    });

    // Weekend (Fri night + Sunday)
    if (wk.nights?.wknd === surgeonId) {
      // Fri 5p - Sat 7a
      const fri = addD(mon, 4);
      const sat = addD(mon, 5);
      events.push({
        start: icsDate(fri.getFullYear(),fri.getMonth()+1,fri.getDate(),17),
        end: icsDate(sat.getFullYear(),sat.getMonth()+1,sat.getDate(),7),
        summary: `Weekend Call (Fri Night)${bkLabel} — ${surgeonName}`,
        desc: `Friday 5:00 PM – Saturday 7:00 AM${bkLabel}`
      });
      // Sun 7a - Mon 7a
      const sunD = addD(mon, 6);
      const nextMon = addD(mon, 7);
      events.push({
        start: icsDate(sunD.getFullYear(),sunD.getMonth()+1,sunD.getDate(),7),
        end: icsDate(nextMon.getFullYear(),nextMon.getMonth()+1,nextMon.getDate(),7),
        summary: `Weekend Call (Sunday 24h)${bkLabel} — ${surgeonName}`,
        desc: `Sunday 7:00 AM – Monday 7:00 AM${bkLabel}`
      });
    }
  });

  // APP shifts (only if surgeonId is null = export all, or for APP-specific export)
  if (!surgeonId) {
    Object.entries(appShifts).forEach(([ds, aid]) => {
      const d = parse(ds);
      const next = addD(d, 1);
      const appName = aMap?.[aid]?.name || aid;
      events.push({
        start: icsDate(d.getFullYear(),d.getMonth()+1,d.getDate(),17),
        end: icsDate(next.getFullYear(),next.getMonth()+1,next.getDate(),7),
        summary: `APP Call — ${appName}`,
        desc: `APP Night Call 5:00 PM – 7:00 AM`
      });
    });
  }

  return events;
}

function generateICS(events, calName) {
  const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2,9)}@callsched`;
  let ics = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//DSG Call Schedule//EN\r\nCALSCALE:GREGORIAN\r\nX-WR-CALNAME:${calName}\r\n`;
  events.forEach(e => {
    ics += `BEGIN:VEVENT\r\nUID:${uid()}\r\nDTSTART:${e.start}\r\nDTEND:${e.end}\r\nSUMMARY:${e.summary}\r\nDESCRIPTION:${e.desc}\r\nEND:VEVENT\r\n`;
  });
  ics += `END:VCALENDAR\r\n`;
  return ics;
}

function downloadICS(content, filename) {
  const blob = new Blob([content], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// Holiday definitions — returns holidays for a given year
function getHolidays(year) {
  // Thanksgiving = 4th Thursday of November
  const nov1 = new Date(year, 10, 1);
  let thxDay = 1 + ((4 - nov1.getDay() + 7) % 7); // first Thursday
  thxDay += 21; // 4th Thursday
  const thx = fmt(new Date(year, 10, thxDay));
  const thxEve = fmt(addD(new Date(year, 10, thxDay), -1));
  // Memorial Day = last Monday of May
  const may31 = new Date(year, 4, 31);
  let memDay = 31 - ((may31.getDay() - 1 + 7) % 7);
  const mem = fmt(new Date(year, 4, memDay));
  // Labor Day = first Monday of September
  const sep1 = new Date(year, 8, 1);
  let labDay = 1 + ((1 - sep1.getDay() + 7) % 7);
  const lab = fmt(new Date(year, 8, labDay));

  return {
    major: [
      { name: "New Year's Eve", date: fmt(new Date(year, 11, 31)), isEve: true },
      { name: "New Year's Day", date: fmt(new Date(year, 0, 1)) },
      { name: "Thanksgiving Eve", date: thxEve, isEve: true },
      { name: "Thanksgiving", date: thx },
      { name: "Christmas Eve", date: fmt(new Date(year, 11, 24)), isEve: true },
      { name: "Christmas Day", date: fmt(new Date(year, 11, 25)) },
    ],
    minor: [
      { name: "Memorial Day", date: mem },
      { name: "July 4th", date: fmt(new Date(year, 6, 4)) },
      { name: "Labor Day", date: lab },
    ]
  };
}

function generate(surgeons, mondays, vac, backupMondays, priorCounts, preferences, fierceBackupMondays) {
  const sched = {};
  const ids = surgeons.map(s=>s.id);
  const nameMap = {}; surgeons.forEach(s => nameMap[s.id] = s.name);

  // Running counters seeded from prior totals
  const dcCt={}; const nCt={}; const wkndCt={}; const offCt={}; const lastPos={};
  const burden = {};
  // Track last DC week index per surgeon for spacing
  const lastDcWeek = {};
  // Track consecutive night assignments
  const prevNightSurgeon = {}; // { surgeonId: lastNightDate }
  ids.forEach(id=>{
    const p = priorCounts[id] || {};
    dcCt[id] = (p.dc||0) + (p.dcB||0);
    nCt[id] = (p.nights||0) + (p.nightsB||0);
    wkndCt[id] = (p.wknd||0) + (p.wkndB||0);
    offCt[id] = (p.off||0) + (p.offB||0);
    burden[id] = dcCt[id]*7 + nCt[id] + wkndCt[id]*3;
    lastDcWeek[id] = -99;
  });
  let prevWkndSurgeon = null;

  const prefs = preferences || {};

  // Build holiday lookup for all years in the schedule
  const holidayMap = {}; // { "YYYY-MM-DD": { name, type:"major"|"minor" } }
  const years = new Set(mondays.map(m => m.getFullYear()));
  years.forEach(y => { years.add(y+1); }); // include next year for Dec→Jan
  years.forEach(y => {
    const h = getHolidays(y);
    h.major.forEach(hol => { holidayMap[hol.date] = { ...hol, type: "major" }; });
    h.minor.forEach(hol => { holidayMap[hol.date] = { ...hol, type: "minor" }; });
  });

  // Find FAK's ID for Christmas exception
  const fakId = ids.find(id => (nameMap[id]||"").toUpperCase() === "FAK") || null;

  // Track holiday assignments this period for fairness
  const holidayCt = {}; // { surgeonId: { major: count, minor: count } }
  ids.forEach(id => { holidayCt[id] = { major: 0, minor: 0 }; });

  for (let wkIdx = 0; wkIdx < mondays.length; wkIdx++) {
    const monday = mondays[wkIdx];
    const mStr = fmt(monday);
    const isBackup = backupMondays.has(mStr);
    const isFierceBackup = (fierceBackupMondays||new Set()).has(mStr);

    // Check for holidays this week
    const weekDates = [];
    for (let i = 0; i < 7; i++) weekDates.push(fmt(addD(monday, i)));
    const weekHolidays = weekDates.map(ds => holidayMap[ds] ? { ...holidayMap[ds], ds } : null).filter(Boolean);
    const hasHoliday = weekHolidays.length > 0;
    const hasMajorHoliday = weekHolidays.some(h => h.type === "major");
    const isChristmasWeek = weekHolidays.some(h => h.name === "Christmas Day");
    const christmasDate = weekHolidays.find(h => h.name === "Christmas Day")?.ds;

    // ═══ DAY CALL ═══
    const availDC = ids.filter(id => {
      for(let i=0;i<6;i++) if(onVac(id, fmt(addD(monday,i)), vac)) return false;
      return true;
    });

    let dc = null;
    if (availDC.length) {
      // Christmas exception: FAK takes Christmas, so prefer FAK for DC that week
      if (isChristmasWeek && fakId && availDC.includes(fakId)) {
        dc = fakId;
      } else {
        availDC.sort((a,b) => {
          const d = dcCt[a]-dcCt[b]; if(d) return d;
          const bd = burden[a]-burden[b]; if(bd) return bd;
          const od = offCt[b]-offCt[a]; if(od) return od;
          // Day Call spacing: prefer surgeons who haven't had DC recently
          const spacingA = wkIdx - lastDcWeek[a];
          const spacingB = wkIdx - lastDcWeek[b];
          if (spacingA !== spacingB) return spacingB - spacingA; // larger gap = better
          // Avoid weekend→DC
          if(a===prevWkndSurgeon) return 1;
          if(b===prevWkndSurgeon) return -1;
          return 0;
        });
        dc = availDC[0];
      }
      dcCt[dc]++; burden[dc]+=7; lastDcWeek[dc] = wkIdx;

      // Holiday tracking for DC surgeon
      weekHolidays.forEach(h => {
        holidayCt[dc][h.type]++;
      });
    }

    const rem = ids.filter(id=>id!==dc);
    const nights = {};
    const used = new Set();

    // ═══ WEEKEND SHIFT ═══
    const friDate = fmt(addD(monday,4));
    const sunDate = fmt(addD(monday,6));
    const nextMonDate = fmt(addD(monday,7));

    let availWknd = rem.filter(id => !onVac(id,friDate,vac) && !onVac(id,sunDate,vac));
    availWknd = availWknd.filter(id => !onVac(id, nextMonDate, vac));

    // Check if Friday or Sunday is a holiday — special handling
    const friHoliday = holidayMap[friDate];
    const sunHoliday = holidayMap[sunDate];

    const prefWknd = availWknd.filter(id => id !== prevWkndSurgeon);
    const wkndPool = prefWknd.length > 0 ? prefWknd : availWknd;

    if (wkndPool.length) {
      wkndPool.sort((a,b) => {
        const d = wkndCt[a]-wkndCt[b]; if(d) return d;
        // Holiday fairness: if weekend includes a holiday, prefer surgeon with fewer holiday shifts
        if (friHoliday || sunHoliday) {
          const hType = (friHoliday || sunHoliday).type;
          const ha = holidayCt[a][hType] || 0;
          const hb = holidayCt[b][hType] || 0;
          if (ha !== hb) return ha - hb;
        }
        const bd = burden[a]-burden[b]; if(bd) return bd;
        if(lastPos[a]==="wknd"&&lastPos[b]!=="wknd") return 1;
        if(lastPos[b]==="wknd"&&lastPos[a]!=="wknd") return -1;
        return 0;
      });
      nights.wknd = wkndPool[0]; used.add(wkndPool[0]); wkndCt[wkndPool[0]]++; burden[wkndPool[0]]+=3;
      if (friHoliday) holidayCt[wkndPool[0]][friHoliday.type]++;
      if (sunHoliday) holidayCt[wkndPool[0]][sunHoliday.type]++;
    } else {
      const fb=rem.filter(id=>!used.has(id));
      if(fb.length){nights.wknd=fb[0];used.add(fb[0]);} else nights.wknd=null;
    }

    // ═══ WEEKNIGHT SHIFTS ═══
    const nightCandidates = rem.filter(id => !used.has(id));
    let idealOff = null;
    if (nightCandidates.length > 0) {
      const sorted = [...nightCandidates].sort((a,b) => {
        const od = offCt[a]-offCt[b]; if(od) return od;
        const bd = burden[b]-burden[a]; if(bd) return bd;
        return 0;
      });
      idealOff = sorted[0];
    }

    // Shuffle night keys to prevent positional bias
    const shuffledNightKeys = [...NIGHT_KEYS];
    for(let i=shuffledNightKeys.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [shuffledNightKeys[i],shuffledNightKeys[j]]=[shuffledNightKeys[j],shuffledNightKeys[i]];
    }

    const nightAssignments = {};
    const nightUsed = new Set();

    // Holiday-into-weekend pattern: if a holiday night leads into a weekend,
    // the night-before-holiday surgeon should get the weekend after
    // This is handled by the weekend sort above, but we also check for
    // mid-week holidays where the night before should be tracked

    for (const sk of shuffledNightKeys) {
      const dayOffset = {mon:0,tue:1,wed:2,thu:3}[sk];
      const sd = fmt(addD(monday, dayOffset));
      const nextDayStr = fmt(addD(monday, dayOffset + 1));
      const nightHoliday = holidayMap[sd]; // is this night a holiday eve?
      const nextDayHoliday = holidayMap[nextDayStr]; // is tomorrow a holiday?

      let avail = rem.filter(id => !used.has(id) && !nightUsed.has(id) && !onVac(id,sd,vac));
      avail = avail.filter(id => !onVac(id, nextDayStr, vac));

      // CONSECUTIVE NIGHT AVOIDANCE: penalize surgeons who had a night shift yesterday
      // (previous night in this same week)
      const yesterdayStr = fmt(addD(monday, dayOffset - 1));

      // Fallback layers
      if(!avail.length) avail = rem.filter(id => !used.has(id) && !nightUsed.has(id) && !onVac(id,sd,vac));
      if(!avail.length) avail = rem.filter(id => !used.has(id) && !nightUsed.has(id));
      if(!avail.length){ nightAssignments[sk]=null; continue; }

      avail.sort((a,b) => {
        // Push idealOff to back
        if(a===idealOff && b!==idealOff) return 1;
        if(b===idealOff && a!==idealOff) return -1;

        // CONSECUTIVE NIGHT AVOIDANCE: if a surgeon had a night yesterday, push them back
        const aConsec = prevNightSurgeon[a] === yesterdayStr ? 1 : 0;
        const bConsec = prevNightSurgeon[b] === yesterdayStr ? 1 : 0;
        if (aConsec !== bConsec) return aConsec - bConsec;

        // Holiday fairness: if this night is a holiday or eve of holiday
        if (nextDayHoliday) {
          const hType = nextDayHoliday.type;
          const ha = holidayCt[a]?.[hType] || 0;
          const hb = holidayCt[b]?.[hType] || 0;
          if (ha !== hb) return ha - hb; // fewer holiday shifts → gets this one
        }

        const d=nCt[a]-nCt[b]; if(d) return d;
        const bd = burden[a]-burden[b]; if(bd) return bd;

        // Preferences
        const aPref = prefs[a]; const bPref = prefs[b];
        const aBonus = (aPref?.preferShift===sk ? -10 : 0) + (aPref?.avoidShift===sk ? 10 : 0);
        const bBonus = (bPref?.preferShift===sk ? -10 : 0) + (bPref?.avoidShift===sk ? 10 : 0);
        if(aBonus !== bBonus) return aBonus - bBonus;

        if(lastPos[a]===sk&&lastPos[b]!==sk) return 1;
        if(lastPos[b]===sk&&lastPos[a]!==sk) return -1;
        if(sk==="mon"&&a===prevWkndSurgeon) return 1;
        if(sk==="mon"&&b===prevWkndSurgeon) return -1;
        return 0;
      });

      const chosen = avail[0];
      nightAssignments[sk] = chosen;
      nightUsed.add(chosen);
      nCt[chosen]++; burden[chosen]++; lastPos[chosen] = sk;
      prevNightSurgeon[chosen] = sd; // track for consecutive night detection

      // Track holiday assignments
      if (nextDayHoliday) holidayCt[chosen][nextDayHoliday.type]++;
    }

    for (const sk of NIGHT_KEYS) nights[sk] = nightAssignments[sk] || null;

    if(nights.wknd) lastPos[nights.wknd] = "wknd";
    prevWkndSurgeon = nights.wknd || null;

    const assigned = new Set([dc, ...Object.values(nights)].filter(Boolean));
    const off = ids.find(id => !assigned.has(id)) || null;
    if(off) offCt[off]++;

    sched[mStr] = { dayCall:dc, nights, off, isBackup, isFierceBackup };
  }

  // ═══ POST-OPTIMIZATION PASS ═══
  const mondayStrs = mondays.map(m => fmt(m));
  const calcSpread = (ct) => { const vals = Object.values(ct); return Math.max(...vals)-Math.min(...vals); };

  for (let pass = 0; pass < 50; pass++) {
    let improved = false;

    // Try swapping weekend assignments to reduce spread
    for (let i = 0; i < mondayStrs.length && !improved; i++) {
      for (let j = i+1; j < mondayStrs.length && !improved; j++) {
        const wkA = sched[mondayStrs[i]];
        const wkB = sched[mondayStrs[j]];
        const a = wkA.nights?.wknd, b = wkB.nights?.wknd;
        if (!a || !b || a === b) continue;

        const monA = parse(mondayStrs[i]), monB = parse(mondayStrs[j]);
        const friA = fmt(addD(monA,4)), sunA = fmt(addD(monA,6)), nMonA = fmt(addD(monA,7));
        const friB = fmt(addD(monB,4)), sunB = fmt(addD(monB,6)), nMonB = fmt(addD(monB,7));

        const bCanDoA = !onVac(b,friA,vac) && !onVac(b,sunA,vac) && !onVac(b,nMonA,vac) && b !== wkA.dayCall;
        const aCanDoB = !onVac(a,friB,vac) && !onVac(a,sunB,vac) && !onVac(a,nMonB,vac) && a !== wkB.dayCall;
        if (!bCanDoA || !aCanDoB) continue;

        if (wkndCt[a] > wkndCt[b] + 1) {
          wkndCt[a]--; wkndCt[b]++;
          burden[a]-=3; burden[b]+=3;
          wkA.nights.wknd = b; wkB.nights.wknd = a;
          const fixOff = (wk) => {
            const assigned = new Set([wk.dayCall, ...Object.values(wk.nights)].filter(Boolean));
            wk.off = ids.find(id => !assigned.has(id)) || null;
          };
          fixOff(wkA); fixOff(wkB);
          improved = true;
        } else if (wkndCt[b] > wkndCt[a] + 1) {
          wkndCt[b]--; wkndCt[a]++;
          burden[b]-=3; burden[a]+=3;
          wkA.nights.wknd = b; wkB.nights.wknd = a;
          const fixOff = (wk) => {
            const assigned = new Set([wk.dayCall, ...Object.values(wk.nights)].filter(Boolean));
            wk.off = ids.find(id => !assigned.has(id)) || null;
          };
          fixOff(wkA); fixOff(wkB);
          improved = true;
        }
      }
    }

    if (!improved) break;
  }

  return sched;
}

/* ═══════════════════════════════════════════════════

   ═══════════════════════════════════════════════════ */
function CallSchedule() {
  const [view, setView] = useState("setup");

  const [surgeons, setSurgeons] = useState(INIT_SURGEONS);
  const [apps, setApps] = useState(INIT_APPS);
  const [vacations, setVacations] = useState({});
  const [backupMondaySet, setBackupMondaySet] = useState(new Set());
  const [fierceBackupSet, setFierceBackupSet] = useState(new Set()); // Fierce backs up our group, regular schedule unchanged
  const [schedule, setSchedule] = useState({});
  const [appShifts, setAppShifts] = useState({}); // { "2026-05-06": "a1", ... }
  const [priorCounts, setPriorCounts] = useState(COUNTS_2YR); // Multi-year totals (used by generator)
  const [year1Counts, setYear1Counts] = useState(COUNTS_1YR); // Current year totals
  const [year2Counts, setYear2Counts] = useState(COUNTS_2YR); // 2-year totals
  const [startMonth, setStartMonth] = useState(4);
  const [startYear, setStartYear] = useState(2026);
  const [calMonth, setCalMonth] = useState(4);
  const [calYear, setCalYear] = useState(2026);
  const [editingWeek, setEditingWeek] = useState(null);
  const [editShift, setEditShift] = useState(null);

  // Form states
  const [vacSurgeon, setVacSurgeon] = useState("");
  const [vacStart, setVacStart] = useState("");
  const [vacEnd, setVacEnd] = useState("");
  const [bkMonday, setBkMonday] = useState("");
  const [appDate, setAppDate] = useState("");
  const [appPerson, setAppPerson] = useState("");
  const [scanning, setScanning] = useState(false);
  const [scanMsg, setScanMsg] = useState("");
  const [loaded, setLoaded] = useState(false);
  const [saveStatus, setSaveStatus] = useState("");
  const fileRef = useRef(null);
  const lastSyncRef = useRef(null);

  const [apiKey, setApiKey] = useState("");
  const [showApiKey, setShowApiKey] = useState(false);

  // ─── Vacation Requests ───
  const [vacRequests, setVacRequests] = useState([]);
  const [vacReqSurgeon, setVacReqSurgeon] = useState("");
  const [vacReqStart, setVacReqStart] = useState("");
  const [vacReqEnd, setVacReqEnd] = useState("");
  const [vacReqReason, setVacReqReason] = useState("");

  // ─── Scheduler Mode (PIN protected) ───
  const [isScheduler, setIsScheduler] = useState(false);
  const [schedulerPin, setSchedulerPin] = useState("");
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState("");

  // ─── Notifications ───
  const [notifications, setNotifications] = useState([]);
  const [showNotifs, setShowNotifs] = useState(false);
  const [notifLastSeen, setNotifLastSeen] = useState(() => {
    try { return localStorage.getItem("dsg-notif-seen") || "2000-01-01T00:00:00Z"; } catch(e) { return "2000-01-01T00:00:00Z"; }
  });
  const unreadCount = useMemo(() => notifications.filter(n => n.created_at > notifLastSeen).length, [notifications, notifLastSeen]);

  // ─── Browser Push & Email Notification Preferences ───
  const [pushPermission, setPushPermission] = useState(() => {
    try { return Notification?.permission || "default"; } catch(e) { return "unsupported"; }
  });
  const [notifPrefs, setNotifPrefs] = useState({}); // { surgeonId: { email, browser_push, email_notifs, schedule_changes, vacation_updates, shift_reminders } }
  const [notifPrefsLoaded, setNotifPrefsLoaded] = useState(false);
  const [notifPrefsSaving, setNotifPrefsSaving] = useState(false);
  const [notifTestSent, setNotifTestSent] = useState("");
  const lastNotifCountRef = useRef(null); // track notification count for browser push on new ones
  const [edgeFunctionUrl, setEdgeFunctionUrl] = useState(""); // Supabase Edge Function URL for email

  // ─── My Schedule ───
  const [mySurgeon, setMySurgeon] = useState(() => {
    try { return localStorage.getItem("dsg-my-surgeon") || ""; } catch(e) { return ""; }
  });

  // Save My Surgeon choice to localStorage
  useEffect(() => {
    try { if(mySurgeon) localStorage.setItem("dsg-my-surgeon", mySurgeon); } catch(e) {}
  }, [mySurgeon]);

  // ─── Supabase: Load on mount + real-time sync ───
  useEffect(() => {
    (async () => {
      try {
        const { data: row } = await supabase
          .from("call_schedule_data")
          .select("data")
          .eq("id", "main")
          .single();
        if (row?.data) {
          const d = typeof row.data === "string" ? JSON.parse(row.data) : row.data;
          if (d.surgeons) setSurgeons(d.surgeons);
          if (d.apps) setApps(d.apps);
          if (d.vacations) setVacations(d.vacations);
          if (d.backupMondays) setBackupMondaySet(new Set(d.backupMondays));
          if (d.fierceBackup) setFierceBackupSet(new Set(d.fierceBackup));
          if (d.schedule) setSchedule(d.schedule);
          if (d.appShifts) setAppShifts(d.appShifts);
          if (d.priorCounts && Object.values(d.priorCounts).some(c => Object.values(c).some(v => v > 0))) setPriorCounts(d.priorCounts);
          if (d.year1Counts && Object.values(d.year1Counts).some(c => Object.values(c).some(v => v > 0))) setYear1Counts(d.year1Counts);
          if (d.year2Counts && Object.values(d.year2Counts).some(c => Object.values(c).some(v => v > 0))) setYear2Counts(d.year2Counts);
          if (d.startMonth !== undefined) setStartMonth(d.startMonth);
          if (d.startYear !== undefined) setStartYear(d.startYear);
        }
        const { data: cfgRow } = await supabase
          .from("call_schedule_config")
          .select("api_key,scheduler_pin,edge_function_url")
          .eq("id", "config")
          .single();
        if (cfgRow?.api_key) setApiKey(cfgRow.api_key);
        if (cfgRow?.scheduler_pin) setSchedulerPin(cfgRow.scheduler_pin);
        if (cfgRow?.edge_function_url) setEdgeFunctionUrl(cfgRow.edge_function_url);

        // Load vacation requests
        try {
          const reqs = await db.query("vacation_requests", { order: "submitted_at.desc", limit: 100 });
          if (Array.isArray(reqs)) setVacRequests(reqs);
        } catch(e) {}

        // Load recent notifications
        try {
          const notifs = await db.query("notifications", { order: "created_at.desc", limit: 50 });
          if (Array.isArray(notifs)) setNotifications(notifs);
        } catch(e) {}
      } catch (e) {
        console.error("Supabase load error:", e);
      }
      setLoaded(true);
    })();

    // Poll for changes from other users every 15 seconds
    const pollInterval = setInterval(async () => {
      try {
        const { data: row } = await supabase.from("call_schedule_data").select("data,updated_at").eq("id", "main").single();
        if (row?.data) {
          const d = typeof row.data === "string" ? JSON.parse(row.data) : row.data;
          // Only update if data actually changed (compare updated_at)
          if (row.updated_at !== lastSyncRef.current) {
            lastSyncRef.current = row.updated_at;
            if (d.surgeons) setSurgeons(d.surgeons);
            if (d.apps) setApps(d.apps);
            if (d.vacations) setVacations(d.vacations);
            if (d.backupMondays) setBackupMondaySet(new Set(d.backupMondays));
            if (d.fierceBackup) setFierceBackupSet(new Set(d.fierceBackup));
            if (d.schedule) setSchedule(d.schedule);
            if (d.appShifts) setAppShifts(d.appShifts);
            if (d.priorCounts && Object.values(d.priorCounts).some(c => Object.values(c).some(v => v > 0))) setPriorCounts(d.priorCounts);
            if (d.year1Counts && Object.values(d.year1Counts).some(c => Object.values(c).some(v => v > 0))) setYear1Counts(d.year1Counts);
            if (d.year2Counts && Object.values(d.year2Counts).some(c => Object.values(c).some(v => v > 0))) setYear2Counts(d.year2Counts);
            if (d.startMonth !== undefined) setStartMonth(d.startMonth);
            if (d.startYear !== undefined) setStartYear(d.startYear);
          }
        }
        const { data: cfgRow2 } = await supabase.from("call_schedule_config").select("api_key,scheduler_pin,edge_function_url").eq("id", "config").single();
        if (cfgRow2?.api_key !== undefined) setApiKey(prev => cfgRow2.api_key !== prev ? cfgRow2.api_key : prev);
        if (cfgRow2?.scheduler_pin !== undefined) setSchedulerPin(prev => cfgRow2.scheduler_pin !== prev ? cfgRow2.scheduler_pin : prev);
        if (cfgRow2?.edge_function_url !== undefined) setEdgeFunctionUrl(prev => cfgRow2.edge_function_url !== prev ? cfgRow2.edge_function_url : prev);

        // Refresh vacation requests and notifications
        try {
          const reqs = await db.query("vacation_requests", { order: "submitted_at.desc", limit: 100 });
          if (Array.isArray(reqs)) setVacRequests(reqs);
        } catch(e) {}
        try {
          const notifs = await db.query("notifications", { order: "created_at.desc", limit: 50 });
          if (Array.isArray(notifs)) setNotifications(notifs);
        } catch(e) {}
      } catch(e) {}
    }, 15000);

    return () => clearInterval(pollInterval);
  }, []);

  // ─── Supabase: Auto-save on changes ───
  useEffect(() => {
    if (!loaded) return;
    const timer = setTimeout(async () => {
      try {
        const payload = {
          surgeons, apps, vacations,
          backupMondays: [...backupMondaySet],
          fierceBackup: [...fierceBackupSet],
          schedule, appShifts, priorCounts, year1Counts, year2Counts,
          startMonth, startYear,
        };
        const ts = new Date().toISOString();
        await supabase
          .from("call_schedule_data")
          .upsert({ id: "main", data: payload, updated_at: ts });
        lastSyncRef.current = ts;
        setSaveStatus("Saved");
        setTimeout(() => setSaveStatus(""), 2000);
      } catch (e) {
        console.error("Save failed:", e);
      }
    }, 800);
    return () => clearTimeout(timer);
  }, [loaded, surgeons, apps, vacations, backupMondaySet, fierceBackupSet, schedule, appShifts, priorCounts, year1Counts, year2Counts, startMonth, startYear]);

  // ─── Supabase: Save API key + scheduler PIN ───
  useEffect(() => {
    if (!loaded) return;
    const timer = setTimeout(async () => {
      try {
        await supabase
          .from("call_schedule_config")
          .upsert({ id: "config", api_key: apiKey || "", scheduler_pin: schedulerPin || "", updated_at: new Date().toISOString() });
      } catch(e) {}
    }, 500);
    return () => clearTimeout(timer);
  }, [loaded, apiKey, schedulerPin]);

  // ─── Reset all data ───
  const resetAllData = async () => {
    if (!confirm("Clear all saved data and reset to defaults? This cannot be undone.")) return;
    try {
      await supabase.from("call_schedule_data").upsert({ id: "main", data: {}, updated_at: new Date().toISOString() });
    } catch(e) {}
    setSurgeons(INIT_SURGEONS);
    setApps(INIT_APPS);
    setVacations({});
    setBackupMondaySet(new Set());
    setFierceBackupSet(new Set());
    setSchedule({});
    setAppShifts({});
    setPriorCounts({});
    setYear1Counts({});
    setYear2Counts({});
    setStartMonth(4);
    setStartYear(2026);
    setSaveStatus("Reset complete");
    setTimeout(() => setSaveStatus(""), 2000);
  };

  // ─── Add Notification ───
  const addNotification = useCallback(async (type, title, message, data = {}) => {
    try {
      const notif = { type, title, message, data, created_at: new Date().toISOString() };
      const { data: inserted } = await db.insert("notifications", notif);
      if (inserted) setNotifications(prev => [inserted, ...prev].slice(0, 50));
    } catch(e) { console.error("Notification error:", e); }
  }, []);

  // ─── Vacation Request: Submit ───
  const submitVacRequest = useCallback(async () => {
    if (!vacReqSurgeon || !vacReqStart || !vacReqEnd) return;
    const surgeonName = surgeons.find(s => s.id === vacReqSurgeon)?.name || vacReqSurgeon;
    try {
      const req = {
        surgeon_id: vacReqSurgeon, surgeon_name: surgeonName,
        start_date: vacReqStart, end_date: vacReqEnd,
        reason: vacReqReason, status: "pending",
        submitted_at: new Date().toISOString(),
      };
      const { data: inserted } = await db.insert("vacation_requests", req);
      if (inserted) {
        setVacRequests(prev => [inserted, ...prev]);
        await addNotification("vacation_submitted", "Vacation Request",
          `${surgeonName} requested ${vacReqStart} to ${vacReqEnd}`, { surgeon_id: vacReqSurgeon });
        sendEmailNotif("vacation_submitted", { surgeon_name: surgeonName, surgeon_id: vacReqSurgeon, start_date: vacReqStart, end_date: vacReqEnd, reason: vacReqReason });
      }
      setVacReqStart(""); setVacReqEnd(""); setVacReqReason("");
    } catch(e) { console.error("Submit vacation error:", e); }
  }, [vacReqSurgeon, vacReqStart, vacReqEnd, vacReqReason, surgeons, addNotification]);

  // ─── Vacation Request: Approve ───
  const approveVacRequest = useCallback(async (req) => {
    try {
      await db.update("vacation_requests", req.id, {
        status: "approved", reviewed_at: new Date().toISOString(), reviewed_by: "Scheduler"
      });
      setVacRequests(prev => prev.map(r => r.id === req.id ? { ...r, status: "approved" } : r));
      // Auto-add to vacations
      setVacations(prev => ({
        ...prev,
        [req.surgeon_id]: [...(prev[req.surgeon_id] || []), [req.start_date, req.end_date]]
      }));
      await addNotification("vacation_approved", "Vacation Approved",
        `${req.surgeon_name}'s vacation ${req.start_date} to ${req.end_date} was approved`,
        { surgeon_id: req.surgeon_id });
      sendEmailNotif("vacation_approved", { surgeon_name: req.surgeon_name, surgeon_id: req.surgeon_id, start_date: req.start_date, end_date: req.end_date });
    } catch(e) { console.error("Approve error:", e); }
  }, [addNotification]);

  // ─── Vacation Request: Deny ───
  const denyVacRequest = useCallback(async (req, note = "") => {
    try {
      await db.update("vacation_requests", req.id, {
        status: "denied", reviewed_at: new Date().toISOString(), reviewed_by: "Scheduler", review_note: note
      });
      setVacRequests(prev => prev.map(r => r.id === req.id ? { ...r, status: "denied", review_note: note } : r));
      await addNotification("vacation_denied", "Vacation Denied",

        }
      }
    });
    // APP shifts
    Object.entries(appShifts).forEach(([ds,aid])=>{
      d[ds]=[...(d[ds]||[]),{type:"APP",appId:aid,cls:"app"}];
    });
    return d;
  }, [schedule, appShifts]);

  // Calendar grid
  const calGrid = useMemo(() => {
    const days=new Date(calYear,calMonth+1,0).getDate();
    const first=new Date(calYear,calMonth,1).getDay();
    const c=[]; for(let i=0;i<first;i++) c.push(null);
    for(let d=1;d<=days;d++) c.push(d);
    while(c.length%7) c.push(null);
    return c;
  }, [calYear,calMonth]);

  // ─── On Call Today ───
  const todayStr = fmt(new Date());
  const todayDow = new Date().getDay(); // 0=Sun
  const todayEntries = calData[todayStr] || [];
  const todayCall = useMemo(() => {
    const info = { dayCall: null, night: null, weekend: null, app: null, fierce: false, fierceBkp: false };
    todayEntries.forEach(e => {
      if (e.type === "Svc" || e.type === "B-Svc") info.dayCall = sMap[e.surgeon]?.name || null;
      if (e.type === "Ngt" || e.type === "B-Ngt") info.night = sMap[e.surgeon]?.name || null;
      if (e.type === "Wknd" || e.type === "B-Wknd") info.weekend = sMap[e.surgeon]?.name || null;
      if (e.type === "APP") info.app = aMap[e.appId]?.name || null;
      if (e.type === "Fierce") info.fierce = true;
      if (e.type === "FierceBkp") info.fierceBkp = true;
    });
    return info;
  }, [todayEntries, sMap, aMap]);

  const hasCallToday = todayCall.dayCall || todayCall.night || todayCall.weekend;

  // Build notification message for tonight
  const buildTonightMsg = () => {
    const today = new Date();
    const dayName = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][today.getDay()];
    const mo = today.getMonth()+1;
    const dy = today.getDate();
    let msg = `🏥 DSG Call — ${dayName} ${mo}/${dy}\n\n`;
    if (todayCall.dayCall) msg += `🏥 Service Week: ${todayCall.dayCall}\n`;
    if (todayCall.night) msg += `🌙 Night (5p–7a): ${todayCall.night}\n`;
    if (todayCall.weekend) msg += `🌗 Weekend: ${todayCall.weekend}\n`;
    if (todayCall.app) msg += `👩‍⚕️ APP (5p–7a): ${todayCall.app}\n`;
    if (todayCall.fierce) msg += `⚡ Fierce Primary Week\n`;
    if (todayCall.fierceBkp) msg += `🛡 Fierce Backup Week\n`;
    if (!hasCallToday) msg += `No call assignments found for today.\n`;
    msg += `\n📋 Full schedule: https://fkhan628.github.io/Call-Schedule-App/`;
    return msg;
  };

  const [copied, setCopied] = useState(false);
  const shareTonightMsg = async () => {
    const msg = buildTonightMsg();
    if (navigator.share) {
      try { await navigator.share({ text: msg }); return; } catch(e) {}
    }
    try { await navigator.clipboard.writeText(msg); setCopied(true); setTimeout(()=>setCopied(false), 2000); } catch(e) {}
  };

  // Which APP shifts fall in a given week (for schedule view)
  const appShiftsInWeek = (mondayStr) => {
    const mon = parse(mondayStr);
    const result = [];
    for(let i=0;i<7;i++){
      const ds = fmt(addD(mon,i));
      if(appShifts[ds]) result.push({date:ds, day:DAY_HDR[addD(mon,i).getDay()], appId:appShifts[ds]});
    }
    return result;
  };

  return (
    <div style={css.root}>

            <span style={{color:"#fff",fontSize:15,fontWeight:800,letterSpacing:-0.5,fontFamily:font}}>DSG</span>

        </div>
        <div style={css.nav}>

                  </div>
                ))}

                {myShifts.length === 0 && (
                  <div style={{...css.card,textAlign:"center",color:"#8a94a0",padding:30}}>No shifts assigned yet. Generate a schedule first.</div>
                )}
              </>
            );
          })()}

          {!mySurgeon && (
            <div style={{...css.card,textAlign:"center",color:"#8a94a0",padding:30}}>Select your name above to view your schedule.</div>
          )}
        </>}

        {/* ════════════════ REQUESTS ════════════════ */}
        {view==="requests"&&<>
          {/* Submit Vacation Request */}
          <div style={css.card}>
            <div style={css.cardT}>🏖 Request Vacation</div>
            <p style={{fontSize:13,color:"#5a6a78",margin:"0 0 12px",lineHeight:1.5}}>
              Submit a vacation request. It will be reviewed at the regular Friday meeting.
            </p>
            <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap",marginBottom:8}}>
              <div>
                <label style={{fontSize:11,color:"#7a8a98",display:"block",marginBottom:2}}>Surgeon</label>
                <select value={vacReqSurgeon} onChange={e=>setVacReqSurgeon(e.target.value)} style={{...css.inp,width:140}}>
                  <option value="">Select…</option>
                  {surgeons.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>
              <div>
                <label style={{fontSize:11,color:"#7a8a98",display:"block",marginBottom:2}}>Start Date</label>
                <input type="date" value={vacReqStart} onChange={e=>setVacReqStart(e.target.value)} style={{...css.inp,width:150}}/>
              </div>
              <div>
                <label style={{fontSize:11,color:"#7a8a98",display:"block",marginBottom:2}}>End Date</label>
                <input type="date" value={vacReqEnd} onChange={e=>setVacReqEnd(e.target.value)} style={{...css.inp,width:150}}/>
              </div>
              <button onClick={submitVacRequest} style={{...css.btn(true),padding:"7px 18px"}}>Submit Request</button>
            </div>
            <div>
              <label style={{fontSize:11,color:"#7a8a98",display:"block",marginBottom:2}}>Reason (optional)</label>
              <input value={vacReqReason} onChange={e=>setVacReqReason(e.target.value)} placeholder="Conference, personal, etc."
                style={{...css.inp,width:"100%",maxWidth:400}}/>
            </div>
          </div>

          {/* Pending Requests */}
          {(()=>{
            const pending = vacRequests.filter(r => r.status === "pending");
            const reviewed = vacRequests.filter(r => r.status !== "pending");
            return <>
              <div style={css.card}>
                <div style={css.cardT}>⏳ Pending Requests <span style={{fontWeight:400,fontSize:12,color:"#8a94a0"}}>— {pending.length}</span></div>
                {pending.length === 0 ? (
                  <p style={{color:"#8a94a0",fontSize:13}}>No pending requests.</p>
                ) : pending.map(r => (
                  <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",marginBottom:6,background:"#fef8f0",border:"1px solid #e8d8c0",borderRadius:8,flexWrap:"wrap"}}>
                    <Badge id={r.surgeon_id}/>
                    <span style={{fontFamily:mono,fontSize:13,color:"#2c3e50"}}>{r.start_date} → {r.end_date}</span>
                    {r.reason && <span style={{fontSize:12,color:"#7a8a98",fontStyle:"italic"}}>"{r.reason}"</span>}
                    <span style={{fontSize:11,color:"#a0a8b0"}}>Submitted {new Date(r.submitted_at).toLocaleDateString()}</span>
                    {isScheduler && (
                      <div style={{marginLeft:"auto",display:"flex",gap:6}}>
                        <button onClick={()=>approveVacRequest(r)} style={{background:"#e8f8e8",border:"1px solid #a0d8a0",color:"#1a8040",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:font}}>✓ Approve</button>
                        <button onClick={()=>{const note=prompt("Reason for denial (optional):"); if(note!==null) denyVacRequest(r,note);}} style={{background:"#fce8e8",border:"1px solid #e0b0b0",color:"#c04040",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:font}}>✕ Deny</button>
                      </div>
                    )}
                    {!isScheduler && <span style={{marginLeft:"auto",fontSize:11,color:"#c09030",fontWeight:600,background:"#fef8e8",padding:"2px 8px",borderRadius:4,border:"1px solid #e8d090"}}>Pending review</span>}
                  </div>
                ))}
                {pending.length > 0 && !isScheduler && (
                  <p style={{fontSize:12,color:"#8a94a0",margin:"10px 0 0",lineHeight:1.5}}>
                    Only the scheduler can approve or deny requests. Enter the scheduler PIN in ⚙️ Settings to unlock.
                  </p>
                )}
              </div>

              {/* Reviewed Requests */}
              {reviewed.length > 0 && (
                <div style={css.card}>
                  <div style={css.cardT}>📋 Reviewed <span style={{fontWeight:400,fontSize:12,color:"#8a94a0"}}>— {reviewed.length}</span></div>
                  {reviewed.slice(0, 20).map(r => (
                    <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",marginBottom:4,background:r.status==="approved"?"#f0faf0":"#faf0f0",border:`1px solid ${r.status==="approved"?"#c0e0c0":"#e0c0c0"}`,borderRadius:6,flexWrap:"wrap"}}>
                      <span style={{fontSize:13,fontWeight:700,color:r.status==="approved"?"#1a8040":"#c04040"}}>{r.status==="approved"?"✓":"✕"}</span>
                      <Badge id={r.surgeon_id}/>
                      <span style={{fontFamily:mono,fontSize:12,color:"#2c3e50"}}>{r.start_date} → {r.end_date}</span>
                      {r.reason && <span style={{fontSize:11,color:"#8a94a0"}}>"{r.reason}"</span>}
                      {r.review_note && <span style={{fontSize:11,color:"#c04040"}}>Note: {r.review_note}</span>}
                      <span style={{fontSize:11,color:"#a0a8b0",marginLeft:"auto"}}>{r.reviewed_at ? new Date(r.reviewed_at).toLocaleDateString() : ""}</span>
                    </div>
                  ))}
                </div>
              )}
            </>;
          })()}
        </>}
      </div>
    </div>
  );
}

const thS = {textAlign:"left",padding:"7px 8px",color:"#5a6a78",fontWeight:600,fontSize:10,textTransform:"uppercase",letterSpacing:0.5};
const thS2 = {textAlign:"left",padding:"4px 8px",color:"#7a8a98",fontWeight:500,fontSize:10,textTransform:"uppercase",letterSpacing:0.3};
const tdS = {padding:"7px 8px",fontFamily:"'JetBrains Mono',monospace",color:"#4a5a68",fontSize:13};

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(CallSchedule));
  </script>
</body>
</html>
